<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听力题 · 对话 · 短对话填空</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 听力题 · 全部变体</a>
  <h1>#4 短对话填空</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">听力题 × 对话 × 短对话填空</span>

  <a href="../../app/exam/listening/dialog-fill.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>听力题 × 短对话填空</strong> — 播放对话，填写信息表格(姓名/时间/地点等)。<br><span class="field-map">应用端: <strong>音频播放器</strong> + <strong>子题展示</strong> + <strong>作答区域</strong></span></div>
<div class="shared-tpl">共用模板: 音频播放器 + 播放控制 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 短对话填空 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="听力题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="对话" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="短对话填空" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>短对话填空</strong>。对话音频+信息表格填空。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>对话音频</label><div class="upload-area">🎧 上传音频 (必填)</div></div>
      <div class="proto-field"><label class="proto-label">对话脚本</label><textarea class="proto-textarea">A: 请问您贵姓？
B: 我姓王。
A: 王先生，您预约的是几点？
B: 下午三点，在会议室。</textarea></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>填空字段 <span class="hint">每字段支持多个可接受答案，用「/」分隔</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="姓名" style="width:80px"><input class="proto-input" value="王/王先生/小王" style="border-color:var(--success);flex:1"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="时间" style="width:80px"><input class="proto-input" value="下午三点/3点/15:00" style="border-color:var(--success);flex:1"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="地点" style="width:80px"><input class="proto-input" value="会议室" style="border-color:var(--success);flex:1"></div></div></div>
          <div class="list-builder-add">+ 添加字段</div>
        </div></div>
      <div class="proto-field"><label class="proto-label">匹配策略</label><select class="proto-select"><option selected>宽松匹配(忽略标点空格)</option><option>精确匹配答案池</option></select></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">姓名:「王/王先生」— 对话中B说"我姓王"。时间:「下午三点」— B说"预约的是下午三点"。地点:「会议室」— B说"在会议室"。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Name: "王" — B says "my surname is Wang." Time: "3pm" — B says "appointment at 3pm." Place: "meeting room" — B says "in the meeting room."</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
