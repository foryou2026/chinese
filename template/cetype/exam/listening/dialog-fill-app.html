<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听力题 · 对话 · 短对话填空</title><link rel="stylesheet" href="../../styles-app.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 听力题 · 全部变体</a>
  <h1>#4 短对话填空</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">听力题 × 对话 × 短对话填空</span>

  <a href="../../../exam/listening/dialog-fill.html" class="back-link" style="margin-left:auto;color:#d46b08">Admin端 →</a></div>
<div class="content">
<div class="type-desc"><strong>听力题 × 短对话填空</strong> — 播放对话，填写信息表格(姓名/时间/地点等)。<br><span class="field-map">应用端: <strong>音频播放器</strong> + <strong>子题展示</strong> + <strong>作答区域</strong></span></div>
<div class="shared-tpl">共用模板: 音频播放器 + 播放控制 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 短对话填空</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>听力题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">听对话，完成信息表格 Listen and fill the form</div>
            <div style="text-align:center;padding:16px 0"><div class="audio-btn big">🔊 播放对话</div></div>
            <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:12px 0">
              <table class="mini-table">
                <tr><th style="width:100px">信息项</th><th>答案</th></tr>
                <tr><td>姓名</td><td><input class="fill-blank wide" placeholder="______" style="font-size:14px"></td></tr>
                <tr><td>时间</td><td><input class="fill-blank wide" placeholder="______" style="font-size:14px"></td></tr>
                <tr><td>地点</td><td><input class="fill-blank wide" placeholder="______" style="font-size:14px"></td></tr>
              </table>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">确认 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../../../../../docs/B02-experience-design/app/prototype-style/app.js"></script>
</body></html>
