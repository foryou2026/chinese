<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听力题 · 对话 · 短对话选择</title><link rel="stylesheet" href="../../styles-app.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 听力题 · 全部变体</a>
  <h1>#3 短对话选择</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">听力题 × 对话 × 短对话选择</span>

  <a href="../../../exam/listening/dialog-choose.html" class="back-link" style="margin-left:auto;color:#d46b08">Admin端 →</a></div>
<div class="content">
<div class="type-desc"><strong>听力题 × 短对话选择</strong> — 播放短对话(2-3轮)，回答多道选择题。复合题结构。<br><span class="field-map">应用端: <strong>音频播放器</strong> + <strong>子题展示</strong> + <strong>作答区域</strong></span></div>
<div class="shared-tpl">共用模板: 音频播放器 + 播放控制 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 短对话选择</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>听力题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">听对话，回答问题 Listen to dialog and answer</div>
            <div style="text-align:center;padding:16px 0"><div class="audio-btn big">🔊 播放对话</div><div style="margin-top:8px;display:flex;gap:8px;justify-content:center"><span class="proto-btn-sm">🐢 慢速</span><span class="proto-btn-sm">🔁 重播</span></div></div>
            <div class="highlight-box gray" style="padding:12px;margin:8px 0"><div class="text-sm" style="font-weight:500">第1题 / 共2题:</div><div style="margin-top:4px">他们在讨论什么？</div></div>
            <div class="option-list">
              <div class="option-item"><span class="letter">A</span>天气</div>
              <div class="option-item selected"><span class="letter">B</span>周末计划</div>
              <div class="option-item"><span class="letter">C</span>工作</div>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">下一题 →</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../../../../../docs/B02-experience-design/app/prototype-style/app.js"></script>
</body></html>
