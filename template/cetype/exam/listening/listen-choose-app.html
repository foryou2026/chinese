<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听力题 · 单句 · 听句选答</title><link rel="stylesheet" href="../../styles-app.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 听力题 · 全部变体</a>
  <h1>#1 听句选答</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">听力题 × 单句 × 听句选答</span>

  <a href="../../../exam/listening/listen-choose.html" class="back-link" style="margin-left:auto;color:#d46b08">Admin端 →</a></div>
<div class="content">
<div class="type-desc"><strong>听力题 × 听句选答</strong> — 播放单句音频，回答选择题。最简单的听力复合题。<br><span class="field-map">应用端: <strong>音频播放器</strong> + <strong>子题展示</strong> + <strong>作答区域</strong></span></div>
<div class="shared-tpl">共用模板: 音频播放器 + 播放控制 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 听句选答</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>听力题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">听句子，回答问题 Listen and answer</div>
            <div style="text-align:center;padding:16px 0"><div class="audio-btn big">🔊 点击播放</div><div class="text-sm text-muted mt-8">剩余: 2/3次</div></div>
            <div class="highlight-box gray" style="padding:12px;margin:12px 0"><div style="font-size:15px">问: 说话人要去哪里？</div><div class="text-sm text-muted">Q: Where is the speaker going?</div></div>
            <div class="option-list">
              <div class="option-item"><span class="letter">A</span>学校</div>
              <div class="option-item selected"><span class="letter">B</span>医院</div>
              <div class="option-item"><span class="letter">C</span>超市</div>
              <div class="option-item"><span class="letter">D</span>公园</div>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">确认 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../../../../../docs/B02-experience-design/app/prototype-style/app.js"></script>
</body></html>
