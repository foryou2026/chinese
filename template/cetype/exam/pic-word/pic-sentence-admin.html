<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看图选词 · 句子 · 图选描述句</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 看图选词 · 全部变体</a>
  <h1>#3 图选描述句</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">看图选词 × 句子 × 图选描述句</span>

  <a href="../../app/exam/pic-word/pic-sentence.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>看图选词 × 句子 × 图选描述句</strong> — 图片为题干核心线索，从选项中选择匹配的句子。<br><span class="field-map">应用端: <strong>图片展示(大)</strong> + <strong>选项列表</strong></span></div>
<div class="shared-tpl">共用模板: 图片展示 + 标准选项列表 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 图选描述句 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="看图选词" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="句子" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="图选描述句" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>图选描述句</strong>。图片+描述句选项。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>图片</label><div class="upload-area">📷 上传图片 (必填)</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>描述句选项</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="ps"><input class="proto-input" value="他在公园散步。"></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="ps" checked><input class="proto-input" value="他在雨中跑步。" style="border-color:var(--success)"><span class="text-xs" style="color:var(--success)">✓</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="ps"><input class="proto-input" value="他在打篮球。"></div></div>
          <div class="list-builder-add">+ 添加选项</div>
        </div></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">图片显示雨天跑步场景，正确答案B「他在雨中跑步。」图中有雨和奔跑动作。A「散步」和C「打篮球」与图片不符。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Picture shows running in the rain. Correct: B "他在雨中跑步" (He is running in the rain). A "taking a walk" and C "playing basketball" don't match.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="20"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option selected>简单</option><option >中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
