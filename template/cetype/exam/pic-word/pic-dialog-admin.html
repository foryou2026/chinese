<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 看图选词 · 全部变体</a>
  <h1>#4 图选对话句</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">看图选词 × 句子 × 图选对话句</span>
  <a href="pic-dialog-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>看图选词 × 句子 × 图选对话句</strong> — 图片为题干核心线索，从选项中选择匹配的句子。<br><span class="field-map">应用端: <strong>图片展示(大)</strong> + <strong>选项列表</strong></span></div>
<div class="shared-tpl">共用模板: 图片展示 + 标准选项列表 + 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 图选对话句 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="看图选词" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="句子" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="图选对话句" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>图选对话句</strong>。场景图+场景说明+对话句选项。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>场景图片</label><div class="upload-area">📷 上传场景图 (必填)</div></div>
      <div class="proto-field"><label class="proto-label">场景说明</label><input class="proto-input" value="在超市购物"></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>对话句选项</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="pd" checked><input class="proto-input" value="请问这个多少钱？" style="border-color:var(--color-success-500)"><span class="text-xs" style="color:var(--color-success-500)">✓</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="pd"><input class="proto-input" value="你好，我要退房。"></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="pd"><input class="proto-input" value="麻烦给我菜单。"></div></div>
        </div></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">场景为超市购物，正确答案A「请问这个多少钱？」是购物场景的典型问句。B「退房」属于酒店场景，C「菜单」属于餐厅场景。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Scene: shopping in a supermarket. Correct: A "请问这个多少钱？" (How much is this?). B "checking out of hotel" and C "asking for menu" belong to other scenarios.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="20"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option selected>简单</option><option >中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
