<div class="page-header">
  <a href="index.html" class="back-link">← 阅读理解 · 全部变体</a>
  <h1>#2 语句填空</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">阅读理解 × 段落 × 语句填空</span>
  <a href="passage-sentence-fill-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>阅读理解 × 语句填空</strong> — 阅读一篇有若干空缺的文章，从备选句子中选择合适的句子填入。HSK 4-6级高级阅读题型。与选词填空不同：操作对象是<strong>整句/半句</strong>。<br><span class="field-map">应用端: <strong>带编号空缺的文章</strong> + <strong>备选句子列表</strong> + <strong>拖拽/选择填入</strong></span></div>
<div class="shared-tpl">共用模板: 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 语句填空 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="阅读理解" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="段落" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="语句填空" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>HSK 4-6级阅读题型。段落中有3-5个空缺处(编号标记)，提供等量或多余的备选句子。考察语篇逻辑和衔接能力。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>文章内容 <span class="hint">使用{58}{59}{60}标记空缺位置</span></label><textarea class="proto-textarea" style="min-height:120px">我们家楼下新开了一家超市。这家超市十分重视商品质量，卖的食物既新鲜又便宜，{58}。为了让顾客更直接地感受商品，超市支持顾客在店内试吃、试用。而对于没有时间来店里购物的人，{59}，送货上门，大大节约了时间。另外，在超市的出入口，{60}，为顾客准备好了纸巾、热水、图书等。</textarea></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>备选句子 + 对应空位</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">A</span><input class="proto-input" value="可以选择网购"><select class="proto-select" style="width:80px"><option>58</option><option selected>59</option><option>60</option><option>干扰项</option></select></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">B</span><input class="proto-input" value="而且服务也值得一提"><select class="proto-select" style="width:80px"><option selected>58</option><option>59</option><option>60</option><option>干扰项</option></select></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">C</span><input class="proto-input" value="不光有"休息区""><select class="proto-select" style="width:80px"><option>58</option><option>59</option><option selected>60</option><option>干扰项</option></select></div></div></div>
        </div></div>
      <div style="text-align:center;padding:8px"><span class="proto-btn-secondary" style="font-size:12px">+ 添加备选句子 (可添加干扰项)</span></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">58空前面说「便宜」，后面需要转折引出服务，所以填B「而且服务也值得一提」。59空说「没时间来店里」，接「网购」最合适。60空说出入口的设施，「休息区」与后面「纸巾、热水」衔接。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Gap 58: transition from price to service → B. Gap 59: "no time to visit" → online shopping (A). Gap 60: entrance facilities → rest area (C).</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 4</option><option>HSK 5</option><option>HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值(每空)</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="240"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>简单</option><option>中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
