<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 配对题 · 全部变体</a>
  <h1>#7 中文问答配对</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">配对题 × 句意 × 中文问答配对</span>
  <a href="cn-qa-match-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>配对题 × 中文问答配对</strong> — 将中文问句与对应的中文答句配对。HSK 3级阅读核心题型。答句组共享，一组6个答句对应5道问句题。<br><span class="field-map">应用端: <strong>答句列表(A-F)</strong> + <strong>问句序列</strong> + <strong>配对操作</strong></span></div>
<div class="shared-tpl">共用模板: 拖拽/选择配对 + 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 中文问答配对 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="配对题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="句意" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="中文问答配对" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>HSK 3级阅读题型。展示6个答句(A-F)，5道问句依次匹配。答句组共享，多出1个干扰项。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>答句组(A-F, 通常6个)</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">A</span><input class="proto-input" value="这个周末我有空。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">B</span><input class="proto-input" value="我坐地铁去的。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">C</span><input class="proto-input" value="大概三十分钟。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">D</span><input class="proto-input" value="他休假了，你有事可以发邮件。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">E</span><input class="proto-input" value="在二楼，左边第三个房间。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><span style="font-weight:600;min-width:20px">F</span><input class="proto-input" value="不客气，应该的。"><span class="text-xs text-muted">(干扰项)</span></div></div></div>
        </div></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>问句列表(每题一个问句+正确答句)</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="经理怎么不在办公室？"><select class="proto-select" style="width:60px"><option>A</option><option>B</option><option>C</option><option selected>D</option><option>E</option><option>F</option></select></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="你怎么来的？"><select class="proto-select" style="width:60px"><option>A</option><option selected>B</option><option>C</option><option>D</option><option>E</option><option>F</option></select></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="从这里到学校要多长时间？"><select class="proto-select" style="width:60px"><option>A</option><option>B</option><option selected>C</option><option>D</option><option>E</option><option>F</option></select></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="会议室在哪儿？"><select class="proto-select" style="width:60px"><option>A</option><option>B</option><option>C</option><option>D</option><option selected>E</option><option>F</option></select></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="你什么时候方便？"><select class="proto-select" style="width:60px"><option selected>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option></select></div></div></div>
        </div></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option>HSK 1</option><option>HSK 2</option><option selected>HSK 3</option><option>HSK 4</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="120"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>简单</option><option selected>中等</option><option>困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
