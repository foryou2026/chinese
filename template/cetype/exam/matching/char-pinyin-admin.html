.card{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--glass-border);font-weight:var(--weight-semibold);font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.upload-area{border:2px dashed var(--border-color);border-radius:var(--radius-sm);padding:var(--space-4);text-align:center;color:var(--text-muted);cursor:pointer;transition:var(--transition-all)}
.upload-area:hover{border-color:var(--color-brand-default);color:var(--color-brand-default)}

.list-builder-item .content{flex:1}

.proto-label .req{color:var(--color-danger-500);margin-right:4px}
.proto-label .hint{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-xs);margin-left:6px}

.mini-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}

.mini-table td{padding:6px 8px;border-bottom:1px solid var(--color-neutral-100)}

<body>
<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 配对题 · 全部变体</a>
  <h1>#1 汉字↔拼音</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">配对题 × 字音 × 汉字↔拼音</span>

  <a href="char-pinyin-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc">
  <strong>配对题 × 字音 × 汉字↔拼音</strong> — 左列展示汉字，右列展示拼音(含干扰项)，用户点击/拖拽连线匹配。最基础的配对题型，考察音形对应。<br>
  <span class="field-map">应用端核心元素: <strong>左列汉字(大号)</strong> + <strong>右列拼音</strong> + <strong>连线/拖拽交互</strong> + <strong>匹配正确/错误反馈</strong></span>
</div>
<div class="shared-tpl">共用模板: 配对连线交互 + 匹配反馈动画 + 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 汉字↔拼音 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="配对题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="字音" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="汉字↔拼音" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>汉字↔拼音</strong>。配对对(5-8组汉字-拼音)，可添加未配对的<strong>干扰拼音</strong>增加难度。</div></div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>汉字-拼音配对 <span class="hint">拖拽排序，应用端会自动打乱右列顺序</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="学" style="text-align:center;font-size:18px"><input class="proto-input" value="xué"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="书" style="text-align:center;font-size:18px"><input class="proto-input" value="shū"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="花" style="text-align:center;font-size:18px"><input class="proto-input" value="huā"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="月" style="text-align:center;font-size:18px"><input class="proto-input" value="yuè"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="大" style="text-align:center;font-size:18px"><input class="proto-input" value="dà"></div></div></div>
          <div class="list-builder-add">+ 添加配对</div>
        </div>
      </div>
      <div class="proto-field">
        <label class="proto-label">干扰拼音 <span class="hint">未配对的多余项，增加难度</span></label>
        <div class="tag-input">
          <span class="tag-item">rì <span class="close">×</span></span>
        </div>
      </div>
      <div class="proto-field">
        <label class="proto-label">配对交互方式</label>
        <select class="proto-select">
          <option selected>点击连线(左右各点一个)</option>
          <option>拖拽连线(从左拖到右)</option>
        </select>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">学=xué(学习)、书=shū(书本)、花=huā(花朵)、月=yuè(月亮)、大=dà(大小)。干扰项rì=日，与「月」形近易混淆。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">学=xué (study), 书=shū (book), 花=huā (flower), 月=yuè (moon), 大=dà (big). Distractor rì=日 (sun), easily confused with 月.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option selected>简单</option><option >中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
<script>proto.bootstrap();</script>
</body>
