<link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style>

<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 配对题 · 全部变体</a>
  <h1>#6 中文句↔英文句</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">配对题 × 翻译 × 中文句↔英文句</span>
</div>


  <a href="../../app/exam/matching/cn-en-sentence.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>配对题 × 翻译 × 中文句↔英文句</strong> — 左列中文短句，右列英文翻译，连线匹配。测试句级翻译理解能力，干扰项为语义相近的英文句。<br>
  <span class="field-map">应用端核心元素: <strong>左列中文短句</strong> + <strong>右列英文翻译</strong> + <strong>连线交互</strong></span>
</div>
<div class="shared-tpl">共用模板: 配对连线交互 + 匹配反馈 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 中文句↔英文句 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="配对题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="翻译" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="中文句↔英文句" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>中文句↔英文句</strong>。中英短句配对，干扰策略：<strong>语义相近但不同的英文句</strong>。</div></div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>中英句对</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="你好吗？"><input class="proto-input" value="How are you?"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="我很好。"><input class="proto-input" value="I'm fine."></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="谢谢你！"><input class="proto-input" value="Thank you!"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="对不起。"><input class="proto-input" value="I'm sorry."></div></div></div>
          <div class="list-builder-add">+ 添加句对</div>
        </div>
      </div>
      <div class="proto-field">
        <label class="proto-label">干扰英文句</label>
        <div class="tag-input"><span class="tag-item">You're welcome. <span class="close">×</span></span></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">你好吗？=How are you? 我很好。=I'm fine. 谢谢你！=Thank you! 对不起。=I'm sorry. 干扰项"You're welcome."=不客气。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Basic greetings and polite expressions. Distractor "You're welcome" (不客气) is semantically close to "Thank you" to increase difficulty.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option selected>简单</option><option >中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
