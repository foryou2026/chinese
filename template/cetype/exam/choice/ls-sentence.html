<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择题 · 听力理解 · 听句选义</title>
<link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>
  <h1>#21 听句选义</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 听力理解 × 听句选义</span>
</div>


  <a href="../../app/exam/choice/ls-sentence.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 听力 × 听句选义</strong> — 播放一句话，然后显示追问问题，从4个选项中选答案。中等长度音频+追问式。<br>
  <span class="field-map">应用端核心元素: <strong>句级音频播放器</strong> + <strong>追问问题(中英)</strong> + <strong>选项</strong></span>
</div>
<div class="shared-tpl">共用模板: 音频播放器 + 标准选项列表 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 听句选义 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>与「听词选义」差异：音频为<strong>句子级</strong>，新增<strong>追问问题</strong>字段(中英)和<strong>音频脚本</strong>(内部管理用)。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="选择题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="听力理解" disabled></div>
        <div class="proto-field"><label class="proto-label">L3</label><input class="proto-input" value="听句选义" disabled></div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>句子音频 <span class="hint" style="color:var(--error)">必填</span></label><div class="upload-area">🎧 上传音频 (必填)</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">慢速音频</label><div class="upload-area sm">🐢 上传</div></div>
        <div class="proto-field"><label class="proto-label">播放次数</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">自动播放</label><div style="padding-top:6px"><span class="switch on"></span></div></div>
      </div>
      <div class="proto-field">
        <label class="proto-label">音频脚本 <span class="hint">内部记录，不展示给用户</span></label>
        <textarea class="proto-textarea">今天下午我们一起去看那个新出的电影吧！</textarea>
      </div>
      <hr class="divider">
      <!-- 本L3独有: 追问问题 -->
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>追问问题(中文) <span class="hint">音频播放后展示的问题</span></label>
        <input class="proto-input" value="说话人想做什么？">
      </div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>追问问题(English)</label>
        <input class="proto-input" value="What does the speaker want to do?">
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>选项</label>
        <div class="list-builder">
          <div class="list-builder-item"><input type="radio" name="ls1"><div class="content"><input class="proto-input" value="去买东西"></div></div>
          <div class="list-builder-item"><input type="radio" name="ls1" checked><div class="content"><input class="proto-input" value="去看电影" style="border-color:var(--success)"><span class="text-xs" style="color:var(--success)">✓</span></div></div>
          <div class="list-builder-item"><input type="radio" name="ls1"><div class="content"><input class="proto-input" value="回家休息"></div></div>
          <div class="list-builder-item"><input type="radio" name="ls1"><div class="content"><input class="proto-input" value="去图书馆"></div></div>
          <div class="list-builder-add">+ 添加</div>
        </div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label">答案解析</label><div class="form-row"><textarea class="proto-textarea">关键词「看电影」「新出的电影」→ 答案是去看电影。</textarea><textarea class="proto-textarea">Key phrase: "看电影" (watch a movie) and "新出的" (newly released).</textarea></div></div>
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 2</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="30"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>简单</option><option selected>中等</option></select></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI批量生成</span></div>
    </div>
  </div>


</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
