<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择题 · 成语 · 语境选成语</title>
<link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>
  <h1>#19 语境选成语</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 成语 × 语境选成语</span>
</div>


  <a href="../../app/exam/choice/id-context.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 成语 × 语境选成语</strong> — 给出带空位的语境句，从4个成语选项中选出最合适填入的。测试成语的实际运用能力。<br>
  <span class="field-map">应用端核心元素: <strong>语境句+下划线空位</strong> + <strong>成语选项(四字+拼音)</strong></span>
</div>
<div class="shared-tpl">共用模板: 语境句+空位 + 标准选项列表 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 语境选成语 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>结合「语境选词」和「成语」两种模式：题干为<strong>语境句+空位</strong>，选项为<strong>成语</strong>。需配置语境句和每个成语选项。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="选择题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="成语" disabled></div>
        <div class="proto-field"><label class="proto-label">L3</label><input class="proto-input" value="语境选成语" disabled></div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>语境句 <span class="hint">用 {blank} 标记空位</span></label><textarea class="proto-textarea" style="font-size:16px">他做事总是 {blank}，从来不马虎。</textarea></div>
      <div class="proto-field"><label class="proto-label">英文翻译</label><input class="proto-input" value="He always does things ________, never carelessly."></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>成语选项 <span class="hint">每项配拼音+含义说明(可选展示)</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><input type="radio" name="idc1" checked><div class="content"><div style="display:flex;gap:6px;margin-bottom:4px"><input class="proto-input" value="一丝不苟" style="width:90px;border-color:var(--success)"><input class="proto-input" value="yīsībùgǒu" style="width:100px"><span class="text-xs" style="color:var(--success)">✓</span></div><input class="proto-input" value="形容做事非常认真细致" style="font-size:12px" placeholder="含义(可选展示)"></div></div>
          <div class="list-builder-item"><input type="radio" name="idc1"><div class="content"><div style="display:flex;gap:6px;margin-bottom:4px"><input class="proto-input" value="自以为是" style="width:90px"><input class="proto-input" value="zìyǐwéishì" style="width:100px"></div><input class="proto-input" value="自认为正确" style="font-size:12px"></div></div>
          <div class="list-builder-item"><input type="radio" name="idc1"><div class="content"><div style="display:flex;gap:6px;margin-bottom:4px"><input class="proto-input" value="半途而废" style="width:90px"><input class="proto-input" value="bàntúérfèi" style="width:100px"></div><input class="proto-input" value="做事中途放弃" style="font-size:12px"></div></div>
          <div class="list-builder-item"><input type="radio" name="idc1"><div class="content"><div style="display:flex;gap:6px;margin-bottom:4px"><input class="proto-input" value="粗心大意" style="width:90px"><input class="proto-input" value="cūxīndàyì" style="width:100px"></div><input class="proto-input" value="做事不仔细(反义干扰)" style="font-size:12px"></div></div>
          <div class="list-builder-add">+ 添加</div>
        </div>
      </div>
      <div class="proto-field">
        <label class="proto-label">选项展示含义</label>
        <div><span class="switch"></span> <span class="text-sm text-muted">开启后应用端选项下方显示含义提示(降低难度)</span></div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label">答案解析</label><div class="form-row"><textarea class="proto-textarea">「一丝不苟」形容认真细致，与「不马虎」呼应。「粗心大意」是反义词，语境矛盾。</textarea><textarea class="proto-textarea">"一丝不苟" means meticulous, echoing "never careless" in the sentence.</textarea></div></div>
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 4</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="35"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span></div>
    </div>
  </div>


</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
