<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择题 · 词语 · 语境选词</title>
<link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>
  <h1>#9 语境选词</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 词语 × 语境选词</span>
</div>


  <a href="../../app/exam/choice/wd-context.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 词语 × 语境选词</strong> — 给出一个带空位的语境句，从4个词语选项中选出最合适的。测试词汇的语境运用。<br>
  <span class="field-map">应用端核心元素: <strong>语境句+下划线空位(中英)</strong> + <strong>词语选项(拼音+释义可配)</strong></span>
</div>
<div class="shared-tpl">共用模板: 语境句+空位 + 标准选项列表 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 语境选词 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>本L3核心：需配置<strong>语境句+空位标记</strong>和<strong>带拼音+中英释义的词语选项</strong>。应用端选项的展示级别(是否显示拼音/释义)可控制。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="选择题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="词语" disabled></div>
        <div class="proto-field"><label class="proto-label">L3</label><input class="proto-input" value="语境选词" disabled></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>语境句 <span class="hint">用 {blank} 标记空位，应用端渲染为下划线</span></label>
        <textarea class="proto-textarea" style="font-size:16px">今天天气很好，我们去公园 {blank} 吧。</textarea>
      </div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>英文翻译 <span class="hint">应用端显示在语境句下方</span></label>
        <input class="proto-input" value="The weather is nice today, let's go to the park and ______.">
      </div>
      <div class="proto-field">
        <label class="proto-label">语境句音频 <span class="hint">可选，留空则不显示播放按钮</span></label>
        <div class="upload-area sm">📁 上传/TTS</div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>词语选项 <span class="hint">每个选项需配拼音+中英释义(对应应用端展示)</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><input type="radio" name="wd1" style="margin-top:6px"><div class="content"><div style="display:flex;gap:6px"><input class="proto-input" value="学习" style="width:70px"><input class="proto-input" value="xuéxí" style="width:70px"><input class="proto-input" value="study" style="flex:1"></div></div></div>
          <div class="list-builder-item"><input type="radio" name="wd1" checked style="margin-top:6px"><div class="content"><div style="display:flex;gap:6px"><input class="proto-input" value="散步" style="width:70px;border-color:var(--success)"><input class="proto-input" value="sànbù" style="width:70px"><input class="proto-input" value="take a walk" style="flex:1"><span class="text-xs" style="color:var(--success);white-space:nowrap">✓ 正确</span></div></div></div>
          <div class="list-builder-item"><input type="radio" name="wd1" style="margin-top:6px"><div class="content"><div style="display:flex;gap:6px"><input class="proto-input" value="睡觉" style="width:70px"><input class="proto-input" value="shuìjiào" style="width:70px"><input class="proto-input" value="sleep" style="flex:1"></div></div></div>
          <div class="list-builder-item"><input type="radio" name="wd1" style="margin-top:6px"><div class="content"><div style="display:flex;gap:6px"><input class="proto-input" value="工作" style="width:70px"><input class="proto-input" value="gōngzuò" style="width:70px"><input class="proto-input" value="work" style="flex:1"></div></div></div>
          <div class="list-builder-add">+ 添加选项</div>
        </div>
      </div>
      <div class="proto-field">
        <label class="proto-label">选项展示级别 <span class="hint">控制应用端每个选项显示的信息量</span></label>
        <select class="proto-select">
          <option>仅汉字(高难度)</option>
          <option selected>汉字+拼音+释义(标准)</option>
          <option>汉字+拼音(中难度)</option>
        </select>
      </div>
      <div class="proto-field">
        <label class="proto-label">干扰策略</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <label class="text-sm"><input type="checkbox" checked> 近义词(意思接近但语境不合)</label>
          <label class="text-sm"><input type="checkbox" checked> 同主题词(同类但不搭配)</label>
          <label class="text-sm"><input type="checkbox"> 反义词</label>
        </div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label">答案解析</label><div class="form-row"><textarea class="proto-textarea">「散步」适合公园场景。「学习」「工作」与公园语境不搭。</textarea><textarea class="proto-textarea">"散步" fits the park context. "学习" and "工作" don't match.</textarea></div></div>
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 2</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="30"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>简单</option><option selected>中等</option></select></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI批量生成</span></div>
    </div>
  </div>


</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
