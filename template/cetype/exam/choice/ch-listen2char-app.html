.highlight-box.blue{background:var(--color-info-50);border:1px solid var(--color-info-200)}
.highlight-box.red{background:var(--color-danger-50);border:1px solid var(--color-danger-200)}
.sentence-line{padding:10px 0;border-bottom:1px solid var(--color-neutral-100)}
.sentence-line .cn{font-size:16px;line-height:var(--leading-loose)}
.sentence-line .en{font-size:var(--text-sm);color:var(--text-muted);margin-top:2px}
.drag-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--glass-bg-card);border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm);margin-bottom:6px;cursor:grab;transition:var(--transition-all)}
.drag-item:hover{border-color:var(--color-brand-200)}

.match-pair{display:flex;gap:8px;margin-bottom:8px}

.match-left.active,.match-right.active{border-color:var(--color-brand-default);background:var(--color-brand-50)}

.writing-area{border:2px dashed var(--color-neutral-300);border-radius:var(--radius-md);min-height:120px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:var(--text-sm);cursor:pointer;transition:var(--transition-all);margin:12px 0}
.writing-area:hover{border-color:var(--color-brand-default)}
.mic-btn{width:64px;height:64px;border-radius:50%;background:var(--color-danger-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:16px auto;cursor:pointer;box-shadow:var(--shadow-md);transition:var(--transition-all)}
.mic-btn:hover{transform:scale(1.05)}
