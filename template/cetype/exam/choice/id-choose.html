.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }

</style>

<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>
  <h1>#18 含义选成语</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 成语 × 含义选成语</span>
</div>


  <a href="../../app/exam/choice/id-choose.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 成语 × 含义选成语</strong> — 展示一段含义描述，从4个成语选项中选出对应的。方向：义→成语，与「成语选义」互逆。<br>
  <span class="field-map">应用端核心元素: <strong>含义描述文本</strong> + <strong>成语选项(四字格展示+拼音)</strong></span>
</div>
<div class="shared-tpl">共用模板: 标准选项列表(变体:成语四字格) + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 含义选成语 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>方向=<strong>给义选成语</strong>。题干为含义描述(中英)，选项为成语(每项配拼音)。干扰以<strong>意思相近的成语</strong>为主。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="选择题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="成语" disabled></div>
        <div class="proto-field"><label class="proto-label">L3</label><input class="proto-input" value="含义选成语" disabled></div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>含义描述(中文题干)</label><textarea class="proto-textarea">比喻学习或做事不求深入理解，只知道大概</textarea></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>英文描述</label><input class="proto-input" value="To learn superficially without seeking deep understanding"></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>成语选项 <span class="hint">每项需配拼音</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><input type="radio" name="ic1"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="走马观花" style="width:100px"><input class="proto-input" value="zǒumǎguānhuā" style="flex:1"><span class="text-xs text-muted">近义干扰</span></div></div>
          <div class="list-builder-item"><input type="radio" name="ic1" checked><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="囫囵吞枣" style="width:100px;border-color:var(--success)"><input class="proto-input" value="húlúntūnzǎo" style="flex:1"><span class="text-xs" style="color:var(--success)">✓</span></div></div>
          <div class="list-builder-item"><input type="radio" name="ic1"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="掩耳盗铃" style="width:100px"><input class="proto-input" value="yǎněrdàolíng" style="flex:1"><span class="text-xs text-muted">无关干扰</span></div></div>
          <div class="list-builder-item"><input type="radio" name="ic1"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="守株待兔" style="width:100px"><input class="proto-input" value="shǒuzhūdàitù" style="flex:1"><span class="text-xs text-muted">无关干扰</span></div></div>
          <div class="list-builder-add">+ 添加</div>
        </div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label">答案解析</label><div class="form-row"><textarea class="proto-textarea">「囫囵吞枣」比喻不加咀嚼地接受。「走马观花」是浮光掠影地看。</textarea><textarea class="proto-textarea">"囫囵吞枣" = swallowing dates whole = superficial learning.</textarea></div></div>
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 4</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="30"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span></div>
    </div>
  </div>


</div>
