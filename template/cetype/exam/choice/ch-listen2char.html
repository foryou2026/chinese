<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择题 · 汉字 · 听音选汉字</title>
<link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>
  <h1>#6 听音选汉字</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 汉字 × 听音选汉字</span>
</div>


  <a href="../../app/exam/choice/ch-listen2char.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 汉字 × 听音选汉字</strong> — 播放发音，从4个汉字中选出对应的字。纯听觉→视觉映射，无文字提示。<br>
  <span class="field-map">应用端核心元素: <strong>音频播放器(大号)</strong> + <strong>播放控制</strong> + <strong>汉字网格选项</strong></span>
</div>
<div class="shared-tpl">共用模板: 音频播放器 + 汉字网格选项 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 听音选汉字 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>与「拼音选汉字」差异：题干从文字变为<strong>音频(必填)</strong>，选项仍为汉字网格。干扰维度以<strong>同音/近音字</strong>为主。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="选择题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="汉字" disabled></div>
        <div class="proto-field"><label class="proto-label">L3</label><input class="proto-input" value="听音选汉字" disabled></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>音频 <span class="hint" style="color:var(--error)">必填，是唯一题干</span></label>
        <div class="upload-area">🎧 上传音频 (必填)</div>
      </div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">慢速音频</label><div class="upload-area sm">🐢 上传</div></div>
        <div class="proto-field"><label class="proto-label">最大播放次数</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">自动播放</label><div style="padding-top:6px"><span class="switch on"></span></div></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>目标汉字(正确答案)</label>
        <input class="proto-input lg" value="麦" style="text-align:center">
      </div>
      <div class="proto-field">
        <label class="proto-label">音频内容(内部记录)</label>
        <input class="proto-input" value="mài (麦)" placeholder="不展示给用户">
      </div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>干扰汉字</label>
        <table class="mini-table">
          <thead><tr><th>汉字</th><th>拼音</th><th>干扰类型</th><th></th></tr></thead>
          <tbody>
            <tr><td><input class="proto-input" value="买" style="width:50px;text-align:center"></td><td><input class="proto-input" value="mǎi" style="width:60px"></td><td><select class="proto-select" style="width:110px"><option selected>同音近音</option><option>形近字</option></select></td><td><span class="proto-btn-sm">🗑</span></td></tr>
            <tr><td><input class="proto-input" value="卖" style="width:50px;text-align:center"></td><td><input class="proto-input" value="mài" style="width:60px"></td><td><select class="proto-select" style="width:110px"><option selected>同音异字</option></select></td><td><span class="proto-btn-sm">🗑</span></td></tr>
            <tr><td><input class="proto-input" value="迈" style="width:50px;text-align:center"></td><td><input class="proto-input" value="mài" style="width:60px"></td><td><select class="proto-select" style="width:110px"><option selected>同音异字</option></select></td><td><span class="proto-btn-sm">🗑</span></td></tr>
          </tbody>
        </table>
        <div style="text-align:center;padding:8px;color:var(--primary);cursor:pointer;font-size:13px">+ 添加</div>
      </div>
      <div class="proto-field">
        <label class="proto-label">选项辅助显示</label>
        <div style="display:flex;gap:12px">
          <label class="text-sm"><input type="checkbox"> 显示拼音(默认关闭)</label>
          <label class="text-sm"><input type="checkbox"> 显示释义</label>
        </div>
      </div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label">答案解析</label><div class="form-row"><textarea class="proto-textarea">「麦」(mài) 指小麦。注意区分同音字「卖」(售卖)和「迈」(迈步)。</textarea><textarea class="proto-textarea">"麦" (mài) means wheat. Note homophones: 卖 (sell), 迈 (stride).</textarea></div></div>
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option>HSK 1</option><option selected>HSK 2</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="25"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>简单</option><option selected>中等</option></select></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI批量生成</span></div>
    </div>
  </div>


</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
