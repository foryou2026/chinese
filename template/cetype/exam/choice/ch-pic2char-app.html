<link rel="stylesheet" href="../../styles-app.css">

.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>

  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 汉字 × 图片选汉字</span>
</div>


  <a href="../../../exam/choice/ch-pic2char.html" class="back-link" style="margin-left:auto;color:#d46b08">Admin端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 汉字 × 图片选汉字</strong> — 展示一张图片，从4个汉字中选出图片对应的汉字。图→字映射，测试词汇的视觉联想。<br>
  <span class="field-map">应用端核心元素: <strong>图片展示区(占半屏)</strong> + <strong>汉字网格选项</strong></span>
</div>
<div class="shared-tpl">共用模板: 汉字网格选项 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 图片选汉字</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>汉字测试</h3><span class="progress">Q2/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:20%"></div></div>
          <div class="app-content">
            <div class="q-instruction">看图片，选择对应的汉字 Look at the picture and choose</div>
            <!-- 图片展示区 -->
            <div style="text-align:center;padding:16px 0">
              <div style="width:180px;height:130px;background:linear-gradient(135deg,#e6f4ff,#bae0ff);border-radius:12px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:64px">🐱</div>
              <div style="font-size:12px;color:rgba(0,0,0,.35);margin-top:6px">What character matches this picture?</div>
            </div>
            <div class="option-grid">
              <div class="option-item selected"><span style="font-size:32px">猫</span></div>
              <div class="option-item"><span style="font-size:32px">狗</span></div>
              <div class="option-item"><span style="font-size:32px">鸟</span></div>
              <div class="option-item"><span style="font-size:32px">鱼</span></div>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">确认答案 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>


</div>
