<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择题 · 汉字 · 释义选汉字</title>
<link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← 选择题 · 全部变体</a>
  <h1>#5 释义选汉字</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">选择题 × 汉字 × 释义选汉字</span>
</div>


  <a href="../../app/exam/choice/ch-def2char.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a>
<div class="content">
<div class="type-desc">
  <strong>选择题 × 汉字 × 释义选汉字</strong> — 只展示中英文释义(无拼音提示)，从汉字选项中选出正确答案。比「拼音选汉字」更难，因为没有读音提示。<br>
  <span class="field-map">应用端核心元素: <strong>中英释义(无拼音)</strong> + <strong>汉字网格选项(无拼音辅助)</strong></span>
</div>
<div class="shared-tpl">共用模板: 汉字网格选项 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 释义选汉字 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>与「拼音选汉字」的管理端差异：<strong>题干无拼音字段</strong>，只有中英释义；选项默认<strong>不显示拼音辅助</strong>，干扰维度以<strong>形近字</strong>为主。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="选择题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="汉字" disabled></div>
        <div class="proto-field"><label class="proto-label">L3</label><input class="proto-input" value="释义选汉字" disabled></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>目标汉字</label>
        <input class="proto-input lg" value="大" style="text-align:center">
      </div>
      <div class="form-row">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>中文释义(题干)</label><input class="proto-input" value="大 · 小的反义词"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>英文释义(题干)</label><input class="proto-input" value="big; large — opposite of 小"></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>干扰汉字 <span class="hint">应为形近字，本L3侧重纯视觉辨识</span></label>
        <table class="mini-table">
          <thead><tr><th>汉字</th><th>干扰类型</th><th>形近说明</th><th></th></tr></thead>
          <tbody>
            <tr><td><input class="proto-input" value="太" style="width:50px;text-align:center"></td><td><select class="proto-select" style="width:100px"><option selected>形近字</option></select></td><td><input class="proto-input" value="多一点" style="width:120px"></td><td><span class="proto-btn-sm">🗑</span></td></tr>
            <tr><td><input class="proto-input" value="天" style="width:50px;text-align:center"></td><td><select class="proto-select" style="width:100px"><option selected>形近字</option></select></td><td><input class="proto-input" value="上面一横" style="width:120px"></td><td><span class="proto-btn-sm">🗑</span></td></tr>
            <tr><td><input class="proto-input" value="犬" style="width:50px;text-align:center"></td><td><select class="proto-select" style="width:100px"><option selected>形近字</option></select></td><td><input class="proto-input" value="多一撇" style="width:120px"></td><td><span class="proto-btn-sm">🗑</span></td></tr>
          </tbody>
        </table>
        <div style="text-align:center;padding:8px;color:var(--primary);cursor:pointer;font-size:13px">+ 添加干扰项</div>
      </div>
      <div class="proto-field">
        <label class="proto-label">选项辅助显示</label>
        <div style="display:flex;gap:12px">
          <label class="text-sm"><input type="checkbox"> 显示拼音(默认关闭, 本L3测试纯视觉)</label>
          <label class="text-sm"><input type="checkbox"> 显示释义</label>
        </div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <textarea class="proto-textarea">「大」(dà) — 注意区分「太」(多一点)、「天」(上面一横)、「犬」(多一撇)。</textarea>
          <textarea class="proto-textarea">"大" — distinguish from 太 (extra dot), 天 (top stroke), 犬 (extra stroke).</textarea>
        </div>
      </div>
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="20"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>简单</option><option selected>中等</option></select></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI批量生成</span></div>
    </div>
  </div>


</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
