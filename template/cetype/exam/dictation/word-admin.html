<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听写题 · 单词 · 听写词语</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 听写题 · 全部变体</a>
  <h1>#2 听写词语</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">听写题 × 单词 × 听写词语</span>

  <a href="../../app/exam/dictation/word.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>听写题 × 单词 × 听写词语</strong> — 播放词语级音频，用户听写输入。判分基于文本匹配。<br><span class="field-map">应用端: <strong>音频播放器</strong> + <strong>汉字输入框(可手写)</strong> + <strong>逐字反馈</strong></span></div>
<div class="shared-tpl">共用模板: 音频播放器 + 文本输入 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 听写词语 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="听写题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="单词" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="听写词语" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>听写词语</strong>。音频必填+正确文本+匹配规则。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>词语音频</label><div class="upload-area">🎧 上传音频 (必填)</div></div>
      <div class="proto-field"><label class="proto-label">慢速音频</label><div class="upload-area sm">🐢 慢速版</div></div>
      <div class="proto-field"><label class="proto-label">最大播放次数</label><input class="proto-input" type="number" value="3" style="width:80px"></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>正确词语</label><input class="proto-input lg" value="学校" style="text-align:center"></div>
      <div class="proto-field"><label class="proto-label">可接受答案</label><div class="tag-input"><span class="tag-item">学校 <span class="close">×</span></span></div></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「学校」(xuéxiào) = 学习的场所。注意「校」的声调是第四声。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"学校" (xuéxiào) = school. Note: 校 is 4th tone.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="30"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option selected>简单</option><option >中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
