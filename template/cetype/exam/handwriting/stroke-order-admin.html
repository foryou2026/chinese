<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手写识别 · 笔顺 · 笔顺书写</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 手写识别 · 全部变体</a>
  <h1>#3 笔顺书写</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.002-0.01/次</span>
  <span class="subtitle">手写识别 × 笔顺 × 笔顺书写</span>

  <a href="../../app/exam/handwriting/stroke-order.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>手写识别 × 笔顺书写</strong> — Canvas手写+AI实时识别评分。<br><span class="field-map">应用端: <strong>Canvas手写区</strong> + <strong>AI识别反馈</strong> + <strong>评分详情</strong></span></div>
<div class="shared-tpl">共用模板: Canvas手写区 + 撤销/清除控制 + AI评分反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 笔顺书写 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="手写识别" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="笔顺" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="笔顺书写" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: 逐笔AI检测，每笔一次识别。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>目标汉字</label><input class="proto-input lg" value="大" style="text-align:center"></div>
        <div class="proto-field"><label class="proto-label">拼音</label><input class="proto-input" value="dà"></div>
        <div class="proto-field"><label class="proto-label">笔画数</label><input class="proto-input" type="number" value="3"></div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>笔顺数据</label>
        <div class="upload-area sm">📁 上传笔顺SVG/坐标数据</div>
        <div style="margin-top:6px"><span class="proto-btn-sm">🤖 从汉字库自动获取</span></div>
      </div>
      <div class="proto-field"><label class="proto-label">笔画名称序列</label><div class="tag-input"><span class="tag-item">横 <span class="close">×</span></span><span class="tag-item">撇 <span class="close">×</span></span><span class="tag-item">捺 <span class="close">×</span></span></div></div>
      <div class="proto-field"><label class="proto-label">容差设置</label><input class="proto-input" type="number" value="20" style="width:80px"> <span class="text-xs text-muted">笔画偏差容许像素</span></div>
      <div class="proto-field"><label class="proto-label">Canvas背景</label><select class="proto-select"><option>米字格</option><option selected>田字格</option><option>空白</option></select></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
