<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手写识别 · 汉字 · 看拼音写字</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 手写识别 · 全部变体</a>
  <h1>#1 看拼音写字</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.002-0.01/次</span>
  <span class="subtitle">手写识别 × 汉字 × 看拼音写字</span>

  <a href="../../app/exam/handwriting/pinyin-write.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>手写识别 × 看拼音写字</strong> — Canvas手写+AI实时识别评分。<br><span class="field-map">应用端: <strong>Canvas手写区</strong> + <strong>AI识别反馈</strong> + <strong>评分详情</strong></span></div>
<div class="shared-tpl">共用模板: Canvas手写区 + 撤销/清除控制 + AI评分反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 看拼音写字 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="手写识别" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="汉字" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="看拼音写字" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: 每次提交调用AI手写识别，<strong>~$0.005/次</strong>。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>目标汉字</label><input class="proto-input lg" value="水" style="text-align:center"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>拼音</label><input class="proto-input" value="shuǐ"></div>
        <div class="proto-field"><label class="proto-label">释义(EN)</label><input class="proto-input" value="water"></div>
      </div>
      <div class="proto-field"><label class="proto-label">识别置信度阈值</label><input class="proto-input" type="number" value="80" style="width:80px"> <span class="text-xs text-muted">低于此值判为错误</span></div>
      <div class="proto-field"><label class="proto-label">评分维度</label>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label class="text-sm"><input type="checkbox" checked> 字形准确度(整体形状)</label>
          <label class="text-sm"><input type="checkbox" checked> 结构(部件位置关系)</label>
          <label class="text-sm"><input type="checkbox" checked> 比例(大小匀称)</label>
        </div></div>
      <div class="proto-field"><label class="proto-label">Canvas背景</label><select class="proto-select"><option selected>淡色参考字(水印)</option><option>米字格</option><option>田字格</option><option>空白</option></select></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
