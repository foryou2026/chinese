<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口语表达 · 描述 · 看图说话 · 管理端</title>
<link rel="stylesheet" href="../../../../docs/B02-experience-design/admin/prototype-style/app.css">
<style>
.page-header{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:var(--space-3);position:sticky;top:0;z-index:var(--z-sticky);flex-wrap:wrap;box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow)}
.page-header h1{font-size:var(--text-lg);font-weight:var(--weight-semibold)}
.page-header .subtitle{color:var(--text-muted);font-size:var(--text-sm)}
.back-link{color:var(--color-brand-default);text-decoration:none;font-size:var(--text-sm);transition:color var(--motion-fast)}
.back-link:hover{text-decoration:underline;color:var(--color-brand-hover)}
.badge{display:inline-block;font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-pill);font-weight:var(--weight-regular)}
.badge.blue{background:var(--color-info-50);color:var(--color-info-500);border:1px solid var(--color-info-200)}
.badge.green{background:var(--color-success-50);color:var(--color-success-500);border:1px solid var(--color-success-200)}
.badge.solid-green{background:var(--color-success-500);color:#fff}
.badge.solid-red{background:var(--color-danger-500);color:#fff}
.badge.red{background:var(--color-danger-50);color:var(--color-danger-500);border:1px solid var(--color-danger-200)}
.badge.orange{background:var(--color-warning-50);color:var(--color-warning-700);border:1px solid var(--color-warning-200)}
.content{max-width:1440px;margin:0 auto;padding:var(--space-6);position:relative;z-index:1}
.type-desc{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur-sm);backdrop-filter:var(--glass-blur-sm);border:1px solid var(--glass-border);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-5);font-size:var(--text-sm);line-height:var(--leading-loose)}
.type-desc strong{color:var(--color-brand-default)}
.shared-tpl{background:var(--color-success-50);border:1px solid var(--color-success-200);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--color-success-700);margin:8px 0;display:inline-flex;align-items:center;gap:4px}
.shared-tpl::before{content:'\267b'}
.field-map{font-size:11px;color:var(--text-muted);margin-top:4px}
.field-map strong{color:var(--color-brand-default);font-weight:var(--weight-medium)}
.card{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--glass-border);font-weight:var(--weight-semibold);font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-body{padding:20px}
.callout{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin:var(--space-3) 0;font-size:var(--text-sm);display:flex;gap:8px;line-height:var(--leading-normal)}
.callout.info{background:var(--color-info-50);border:1px solid var(--color-info-200)}
.callout.cost{background:var(--color-warning-50);border:1px solid var(--color-warning-200)}
.callout .icon{font-size:16px;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.form-row.t3{grid-template-columns:1fr 1fr 1fr}
.form-row.t4{grid-template-columns:1fr 1fr 1fr 1fr}
.divider{border:none;border-top:1px solid var(--color-neutral-200);margin:var(--space-4) 0}
.upload-area{border:2px dashed var(--border-color);border-radius:var(--radius-sm);padding:var(--space-4);text-align:center;color:var(--text-muted);cursor:pointer;transition:var(--transition-all)}
.upload-area:hover{border-color:var(--color-brand-default);color:var(--color-brand-default)}
.upload-area.sm{padding:10px}
.list-builder{border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm)}
.list-builder-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-bottom:1px solid var(--color-neutral-100)}
.list-builder-item:last-child{border-bottom:none}
.list-builder-item .drag{color:var(--color-neutral-400);cursor:grab;padding-top:4px}
.list-builder-item .content{flex:1}
.list-builder-add{padding:8px;text-align:center;color:var(--color-brand-default);cursor:pointer;border-top:1px dashed var(--color-neutral-200);font-size:var(--text-sm)}
.btn-group{display:flex;gap:8px;margin-top:var(--space-4);flex-wrap:wrap}
.proto-label .req{color:var(--color-danger-500);margin-right:4px}
.proto-label .hint{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-xs);margin-left:6px}
.proto-field{margin-bottom:18px}
.mini-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.mini-table th{text-align:left;padding:6px 8px;background:var(--color-neutral-50);border-bottom:1px solid var(--color-neutral-200);font-weight:var(--weight-medium);font-size:var(--text-xs);color:var(--text-muted)}
.mini-table td{padding:6px 8px;border-bottom:1px solid var(--color-neutral-100)}
.tag-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm);min-height:36px}
.tag-item{background:var(--color-brand-50);color:var(--color-brand-default);border:1px solid var(--color-brand-200);padding:2px 8px;border-radius:var(--radius-pill);font-size:var(--text-xs);display:inline-flex;align-items:center;gap:4px}
.tag-item .close{cursor:pointer;opacity:.6}
</style>
</head>
<body>
<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 口语表达 · 全部变体</a>
  <h1>#1 看图说话</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.01-0.03/次</span>
  <span class="subtitle">口语表达 × 描述 × 看图说话</span>
  <a href="pic-talk-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>口语表达 × 看图说话</strong> — 开放式口语+AI语义理解评分。<br><span class="field-map">应用端: <strong>题目展示</strong> + <strong>录音</strong> + <strong>AI反馈(多维度)</strong></span></div>
<div class="shared-tpl">共用模板: 录音控制器 + AI评分反馈 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 看图说话 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="口语表达" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="描述" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="看图说话" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: STT转录+LLM语义理解+评分，<strong>~$0.03/次</strong>。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>图片</label><div class="upload-area">📷 上传图片 (必填)</div></div>
      <div class="proto-field"><label class="proto-label">提示词列表 <span class="hint">展示给用户的参考词</span></label><div class="tag-input"><span class="tag-item">海边 <span class="close">×</span></span><span class="tag-item">家人 <span class="close">×</span></span><span class="tag-item">开心 <span class="close">×</span></span><span class="tag-item">夏天 <span class="close">×</span></span></div></div>
      <div class="proto-field"><label class="proto-label">录音时长限制(秒)</label><input class="proto-input" type="number" value="30" style="width:80px"></div>
      <div class="proto-field"><label class="proto-label">参考答案</label><textarea class="proto-textarea">这是一家人在海边玩。夏天的时候，他们去海边度假。爸爸妈妈带着孩子，大家都很开心。</textarea></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>AI评分Prompt模板</label><textarea class="proto-textarea" style="min-height:80px">请评估用户的口语表达。评分维度：内容相关性(是否描述了图片内容)、词汇丰富度、语法正确性、发音清晰度。</textarea></div>
      <div class="proto-field"><label class="proto-label">评分维度+权重</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="内容相关性"><input class="proto-input" type="number" value="30" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="词汇丰富度"><input class="proto-input" type="number" value="25" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="语法正确性"><input class="proto-input" type="number" value="25" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="发音清晰度"><input class="proto-input" type="number" value="20" style="width:60px"><span class="text-xs">%</span></div></div></div>
        </div></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option >HSK 2</option><option selected>HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="10"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="90"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option >中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
<script>proto.bootstrap();</script>
</body>
</html>
