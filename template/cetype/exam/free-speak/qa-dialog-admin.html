<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口语表达 · 对话 · 问答式口语</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 口语表达 · 全部变体</a>
  <h1>#3 问答式口语</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.01-0.03/次</span>
  <span class="subtitle">口语表达 × 对话 × 问答式口语</span>

  <a href="../../app/exam/free-speak/qa-dialog.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>口语表达 × 问答式口语</strong> — 开放式口语+AI语义理解评分。<br><span class="field-map">应用端: <strong>题目展示</strong> + <strong>录音</strong> + <strong>AI反馈(多维度)</strong></span></div>
<div class="shared-tpl">共用模板: 录音控制器 + AI评分反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 问答式口语 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="口语表达" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="对话" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="问答式口语" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: 多轮对话，每轮STT+LLM。成本随轮数增加。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>问题序列</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="text-sm" style="font-weight:500">第1轮:</div><input class="proto-input" value="你好！请问你叫什么名字？" style="margin-top:4px"><div class="upload-area sm" style="margin-top:4px">🎧 问题音频</div></div></div>
          <div class="list-builder-item"><div class="content"><div class="text-sm" style="font-weight:500">第2轮:</div><input class="proto-input" value="你是哪国人？" style="margin-top:4px"><div class="upload-area sm" style="margin-top:4px">🎧 问题音频</div></div></div>
          <div class="list-builder-item"><div class="content"><div class="text-sm" style="font-weight:500">第3轮:</div><input class="proto-input" value="你为什么学中文？" style="margin-top:4px"><div class="upload-area sm" style="margin-top:4px">🎧 问题音频</div></div></div>
          <div class="list-builder-add">+ 添加轮次</div>
        </div></div>
      <div class="proto-field"><label class="proto-label">轮数限制</label><input class="proto-input" type="number" value="3" style="width:60px"></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>AI评分Prompt</label><textarea class="proto-textarea">评估用户的多轮口语对话。维度: 语义理解、回答相关性、词汇、语法、发音。</textarea></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option >HSK 2</option><option selected>HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="10"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="90"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option >中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
