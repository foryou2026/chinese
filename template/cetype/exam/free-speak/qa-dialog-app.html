<div class="page-header">

<div class="content">
<div class="type-desc"><strong>口语表达 × 问答式口语</strong> — 开放式口语+AI语义理解评分。<br><span class="field-map">应用端: <strong>题目展示</strong> + <strong>录音</strong> + <strong>AI反馈(多维度)</strong></span></div>
<div class="shared-tpl">共用模板: 录音控制器 + AI评分反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 问答式口语</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header pro"><span class="back">←</span><h3>口语表达</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">听问题，用中文回答 Listen and answer in Chinese</div>
            <div style="margin:16px 0;display:flex;gap:8px;align-items:flex-start">
              <div style="width:36px;height:36px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0">AI</div>
              <div style="flex:1;background:#e6f4ff;border-radius:0 12px 12px 12px;padding:12px"><div style="font-size:14px">你好！请问你叫什么名字？</div><div style="margin-top:4px"><span class="audio-btn" style="font-size:11px;padding:4px 10px">🔊</span></div></div>
            </div>
            <div class="mic-btn">🎤</div>
            <div class="text-sm text-muted" style="text-align:center">第 1/3 轮 · 点击录音回答</div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">提交回答 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
