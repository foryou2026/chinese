<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跟读评分 · 句段 · 段落跟读</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 跟读评分 · 全部变体</a>
  <h1>#4 段落跟读</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.004-0.02/次</span>
  <span class="subtitle">跟读评分 × 句段 × 段落跟读</span>

  <a href="../../app/exam/speaking/paragraph-read.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>跟读评分 × 段落跟读</strong> — 范读音频+录音跟读+AI评分。<br><span class="field-map">应用端: <strong>范读播放</strong> + <strong>内容展示</strong> + <strong>录音按钮</strong> + <strong>AI评分反馈</strong></span></div>
<div class="shared-tpl">共用模板: 音频播放器 + 录音控制器 + AI评分反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 段落跟读 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="跟读评分" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="句段" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="段落跟读" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: 每次录音提交调用AI语音评估。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>目标段落</label><textarea class="proto-textarea" style="min-height:80px">我叫小明。我是中国人。我住在北京。</textarea></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>范读音频</label><div class="upload-area">🎧 上传</div></div>
      <div class="proto-field"><label class="proto-label">分段标记</label><div><span class="switch on"></span> <span class="text-sm text-muted">按句拆分，逐句跟读</span></div></div>
      <div class="proto-field"><label class="proto-label">评分维度+权重</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="声调" disabled><input class="proto-input" type="number" value="25" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="发音" disabled><input class="proto-input" type="number" value="25" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="流利度" disabled><input class="proto-input" type="number" value="25" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="语速" disabled><input class="proto-input" type="number" value="25" style="width:60px"><span class="text-xs">%</span></div></div></div>
        </div></div>
      <div class="proto-field"><label class="proto-label">通过阈值</label><input class="proto-input" type="number" value="70" style="width:80px"> <span class="text-xs text-muted">低于此分判为不通过</span></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
