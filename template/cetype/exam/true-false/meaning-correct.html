<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>判断题 · 词义 · 词义正误</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 判断题 · 全部变体</a>
  <h1>#3 词义正误</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">判断题 × 词义 × 词义正误</span>

  <a href="../../app/exam/true-false/meaning-correct.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>判断题 × 词义 × 词义正误</strong> — 展示词语+标注释义，判断释义是否正确。<br><span class="field-map">应用端: <strong>命题展示</strong> + <strong>✓/✗ 判断按钮</strong> + <strong>答案反馈</strong></span></div>
<div class="shared-tpl">共用模板: 对/错按钮 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 词义正误 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="判断题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="词义" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="词义正误" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>词义正误</strong>。词语+标注释义(可能正确或错误)。</div></div>
      <div class="form-row">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>词语</label><input class="proto-input lg" value="认真"></div>
        <div class="proto-field"><label class="proto-label">拼音</label><input class="proto-input" value="rènzhēn"></div>
      </div>
      <div class="form-row">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>标注释义(中文)</label><input class="proto-input" value="不马虎，态度严肃"></div>
        <div class="proto-field"><label class="proto-label">标注释义(EN)</label><input class="proto-input" value="serious; conscientious"></div>
      </div>
      <div class="proto-field"><label class="proto-label">正确释义 <span class="hint">若标注错误则填正确释义</span></label><input class="proto-input" placeholder="标注正确则留空"></div>
            <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>正确判断</label>
        <select class="proto-select" style="width:120px"><option selected>对 ✓</option><option>错 ✗</option></select>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「认真」(rènzhēn) 释义为"不马虎，态度严肃"，标注正确。近义词: 仔细、严肃。反义词: 马虎、随便。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"认真" (rènzhēn) means "serious; conscientious; not careless." The given definition is correct. Synonyms: 仔细, 严肃. Antonyms: 马虎, 随便.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="20"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
