  <h1>#6 用法正误</h1>

<div class="content">
<div class="type-desc"><strong>判断题 × 语法 × 用法正误</strong> — 词语用法例句，判断用法是否正确。<br><span class="field-map">应用端: <strong>命题展示</strong> + <strong>✓/✗ 判断按钮</strong> + <strong>答案反馈</strong></span></div>
<div class="shared-tpl">共用模板: 对/错按钮 + 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 用法正误 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="判断题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="语法" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="用法正误" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>用法正误</strong>。展示词语+用法例句，判断用法对错。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>目标词语/句型</label><input class="proto-input lg" value="虽然...但是..."></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>用法例句</label><input class="proto-input" value="虽然他很忙，但是他还是来了。" style="font-size:16px"></div>
      <div class="proto-field"><label class="proto-label">英文翻译</label><input class="proto-input" value="Although he was busy, he still came."></div>
      <div class="proto-field"><label class="proto-label">高亮词语</label><div class="tag-input"><span class="tag-item">虽然 <span class="close">×</span></span><span class="tag-item">但是 <span class="close">×</span></span></div></div>
            <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>正确判断</label>
        <select class="proto-select" style="width:120px"><option selected>对 ✓</option><option>错 ✗</option></select>
      </div>
      <div class="proto-field"><label class="proto-label">用法说明</label><textarea class="proto-textarea">「虽然...但是...」表示转折，前半句承认事实，后半句转折。主语可在虽然前或后。</textarea></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「虽然他很忙，但是他还是来了」用法正确。「虽然...但是...」表转折关系，主语「他」在「虽然」之后，语法正确。「还是」加强转折语气。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"虽然他很忙，但是他还是来了" is correct usage. "虽然...但是..." expresses contrast (although...but...). Subject "他" after "虽然" is grammatically valid. "还是" reinforces the contrast.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="20"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
