<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>判断题 · 拼音 · 拼音正误</title><link rel="stylesheet" href="../../styles.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 判断题 · 全部变体</a>
  <h1>#1 拼音正误</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">判断题 × 拼音 × 拼音正误</span>
</div>
<div class="content">
<div class="type-desc"><strong>判断题 × 拼音 × 拼音正误</strong> — 展示汉字+标注的拼音，判断拼音标注是否正确。<br><span class="field-map">应用端: <strong>命题展示</strong> + <strong>✓/✗ 判断按钮</strong> + <strong>答案反馈</strong></span></div>
<div class="shared-tpl">共用模板: 对/错按钮 + 答案解析区 + 元数据区</div>
<div class="split">
  <div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 拼音正误</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>判断题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">判断拼音标注是否正确 Is the pinyin correct?</div>
            <div style="text-align:center;padding:20px 0">
              <div style="font-size:64px;font-weight:300;color:#333">快</div>
              <div style="font-size:24px;color:var(--primary);margin-top:8px">kuài</div>
              <div style="margin-top:8px"><span class="audio-btn">🔊</span></div>
            </div>
            <div style="display:flex;gap:16px;justify-content:center;margin:20px 0">
              <div style="width:100px;height:60px;border:2px solid var(--success);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;background:#f6ffed">✓ 对</div>
              <div style="width:100px;height:60px;border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer">✗ 错</div>
            </div>
            <div style="padding:16px 0"><span class="btn btn-primary btn-block">确认 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 拼音正误 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="form-group"><label class="form-label">L1 题型</label><input class="form-input" value="判断题" disabled></div>
        <div class="form-group"><label class="form-label">L2 知识类型</label><input class="form-input" value="拼音" disabled></div>
        <div class="form-group"><label class="form-label">L3 题目类型</label><input class="form-input" value="拼音正误" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>拼音正误</strong>。配置汉字+标注拼音(可能正确也可能故意写错)。</div></div>
      <div class="form-row t3">
        <div class="form-group"><label class="form-label"><span class="req">*</span>汉字</label><input class="form-input lg" value="快" style="text-align:center"></div>
        <div class="form-group"><label class="form-label"><span class="req">*</span>标注拼音(展示给用户)</label><input class="form-input lg" value="kuài"></div>
        <div class="form-group"><label class="form-label">正确拼音</label><input class="form-input" value="kuài" placeholder="若标注正确则与上方相同"></div>
      </div>
      <div class="form-group">
        <label class="form-label"><span class="req">*</span>正确判断</label>
        <select class="form-select" style="width:120px"><option selected>对 ✓</option><option>错 ✗</option></select>
      </div>
      <div class="form-group"><label class="form-label">错误说明 <span class="hint">若拼音标注错误则填写</span></label><textarea class="form-textarea" placeholder="标注正确则留空"></textarea></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="form-group"><label class="form-label">HSK</label><select class="form-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="form-group"><label class="form-label">分值</label><input class="form-input" type="number" value="2"></div>
        <div class="form-group"><label class="form-label">限时(秒)</label><input class="form-input" type="number" value="20"></div>
        <div class="form-group"><label class="form-label">难度</label><select class="form-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="btn btn-primary">💾 保存</span>
        <span class="btn">👁 预览</span>
        <span class="btn">🤖 AI批量生成</span>
      </div>
    </div>
  </div>
</div>
</div>
</body></html>
