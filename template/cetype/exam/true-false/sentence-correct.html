<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>判断题 · 语法 · 句子正误</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 判断题 · 全部变体</a>
  <h1>#5 句子正误</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">判断题 × 语法 × 句子正误</span>

  <a href="../../app/exam/true-false/sentence-correct.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>判断题 × 语法 × 句子正误</strong> — 中文句子，判断语法是否正确。<br><span class="field-map">应用端: <strong>命题展示</strong> + <strong>✓/✗ 判断按钮</strong> + <strong>答案反馈</strong></span></div>
<div class="shared-tpl">共用模板: 对/错按钮 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 句子正误 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="判断题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="语法" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="句子正误" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>句子正误</strong>。展示句子+关联语法点，判断语法正误。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>中文句子</label><input class="proto-input" value="我把作业做完了。" style="font-size:16px"></div>
      <div class="proto-field"><label class="proto-label">英文翻译</label><input class="proto-input" value="I finished (doing) the homework."></div>
      <div class="proto-field"><label class="proto-label">关联语法点</label><select class="proto-select"><option>把字句</option><option>被字句</option><option>时态助词</option><option>结构助词</option><option>自定义</option></select></div>
      <div class="proto-field"><label class="proto-label">高亮关键词 <span class="hint">应用端蓝底高亮</span></label><input class="proto-input" value="完了"></div>
            <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>正确判断</label>
        <select class="proto-select" style="width:120px"><option selected>对 ✓</option><option>错 ✗</option></select>
      </div>
      <div class="proto-field"><label class="proto-label">错误说明 <span class="hint">若句子有错</span></label><textarea class="proto-textarea" placeholder="若正确则留空"></textarea></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「我把作业做完了」是正确的「把」字句。结构: 主语+把+宾语+动词+补语。「做完了」表示动作完成。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"我把作业做完了" is a correct "把" sentence. Structure: Subject+把+Object+Verb+Complement. "做完了" indicates completed action.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="2"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="20"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
