<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 排序题 · 全部变体</a>
  <h1>#3 句子排段</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">排序题 × 句序 × 句子排段</span>
  <a href="sentence-paragraph-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>排序题 × 句序 × 句子排段</strong> — 打散的句子卡片，拖拽排列成连贯段落。高级逻辑思维训练，考察语篇衔接能力。<br><span class="field-map">应用端: <strong>打散句子条(拖拽)</strong> + <strong>序号标记</strong> + <strong>段落语境提示(可选)</strong></span></div>
<div class="shared-tpl">共用模板: 拖拽排序交互 + 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 句子排段 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="排序题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="句序" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="句子排段" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>句子排段</strong>。输入正确段落，系统自动拆句打散。</div></div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>正确段落</label>
        <textarea class="proto-textarea" style="min-height:100px">我每天早上七点起床。起床以后，先吃早饭。然后我去上班。晚上我喜欢看书或者看电视。</textarea>
      </div>
      <div class="proto-field">
        <label class="proto-label">英文翻译</label>
        <textarea class="proto-textarea">I wake up at 7am every day. After waking up, I eat breakfast first. Then I go to work. In the evening, I like reading or watching TV.</textarea>
      </div>
      <div class="proto-field">
        <label class="proto-label">段落语境提示</label>
        <input class="proto-input" value="我的一天" placeholder="主题提示(可选)">
      </div>
      <div class="proto-field">
        <label class="proto-label">拆句方式</label>
        <select class="proto-select"><option selected>按句号/问号自动拆分</option><option>手动指定拆分点</option></select>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">按时间线排列: ①早上七点起床 → ②起床后吃早饭 → ③然后去上班 → ④晚上看书/电视。关键衔接词:「以后」「然后」「晚上」标示时间推进。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Chronological order: ①7am wake up → ②eat breakfast → ③go to work → ④read/watch TV in evening. Connectors: "以后" (after), "然后" (then), "晚上" (evening) mark time progression.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option >HSK 2</option><option selected>HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="90"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
