.shared-tpl::before { content:'\267b'; }

<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 排序题 · 全部变体</a>
  <h1>#4 对话排序</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">排序题 × 句序 × 对话排序</span>

  <a href="../../../exam/ordering/dialog-order.html" class="back-link" style="margin-left:auto;color:#d46b08">Admin端 →</a></div>
<div class="content">
<div class="type-desc"><strong>排序题 × 句序 × 对话排序</strong> — 打散的对话气泡(含角色标识A/B)，排列成正确的对话顺序。训练对话逻辑和语境理解。<br><span class="field-map">应用端: <strong>角色气泡(A/B区分)</strong> + <strong>拖拽排列</strong> + <strong>场景说明</strong></span></div>
<div class="shared-tpl">共用模板: 拖拽排序交互 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 对话排序</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>排序题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">将对话按正确顺序排列 Arrange the dialog</div>
            <div class="highlight-box blue" style="padding:8px;text-align:center;margin-bottom:12px"><span class="text-sm">📖 场景: 在餐厅点餐</span></div>
            <div style="display:flex;flex-direction:column;gap:8px;margin:12px 0">
              <div class="drag-chip" style="width:100%;text-align:left;display:flex;gap:8px;align-items:center"><span style="background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">B</span>好的，请稍等。</div>
              <div class="drag-chip" style="width:100%;text-align:left;display:flex;gap:8px;align-items:center"><span style="background:var(--error);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">A</span>你好，我要一杯咖啡。</div>
              <div class="drag-chip" style="width:100%;text-align:left;display:flex;gap:8px;align-items:center"><span style="background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">B</span>你好，请问需要什么？</div>
              <div class="drag-chip" style="width:100%;text-align:left;display:flex;gap:8px;align-items:center"><span style="background:var(--error);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">A</span>谢谢！</div>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">确认 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
