<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序题 · 词序 · 拼音音节排列</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 排序题 · 全部变体</a>
  <h1>#2 拼音音节排列</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">排序题 × 词序 × 拼音音节排列</span>

  <a href="../../app/exam/ordering/pinyin-syllable.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>排序题 × 词序 × 拼音音节排列</strong> — 打散的拼音音节卡片，排列成正确的完整拼音。训练音节感知和拼读能力。<br><span class="field-map">应用端: <strong>大号汉字提示</strong> + <strong>打散音节卡片</strong> + <strong>答案区</strong></span></div>
<div class="shared-tpl">共用模板: 拖拽排序交互 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 拼音音节排列 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="排序题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="词序" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="拼音音节排列" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>拼音音节排列</strong>。输入目标汉字和拼音，系统自动打散为音节。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>目标汉字</label><input class="proto-input lg" value="电脑" style="text-align:center"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>正确拼音</label><input class="proto-input lg" value="diànnǎo"></div>
        <div class="proto-field"><label class="proto-label">音频</label><div class="upload-area sm">📁 上传</div></div>
      </div>
      <div class="proto-field">
        <label class="proto-label">音节拆分</label>
        <div class="tag-input"><span class="tag-item">diàn <span class="close">×</span></span><span class="tag-item">nǎo <span class="close">×</span></span></div>
        <div class="text-xs text-muted mt-8">系统自动拆分，可手动调整</div>
      </div>
      <div class="proto-field">
        <label class="proto-label">干扰音节</label>
        <div class="tag-input"><span class="tag-item">niǎo <span class="close">×</span></span></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「电脑」拼音为 diànnǎo，拆分为两个音节: diàn + nǎo。干扰项 niǎo(鸟) 与 nǎo 形近易混淆。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"电脑" (computer) pinyin: diànnǎo = diàn + nǎo. Distractor niǎo (bird) looks similar to nǎo.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option><option >HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="30"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option selected>简单</option><option >中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
