<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序题 · 词序 · 词语排句</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 排序题 · 全部变体</a>
  <h1>#1 词语排句</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">排序题 × 词序 × 词语排句</span>

  <a href="../../app/exam/ordering/word-sentence.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>排序题 × 词序 × 词语排句</strong> — 将打散的词语卡片拖拽排列成正确的句子。初级语序训练，考察基本句法结构(SVO等)。<br><span class="field-map">应用端: <strong>打散词语卡片(可拖拽)</strong> + <strong>答案区(放置栏)</strong> + <strong>干扰词(可选)</strong></span></div>
<div class="shared-tpl">共用模板: 拖拽排序交互 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 词语排句 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="排序题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="词序" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="词语排句" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>词语排句</strong>。输入正确句子后系统自动打散。可添加<strong>干扰词</strong>增加难度。</div></div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>正确句子</label>
        <textarea class="proto-textarea" style="font-size:16px">我很喜欢吃中国菜。</textarea>
      </div>
      <div class="proto-field">
        <label class="proto-label">英文翻译</label>
        <input class="proto-input" value="I really like eating Chinese food.">
      </div>
      <div class="proto-field">
        <label class="proto-label">打散粒度</label>
        <select class="proto-select"><option selected>逐词打散</option><option>逐短语打散(保留固定搭配)</option></select>
      </div>
      <div class="proto-field">
        <label class="proto-label">干扰词 <span class="hint">额外加入的不属于句子的词，增加难度</span></label>
        <div class="tag-input"><span class="tag-item">在 <span class="close">×</span></span></div>
      </div>
      <div class="proto-field">
        <label class="proto-label">标点处理</label>
        <select class="proto-select"><option selected>自动补全句末标点</option><option>标点也作为卡片参与排序</option></select>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">正确语序: 我+很+喜欢+吃+中国菜。遵循SVO结构: 主语(我)+程度副词(很)+动词(喜欢)+动词(吃)+宾语(中国菜)。干扰词「在」不属于此句。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Correct order: 我+很+喜欢+吃+中国菜. SVO structure: Subject(我)+Adverb(很)+Verb(喜欢)+Verb(吃)+Object(中国菜). Distractor "在" doesn't belong.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="45"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
