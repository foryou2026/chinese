<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 排序题 · 全部变体</a>
  <h1>#4 对话排序</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">排序题 × 句序 × 对话排序</span>
  <a href="dialog-order-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>排序题 × 句序 × 对话排序</strong> — 打散的对话气泡(含角色标识A/B)，排列成正确的对话顺序。训练对话逻辑和语境理解。<br><span class="field-map">应用端: <strong>角色气泡(A/B区分)</strong> + <strong>拖拽排列</strong> + <strong>场景说明</strong></span></div>
<div class="shared-tpl">共用模板: 拖拽排序交互 + 答案解析区 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 对话排序 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="排序题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="句序" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="对话排序" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>对话排序</strong>。配置正确对话序列和角色信息，系统自动打散。</div></div>
      <div class="proto-field">
        <label class="proto-label">场景说明</label>
        <input class="proto-input" value="在餐厅点餐">
      </div>
      <div class="proto-field">
        <label class="proto-label"><span class="req">*</span>正确对话序列</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><select class="proto-select" style="width:60px"><option>A</option><option selected>B</option></select><input class="proto-input" value="你好，请问需要什么？"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><select class="proto-select" style="width:60px"><option selected>A</option><option>B</option></select><input class="proto-input" value="你好，我要一杯咖啡。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><select class="proto-select" style="width:60px"><option>A</option><option selected>B</option></select><input class="proto-input" value="好的，请稍等。"></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><select class="proto-select" style="width:60px"><option selected>A</option><option>B</option></select><input class="proto-input" value="谢谢！"></div></div></div>
          <div class="list-builder-add">+ 添加对话轮</div>
        </div>
      </div>
      <div class="form-row">
        <div class="proto-field"><label class="proto-label">角色A名称</label><input class="proto-input" value="顾客"></div>
        <div class="proto-field"><label class="proto-label">角色B名称</label><input class="proto-input" value="服务员"></div>
      </div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">对话逻辑: ①B招呼"请问需要什么？" → ②A点餐"我要一杯咖啡" → ③B回应"好的，请稍等" → ④A致谢"谢谢！"。遵循服务场景的自然对话顺序。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">Dialog logic: ①B greets → ②A orders coffee → ③B acknowledges → ④A thanks. Follows natural service scenario conversation flow.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
