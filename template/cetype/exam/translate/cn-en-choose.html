<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻译题 · 中→英 · 中英选择</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 翻译题 · 全部变体</a>
  <h1>#3 中英选择</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">翻译题 × 中→英 × 中英选择</span>

  <a href="../../app/exam/translate/cn-en-choose.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>翻译题 × 中→英 × 中英选择</strong> — 选择式翻译，从候选中选出正确译文。<br><span class="field-map">应用端: <strong>原句展示</strong> + <strong>选项列表</strong></span></div>
<div class="shared-tpl">共用模板: 标准选项列表 + 答案解析区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 中英选择 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="翻译题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="中→英" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="中英选择" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>中英选择</strong>。原句+翻译选项。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>中文原句</label><input class="proto-input" value="今天天气很好。" style="font-size:16px"></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>英文翻译选项</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="t3" checked><input class="proto-input" value="The weather is very nice today." style="border-color:var(--success)"><span class="text-xs" style="color:var(--success)">✓</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="t3"><input class="proto-input" value="Today is very hot."></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="t3"><input class="proto-input" value="It will rain tomorrow."></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input type="radio" name="t3"><input class="proto-input" value="The weather was bad yesterday."></div></div>
        </div></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「今天天气很好」= The weather is very nice today。「好」修饰「天气」。干扰项替换了时间(yesterday/tomorrow)或情感(hot)。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"今天天气很好" = The weather is very nice today. Distractors change tense or meaning.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="3"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="30"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
