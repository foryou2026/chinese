<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻译题 · 中→英 · 中英输入</title><link rel="stylesheet" href="../../styles.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 翻译题 · 全部变体</a>
  <h1>#4 中英输入</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">翻译题 × 中→英 × 中英输入</span>
</div>
<div class="content">
<div class="type-desc"><strong>翻译题 × 中→英 × 中英输入</strong> — 输入式翻译，用户直接输入译文，答案池匹配判分。<br><span class="field-map">应用端: <strong>原句展示</strong> + <strong>输入框</strong></span></div>
<div class="shared-tpl">共用模板: 文本输入框 + 答案解析区 + 元数据区</div>
<div class="split">
  <div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 中英输入</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header"><span class="back">←</span><h3>翻译题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">将中文翻译成English Translate</div>
            <div class="highlight-box gray" style="padding:16px;margin:16px 0">
              <div style="font-size:18px;font-weight:500;">我喜欢看电影。</div>
            </div>
            <div style="margin:16px 0"><input class="proto-input lg" placeholder="输入English翻译..." value="I like watching movies."></div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">确认 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 中英输入 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="翻译题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="中→英" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="中英输入" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout info"><span class="icon">📌</span><div>题目类型=<strong>中英输入</strong>。原句+输入框+多答案池匹配。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>中文原句</label><input class="proto-input" value="我喜欢看电影。" style="font-size:16px"></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>答案池 <span class="hint">所有可接受的英文翻译</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="I like watching movies." style="border-color:var(--success)"><span class="text-xs" style="color:var(--success);white-space:nowrap">主答案</span></div></div>
          <div class="list-builder-item"><div class="content"><input class="proto-input" value="I like to watch movies."></div></div>
          <div class="list-builder-item"><div class="content"><input class="proto-input" value="I enjoy watching movies."></div></div>
          <div class="list-builder-add">+ 添加 / 🤖 AI扩充</div>
        </div></div>
      <div class="proto-field"><label class="proto-label">匹配策略</label><select class="proto-select"><option selected>精确匹配答案池</option><option>忽略大小写+标点</option><option>Levenshtein相似度</option></select></div>
      <hr class="divider">
      <div class="proto-field">
        <label class="proto-label">答案解析</label>
        <div class="form-row">
          <div class="proto-field"><label class="proto-label text-sm">中文</label><textarea class="proto-textarea">「我喜欢看电影」= I like watching movies。「看」在此表示观看，「电影」= movies/films。</textarea></div>
          <div class="proto-field"><label class="proto-label text-sm">English</label><textarea class="proto-textarea">"我喜欢看电影" = I like watching movies. "看" means "to watch" here. "电影" = movies.</textarea></div>
        </div>
      </div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option selected>HSK 2</option><option >HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="5"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="60"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option selected>中等</option><option >困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>
</div>
</div>
<script src="../../../../docs/B02-experience-design/app/prototype-style/app.js"></script>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
