<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写作题 · 命题 · 命题写作</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 写作题 · 全部变体</a>
  <h1>#1 命题写作</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.002-0.008/次</span>
  <span class="subtitle">写作题 × 命题 × 命题写作</span>

  <a href="../../app/exam/free-write/topic-write.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>写作题 × 命题写作</strong> — 开放式写作+AI批改反馈。<br><span class="field-map">应用端: <strong>题目/图片展示</strong> + <strong>文本输入区</strong> + <strong>字数统计</strong> + <strong>AI批改反馈</strong></span></div>
<div class="shared-tpl">共用模板: 文本输入区 + 字数统计 + AI批改反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 命题写作 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="写作题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="命题" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="命题写作" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: LLM批改+反馈，<strong>~$0.008/次</strong>。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>题目(中文)</label><input class="proto-input" value="我的周末" style="font-size:16px"></div>
      <div class="proto-field"><label class="proto-label">题目(EN)</label><input class="proto-input" value="My Weekend"></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>写作要求</label><input class="proto-input" value="写80-120字，描述你通常周末做什么。"></div>
      <div class="form-row">
        <div class="proto-field"><label class="proto-label">最少字数</label><input class="proto-input" type="number" value="80" style="width:80px"></div>
        <div class="proto-field"><label class="proto-label">最多字数</label><input class="proto-input" type="number" value="120" style="width:80px"></div>
      </div>
      <div class="proto-field"><label class="proto-label">范文</label><textarea class="proto-textarea" style="min-height:80px">我的周末通常很充实。星期六上午我会去超市买菜，回家做一顿美味的午饭。下午我喜欢坐在阳台上看书。星期天早上我去公园跑步锻炼，下午和朋友一起喝咖啡聊天。我觉得周末应该既休息又充实。</textarea></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>AI批改Prompt</label><textarea class="proto-textarea" style="min-height:60px">批改关于"我的周末"的写作。评分维度: 内容完整性(是否描述了周末活动)、语法正确性、词汇丰富度、结构逻辑。给出具体修改建议。</textarea></div>
      <div class="proto-field"><label class="proto-label">评分维度+权重</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="内容"><input class="proto-input" type="number" value="30" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="语法"><input class="proto-input" type="number" value="30" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="词汇"><input class="proto-input" type="number" value="20" style="width:60px"><span class="text-xs">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="结构"><input class="proto-input" type="number" value="20" style="width:60px"><span class="text-xs">%</span></div></div></div>
        </div></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option >HSK 2</option><option selected>HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="10"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="600"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option >中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body></html>
