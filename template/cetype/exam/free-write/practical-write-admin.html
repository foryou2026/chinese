.badge.blue{background:var(--color-info-50);color:var(--color-info-500);border:1px solid var(--color-info-200)}

.content{max-width:1440px;margin:0 auto;padding:var(--space-6);position:relative;z-index:1}

.field-map{font-size:11px;color:var(--text-muted);margin-top:4px}
.field-map strong{color:var(--color-brand-default);font-weight:var(--weight-medium)}
.card{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--glass-border);font-weight:var(--weight-semibold);font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-body{padding:20px}
.callout{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin:var(--space-3) 0;font-size:var(--text-sm);display:flex;gap:8px;line-height:var(--leading-normal)}
.callout.info{background:var(--color-info-50);border:1px solid var(--color-info-200)}
.callout.cost{background:var(--color-warning-50);border:1px solid var(--color-warning-200)}
.callout .icon{font-size:16px;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.form-row.t3{grid-template-columns:1fr 1fr 1fr}
.form-row.t4{grid-template-columns:1fr 1fr 1fr 1fr}
.divider{border:none;border-top:1px solid var(--color-neutral-200);margin:var(--space-4) 0}
.upload-area{border:2px dashed var(--border-color);border-radius:var(--radius-sm);padding:var(--space-4);text-align:center;color:var(--text-muted);cursor:pointer;transition:var(--transition-all)}
.upload-area:hover{border-color:var(--color-brand-default);color:var(--color-brand-default)}
.upload-area.sm{padding:10px}
.list-builder{border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm)}
.list-builder-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-bottom:1px solid var(--color-neutral-100)}
.list-builder-item:last-child{border-bottom:none}
.list-builder-item .drag{color:var(--color-neutral-400);cursor:grab;padding-top:4px}
.list-builder-item .content{flex:1}
.list-builder-add{padding:8px;text-align:center;color:var(--color-brand-default);cursor:pointer;border-top:1px dashed var(--color-neutral-200);font-size:var(--text-sm)}
.btn-group{display:flex;gap:8px;margin-top:var(--space-4);flex-wrap:wrap}
.proto-label .req{color:var(--color-danger-500);margin-right:4px}
.proto-label .hint{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-xs);margin-left:6px}
.proto-field{margin-bottom:18px}
.mini-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.mini-table th{text-align:left;padding:6px 8px;background:var(--color-neutral-50);border-bottom:1px solid var(--color-neutral-200);font-weight:var(--weight-medium);font-size:var(--text-xs);color:var(--text-muted)}
.mini-table td{padding:6px 8px;border-bottom:1px solid var(--color-neutral-100)}
.tag-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm);min-height:36px}
.tag-item{background:var(--color-brand-50);color:var(--color-brand-default);border:1px solid var(--color-brand-200);padding:2px 8px;border-radius:var(--radius-pill);font-size:var(--text-xs);display:inline-flex;align-items:center;gap:4px}
.tag-item .close{cursor:pointer;opacity:.6}

<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 写作题 · 全部变体</a>
  <h1>#3 应用文写作</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.002-0.008/次</span>
  <span class="subtitle">写作题 × 应用 × 应用文写作</span>
  <a href="practical-write-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>写作题 × 应用文写作</strong> — 开放式写作+AI批改反馈。<br><span class="field-map">应用端: <strong>题目/图片展示</strong> + <strong>文本输入区</strong> + <strong>字数统计</strong> + <strong>AI批改反馈</strong></span></div>
<div class="shared-tpl">共用模板: 文本输入区 + 字数统计 + AI批改反馈 + 元数据区</div>
<div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 应用文写作 · 配置表单</div>
    <div class="card-body">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 题型</label><input class="proto-input" value="写作题" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 知识类型</label><input class="proto-input" value="应用" disabled></div>
        <div class="proto-field"><label class="proto-label">L3 题目类型</label><input class="proto-input" value="应用文写作" disabled></div>
      </div>
      <hr class="divider">
      <div class="callout cost"><span class="icon">💰</span><div>付费题型: LLM批改+格式检查。</div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>应用文类型</label><select class="proto-select"><option selected>留言条</option><option>邮件</option><option>通知</option><option>请假条</option><option>邀请函</option></select></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>场景说明</label><input class="proto-input" value="你的冰箱坏了，需要请房东修理。写一张留言条。"></div>
      <div class="proto-field"><label class="proto-label">格式要求</label><input class="proto-input" value="称呼 + 正文 + 署名"></div>
      <div class="proto-field"><label class="proto-label">格式模板 <span class="hint">显示在应用端输入框的placeholder</span></label><textarea class="proto-textarea">王房东：



小明
5月19日</textarea></div>
      <div class="proto-field"><label class="proto-label">范文</label><textarea class="proto-textarea" style="min-height:80px">王房东：
您好！我是302的租客小明。我的冰箱昨天突然不制冷了，请您有空的时候帮忙找人修理一下。谢谢您！
小明
5月19日</textarea></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>AI批改Prompt</label><textarea class="proto-textarea">批改留言条。场景: 请房东修冰箱。评分: 格式规范性(有称呼/署名/日期)、内容完整、语气得体、语法正确。</textarea></div>
      <hr class="divider">
      <div class="form-row t4">
        <div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option >HSK 1</option><option >HSK 2</option><option selected>HSK 3</option><option >HSK 4</option><option >HSK 5</option><option >HSK 6</option></select></div>
        <div class="proto-field"><label class="proto-label">分值</label><input class="proto-input" type="number" value="10"></div>
        <div class="proto-field"><label class="proto-label">限时(秒)</label><input class="proto-input" type="number" value="600"></div>
        <div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option >简单</option><option >中等</option><option selected>困难</option></select></div>
      </div>
      <div class="btn-group">
        <span class="proto-btn-primary">💾 保存</span>
        <span class="proto-btn-secondary">👁 预览</span>
        <span class="proto-btn-secondary">🤖 AI批量生成</span>
      </div>
    </div>
  </div>

</div>
