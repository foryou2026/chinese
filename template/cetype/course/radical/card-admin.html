<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>偏旁部首 · 部首 · 部首卡片 · 管理端</title>
<link rel="stylesheet" href="../../../../docs/B02-experience-design/admin/prototype-style/app.css">
<style>
.page-header{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:var(--space-3);position:sticky;top:0;z-index:var(--z-sticky);flex-wrap:wrap;box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow)}
.page-header h1{font-size:var(--text-lg);font-weight:var(--weight-semibold)}
.page-header .subtitle{color:var(--text-muted);font-size:var(--text-sm)}
.back-link{color:var(--color-brand-default);text-decoration:none;font-size:var(--text-sm);transition:color var(--motion-fast)}
.back-link:hover{text-decoration:underline;color:var(--color-brand-hover)}
.badge{display:inline-block;font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-pill);font-weight:var(--weight-regular)}
.badge.green{background:var(--color-success-50);color:var(--color-success-500);border:1px solid var(--color-success-200)}
.badge.solid-green{background:var(--color-success-500);color:#fff}
.content{max-width:1440px;margin:0 auto;padding:var(--space-6);position:relative;z-index:1}
.type-desc{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur-sm);backdrop-filter:var(--glass-blur-sm);border:1px solid var(--glass-border);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-5);font-size:var(--text-sm);line-height:var(--leading-loose)}
.type-desc strong{color:var(--color-brand-default)}
.shared-tpl{background:var(--color-success-50);border:1px solid var(--color-success-200);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--color-success-700);margin:8px 0;display:inline-flex;align-items:center;gap:4px}
.shared-tpl::before{content:'\267b'}
.field-map{font-size:11px;color:var(--text-muted);margin-top:4px}
.field-map strong{color:var(--color-brand-default);font-weight:var(--weight-medium)}
.card{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--glass-border);font-weight:var(--weight-semibold);font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-body{padding:20px}
.callout{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin:var(--space-3) 0;font-size:var(--text-sm);display:flex;gap:8px;line-height:var(--leading-normal)}
.callout.info{background:var(--color-info-50);border:1px solid var(--color-info-200)}
.callout .icon{font-size:16px;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.form-row.t3{grid-template-columns:1fr 1fr 1fr}
.divider{border:none;border-top:1px solid var(--color-neutral-200);margin:var(--space-4) 0}
.upload-area{border:2px dashed var(--border-color);border-radius:var(--radius-sm);padding:var(--space-4);text-align:center;color:var(--text-muted);cursor:pointer;transition:var(--transition-all)}
.upload-area:hover{border-color:var(--color-brand-default);color:var(--color-brand-default)}
.upload-area.sm{padding:10px}
.tag-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm);min-height:40px;align-items:center}
.tag-item{background:var(--color-brand-50);color:var(--color-brand-default);border:1px solid var(--color-brand-200);border-radius:var(--radius-pill);padding:2px 10px;font-size:var(--text-xs);display:inline-flex;align-items:center;gap:4px}
.tag-item .close{cursor:pointer;opacity:.6}
.tag-item .close:hover{opacity:1}
.btn-group{display:flex;gap:8px;margin-top:var(--space-4);flex-wrap:wrap}
.proto-label .req{color:var(--color-danger-500);margin-right:4px}
.proto-label .hint{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-xs);margin-left:6px}
.proto-field{margin-bottom:18px}
</style>
</head>
<body>
<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 偏旁部首 · 全部学习形式</a>
  <h1>#4 部首卡片</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">偏旁部首 × 部首 × 部首卡片</span>
  <a href="card-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a>
</div>

<div class="content">
  <div class="type-desc"><strong>偏旁部首 × 部首卡片</strong> — 约214个常用部首逐个展示，含义、位置规律、关联汉字、笔顺动画。<br><span class="field-map">应用端: <strong>大号部首</strong> + <strong>名称(中英)</strong> + <strong>含义</strong> + <strong>位置规律</strong> + <strong>关联汉字网格</strong></span></div>
  <div class="shared-tpl">共用模板: 部首卡片 + 含义区 + 位置规律 + 关联字网格 + 元数据区</div>

  <div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 部首卡片 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>部首卡片</strong>。配置部首字符、含义、位置、关联汉字。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 知识类型</label><input class="proto-input" value="偏旁部首" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 学习形式</label><input class="proto-input" value="部首卡片" disabled></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>部首字符</label><input class="proto-input lg" value="木" style="text-align:center;font-size:28px"></div>
      </div>
      <hr class="divider">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>部首名称(中)</label><input class="proto-input" value="木字旁"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>名称(EN)</label><input class="proto-input" value="Wood radical"></div>
        <div class="proto-field"><label class="proto-label">拼音</label><input class="proto-input" value="mù"></div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>含义说明</label>
        <div class="form-row"><textarea class="proto-textarea">与树木、木材有关</textarea><textarea class="proto-textarea">Related to wood, trees</textarea></div>
      </div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">常见位置</label><select class="proto-select"><option selected>左侧</option><option>右侧</option><option>上方</option><option>下方</option><option>包围</option></select></div>
        <div class="proto-field"><label class="proto-label">笔画数</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">变体写法</label><input class="proto-input" placeholder="如有变体"></div>
      </div>
      <div class="proto-field"><label class="proto-label">位置规律说明</label>
        <div class="form-row"><textarea class="proto-textarea">作为偏旁时通常在汉字左侧，末笔捺变点</textarea><textarea class="proto-textarea" placeholder="English position rule"></textarea></div>
      </div>
      <div class="proto-field"><label class="proto-label">笔顺动画 SVG</label><div class="upload-area sm">🎨 上传 SVG 动画文件</div></div>
      <div class="proto-field"><label class="proto-label">关联汉字 <span class="hint">选择包含此部首的汉字</span></label>
        <div class="tag-input"><span class="tag-item">树 <span class="close">×</span></span><span class="tag-item">林 <span class="close">×</span></span><span class="tag-item">森 <span class="close">×</span></span><span class="tag-item">枝 <span class="close">×</span></span><span class="tag-item">板 <span class="close">×</span></span><span class="tag-item">杯 <span class="close">×</span></span></div>
      </div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span></div>
    </div>
  </div>
</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
<script>proto.bootstrap();</script>
</body>
</html>
