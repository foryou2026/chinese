<div class="page-header">

  <h1>#5 汉字拆解</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">偏旁部首 × 拆解 × 汉字拆解</span>
  <a href="decompose-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a>

<div class="content">
  <div class="type-desc"><strong>偏旁部首 × 汉字拆解</strong> — 将汉字分解为部首组件，趣味记忆联想，帮助理解字形来源。<br><span class="field-map">应用端: <strong>目标汉字</strong> + <strong>拆解动画/公式</strong> + <strong>记忆联想故事</strong> + <strong>组件链接</strong></span></div>
  <div class="shared-tpl">独有模板: 拆解公式展示 + 记忆联想区 + 组件链接</div>

  <div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 汉字拆解 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>汉字拆解</strong>。配置目标汉字、拆解公式、记忆联想。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1 知识类型</label><input class="proto-input" value="偏旁部首" disabled></div>
        <div class="proto-field"><label class="proto-label">L2 学习形式</label><input class="proto-input" value="汉字拆解" disabled></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>目标汉字</label><input class="proto-input lg" value="休" style="text-align:center;font-size:28px"></div>
      </div>
      <hr class="divider">
      <div class="form-row"><div class="proto-field"><label class="proto-label">拼音</label><input class="proto-input" value="xiū"></div><div class="proto-field"><label class="proto-label">释义</label><input class="proto-input" value="休息 / rest"></div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>拆解公式 <span class="hint">用 + 连接各部首组件</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input class="proto-input" value="亻" style="width:50px;font-size:20px;text-align:center"><span>=</span><input class="proto-input" value="人字旁" style="width:80px"><select class="proto-select" style="width:80px"><option>形旁</option><option selected>义旁</option></select></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px;align-items:center"><input class="proto-input" value="木" style="width:50px;font-size:20px;text-align:center"><span>=</span><input class="proto-input" value="木字旁" style="width:80px"><select class="proto-select" style="width:80px"><option>形旁</option><option selected>义旁</option></select></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加组件</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>记忆联想 <span class="hint">中英双语趣味故事</span></label>
        <div class="form-row"><textarea class="proto-textarea">人靠在树上 → 休息</textarea><textarea class="proto-textarea">A person leaning against a tree → to rest</textarea></div>
      </div>
      <div class="proto-field"><label class="proto-label">拆解动画</label><div class="upload-area sm">🎬 上传拆解动画(SVG/GIF，可选)</div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI批量生成拆解</span></div>
    </div>
  </div>
