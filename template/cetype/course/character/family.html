<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字 · 字族 · 字族联想</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 汉字 · 全部学习形式</a>
  <h1>#9 字族联想</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">汉字 × 字族 × 字族联想</span>

  <a href="../../app/course/character/family.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>汉字 × 字族联想</strong> — 共享相同部件(声旁/形旁)的汉字族群，帮助批量记忆与理解造字规律。<br><span class="field-map">应用端: <strong>共享部件高亮</strong> + <strong>同族汉字群</strong> + <strong>每字拼音+释义</strong> + <strong>规律总结</strong></span></div>
<div class="shared-tpl">独有模板: 字族群展示 + 共享部件高亮 + 规律总结区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 字族联想 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>字族联想</strong>。配置共享部件、成员汉字、规律总结。</div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="汉字" disabled></div><div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="字族联想" disabled></div><div class="proto-field"><label class="proto-label"><span class="req">*</span>共享部件</label><input class="proto-input lg" value="青" style="font-size:24px;text-align:center"></div></div>
      <hr class="divider">
      <div class="form-row"><div class="proto-field"><label class="proto-label">部件拼音</label><input class="proto-input" value="qīng"></div><div class="proto-field"><label class="proto-label">部件功能</label><select class="proto-select"><option selected>声旁(提供读音)</option><option>形旁(提供字义)</option><option>兼具</option></select></div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>成员汉字 <span class="hint">从汉字库选择包含该部件的汉字</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="清" style="width:50px;font-size:18px;text-align:center"><input class="proto-input" value="qīng" style="width:60px"><input class="proto-input" value="氵+青" style="width:80px"><input class="proto-input" value="clear" style="flex:1"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="请" style="width:50px;font-size:18px;text-align:center"><input class="proto-input" value="qǐng" style="width:60px"><input class="proto-input" value="讠+青" style="width:80px"><input class="proto-input" value="please" style="flex:1"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加成员</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>规律总结 <span class="hint">中英双语</span></label>
        <div class="form-row"><textarea class="proto-textarea">「青」作为声旁，提供qīng/qǐng/qíng/jīng等读音线索。左边的形旁决定字义方向。</textarea><textarea class="proto-textarea">"青" as phonetic component gives pronunciation hints. The semantic radical on the left determines meaning.</textarea></div>
      </div>
      <div class="form-row"><div class="proto-field"><label class="proto-label">排序</label><input class="proto-input" type="number" value="1"></div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI自动发现字族</span></div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
