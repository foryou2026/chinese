<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字 · 字卡 · 字卡学习</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 汉字 · 全部学习形式</a>
  <h1>#8 字卡学习</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">汉字 × 字卡 × 字卡学习</span>

  <a href="../../app/course/character/card.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>汉字 × 字卡学习</strong> — 每个汉字一张完整卡片，包含字形、拼音、声调、释义、部首、笔画数、常见组词、例句。<br><span class="field-map">应用端: <strong>大号汉字</strong> + <strong>拼音+释义</strong> + <strong>部首/笔画/HSK信息卡</strong> + <strong>音频</strong> + <strong>组词</strong> + <strong>例句(ruby标注)</strong></span></div>
<div class="shared-tpl">共用模板: 汉字卡片 + 属性区 + 组词区 + 例句区 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 字卡学习 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>字卡学习</strong>。完整汉字属性配置。</div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="汉字" disabled></div><div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="字卡学习" disabled></div><div class="proto-field"><label class="proto-label"><span class="req">*</span>简体字</label><input class="proto-input lg" value="水" style="font-size:24px;text-align:center"></div></div>
      <hr class="divider">
      <div class="form-row"><div class="proto-field"><label class="proto-label">繁体字</label><input class="proto-input" value="水" style="font-size:18px;text-align:center"></div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>拼音</label><input class="proto-input" value="shuǐ"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>声调</label><select class="proto-select"><option>一声</option><option>二声</option><option selected>三声</option><option>四声</option><option>轻声</option></select></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>HSK</label><select class="proto-select"><option selected>HSK 1</option><option>HSK 2</option><option>HSK 3</option><option>HSK 4</option><option>HSK 5</option><option>HSK 6</option></select></div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>释义 <span class="hint">中英双语</span></label><div class="form-row"><input class="proto-input" value="液体，H2O" placeholder="中文"><input class="proto-input" value="water" placeholder="English"></div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">部首</label><input class="proto-input" value="水"></div>
        <div class="proto-field"><label class="proto-label">笔画数</label><input class="proto-input" type="number" value="4"></div>
        <div class="proto-field"><label class="proto-label">字频排名</label><input class="proto-input" type="number" value="186"></div>
      </div>
      <div class="proto-field"><label class="proto-label">发音音频</label><div class="upload-area sm">📁 上传或TTS生成</div></div>
      <div class="proto-field"><label class="proto-label">常见组词</label>
        <div class="list-builder">
          <div class="list-builder-item"><span class="drag">⠿</span><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="水果" style="width:80px"><input class="proto-input" value="shuǐguǒ" style="width:100px"><input class="proto-input" value="fruit" style="flex:1"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加组词</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label">例句</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><input class="proto-input" value="我想喝水。" style="margin-bottom:4px"><input class="proto-input" value="I want to drink water."></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加例句</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label">关联笔顺</label><select class="proto-select"><option>选择已有笔顺: 水(4画)</option></select></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">📥 CSV批量导入</span></div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
