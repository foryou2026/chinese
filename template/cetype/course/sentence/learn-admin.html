<div class="content">
  <div class="type-desc"><strong>短句 × 短句学习</strong> — 日常实用短句，逐词点击查看释义，语法要点标注，多语速音频。<br><span class="field-map">应用端: <strong>可点击句子</strong> + <strong>词义弹窗</strong> + <strong>拼音+翻译</strong> + <strong>多语速音频</strong> + <strong>语法要点</strong></span></div>
  <div class="shared-tpl">共用模板: 可点击句子 + 词义弹窗 + 音频区 + 语法标注 + 元数据区</div>

  <div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 短句学习 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>短句学习</strong>。核心：句子+分词标注表+语法要点+音频。</div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="短句" disabled></div><div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="短句学习" disabled></div><div class="proto-field"><label class="proto-label">所属主题</label><select class="proto-select"><option selected>打招呼</option><option>餐厅</option><option>购物</option></select></div></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>中文短句</label><input class="proto-input" value="你好，我叫大卫。" style="font-size:16px"></div>
      <div class="form-row"><div class="proto-field"><label class="proto-label"><span class="req">*</span>拼音</label><input class="proto-input" value="Nǐ hǎo, wǒ jiào Dàwèi."></div><div class="proto-field"><label class="proto-label"><span class="req">*</span>英文翻译</label><input class="proto-input" value="Hello, my name is David."></div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>分词标注 <span class="hint">每个词的拼音、词性、释义，对应应用端点击弹窗</span></label>
        <table class="mini-table"><thead><tr><th>词</th><th>拼音</th><th>词性</th><th>中文释义</th><th>英文</th><th>类型</th></tr></thead>
        <tbody>
          <tr><td><input class="proto-input" value="你" style="width:50px"></td><td><input class="proto-input" value="nǐ" style="width:50px"></td><td><select class="proto-select" style="width:60px"><option>代词</option></select></td><td><input class="proto-input" value="你" style="width:50px"></td><td><input class="proto-input" value="you" style="width:50px"></td><td><span style="color:var(--color-brand-default);font-size:12px">普通</span></td></tr>
          <tr><td><input class="proto-input" value="叫" style="width:50px"></td><td><input class="proto-input" value="jiào" style="width:50px"></td><td><select class="proto-select" style="width:60px"><option>动词</option></select></td><td><input class="proto-input" value="叫做" style="width:50px"></td><td><input class="proto-input" value="called" style="width:50px"></td><td><span style="color:var(--color-brand-default);font-size:12px">普通</span></td></tr>
          <tr><td><input class="proto-input" value="大卫" style="width:50px"></td><td><input class="proto-input" value="Dàwèi" style="width:50px"></td><td><select class="proto-select" style="width:60px"><option>专名</option></select></td><td><input class="proto-input" value="大卫" style="width:50px"></td><td><input class="proto-input" value="David" style="width:50px"></td><td><span style="color:var(--color-warning-500);font-size:12px">变量</span></td></tr>
        </tbody></table>
      </div>
      <div class="proto-field"><label class="proto-label">音频组</label><div class="form-row"><div class="upload-area sm">📁 正常语速</div><div class="upload-area sm">📁 慢速</div></div></div>
      <div class="proto-field"><label class="proto-label">语法要点 <span class="hint">可选，中英双语</span></label><div class="form-row"><textarea class="proto-textarea">「我叫+名字」是中文自我介绍的最基本句型</textarea><textarea class="proto-textarea">"我叫+name" is the basic pattern for self-introduction</textarea></div></div>
      <div class="form-row"><div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 1</option></select></div><div class="proto-field"><label class="proto-label">排序</label><input class="proto-input" type="number" value="2"></div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">🤖 AI批量生成短句</span></div>
    </div>
  </div>
