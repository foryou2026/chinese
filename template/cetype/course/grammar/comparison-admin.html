<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语法句型 · 对比 · 语法对比</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 语法句型 · 全部学习形式</a>
  <h1>#15 语法对比</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">语法句型 × 对比 × 语法对比</span>

  <a href="../../app/course/grammar/comparison.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>语法句型 × 语法对比</strong> — 将易混淆的语法点(如了/过/着)并排对比，清晰辨析差异+易错提醒。<br><span class="field-map">应用端: <strong>并排对比卡片</strong> + <strong>对比维度</strong> + <strong>正误例句</strong> + <strong>易错点</strong></span></div>
<div class="shared-tpl">独有模板: 并排对比卡 + 对比维度表 + 正误例句</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 语法对比 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>语法对比</strong>。核心：选择2-4个语法点，配置对比维度、对比例句、易错点。</div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="语法句型" disabled></div><div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="语法对比" disabled></div><div class="proto-field"><label class="proto-label"><span class="req">*</span>对比组名称</label><input class="proto-input" value="时态助词: 了/过/着"></div></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>对比语法点 <span class="hint">2-4个</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="了" style="width:50px;font-size:18px;text-align:center"><input class="proto-input" value="le" style="width:60px"><input class="proto-input" value="完成/completed" style="flex:1"><input type="color" value="#1677ff" style="width:30px;height:24px"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="过" style="width:50px;font-size:18px;text-align:center"><input class="proto-input" value="guo" style="width:60px"><input class="proto-input" value="经历/experienced" style="flex:1"><input type="color" value="#52c41a" style="width:30px;height:24px"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-item"><div class="content" style="display:flex;gap:8px"><input class="proto-input" value="着" style="width:50px;font-size:18px;text-align:center"><input class="proto-input" value="zhe" style="width:60px"><input class="proto-input" value="持续/ongoing" style="flex:1"><input type="color" value="#faad14" style="width:30px;height:24px"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加语法点(最多4个)</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>对比例句 <span class="hint">同一语境使用不同语法词的对比</span></label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="我吃了饭。" style="flex:1"><select class="proto-select" style="width:60px"><option selected>了</option><option>过</option><option>着</option></select></div><input class="proto-input" value="I ate (completed action)." style="margin-top:4px"></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加对比例句</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label">易错点 <span class="hint">中英双语</span></label>
        <div class="form-row"><textarea class="proto-textarea">「吃了饭」≠「吃过饭」。前者强调刚完成，后者强调有过此经历。</textarea><textarea class="proto-textarea">"吃了饭" ≠ "吃过饭". The former emphasizes just completed, the latter emphasizes having had the experience.</textarea></div>
      </div>
      <div class="form-row"><div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option selected>HSK 2</option><option>HSK 3</option></select></div><div class="proto-field"><label class="proto-label">难度</label><select class="proto-select"><option>初级</option><option selected>中级</option><option>高级</option></select></div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span></div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
