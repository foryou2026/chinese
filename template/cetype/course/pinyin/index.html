<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼音 Pinyin · 全部学习形式</title>
<link rel="stylesheet" href="../../../../docs/B02-experience-design/admin/prototype-style/app.css">
<style>
.page-header{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:var(--space-3);position:sticky;top:0;z-index:var(--z-sticky);flex-wrap:wrap;box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow)}
.page-header h1{font-size:var(--text-lg);font-weight:var(--weight-semibold)}
.page-header .subtitle{color:var(--text-muted);font-size:var(--text-sm)}
.back-link{color:var(--color-brand-default);text-decoration:none;font-size:var(--text-sm);transition:color var(--motion-fast)}
.back-link:hover{text-decoration:underline;color:var(--color-brand-hover)}
.badge{display:inline-block;font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-pill);font-weight:var(--weight-regular)}
.badge.green{background:var(--color-success-50);color:var(--color-success-500);border:1px solid var(--color-success-200)}
.content{max-width:1440px;margin:0 auto;padding:var(--space-6);position:relative;z-index:1}
.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--space-4)}
.index-card{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow);padding:20px;transition:transform 200ms var(--easing-out),box-shadow 200ms var(--easing-out);text-decoration:none;color:inherit;display:block}
.index-card:hover{box-shadow:inset 0 1px 0 0 var(--glass-inset),0 8px 32px -4px var(--glass-shadow-elevated);transform:translateY(-2px)}
.index-card .title{font-size:16px;font-weight:var(--weight-semibold);margin-bottom:6px}
.index-card .desc{font-size:var(--text-sm);color:var(--text-muted);line-height:var(--leading-normal)}
.index-card .meta{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.link-pair{display:flex;gap:8px;margin-top:10px;font-size:var(--text-sm)}
.link-pair a{padding:4px 12px;border-radius:var(--radius-pill);text-decoration:none;font-weight:var(--weight-medium);transition:var(--transition-all)}
.link-pair .app-link{background:var(--color-brand-50);color:var(--color-brand-default);border:1px solid var(--color-brand-200)}
.link-pair .app-link:hover{background:var(--color-brand-100)}
.link-pair .admin-link{background:var(--color-neutral-50);color:var(--text-secondary);border:1px solid var(--color-neutral-300)}
.link-pair .admin-link:hover{background:var(--color-neutral-100)}
</style>
</head>
<body>
<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="../index.html" class="back-link">← 课程知识点</a>
  <h1>拼音 Pinyin</h1>
  <span class="subtitle">3种学习形式: 声韵母学习 · 声调训练 · 拼读组合表</span>
</div>

<div class="content">
  <div class="index-grid">
    <div class="index-card">
      <div class="title">#1 声韵母学习</div>
      <div class="desc">单个声母/韵母卡片：展示发音+口型+技巧+例字</div>
      <div class="meta"><span class="badge green">零AI</span></div>
      <div class="link-pair">
        <a href="initial-final-app.html" class="app-link">📱 App端</a>
        <a href="initial-final-admin.html" class="admin-link">⚙️ Admin端</a>
      </div>
    </div>
    <div class="index-card">
      <div class="title">#2 声调训练</div>
      <div class="desc">四声对比+声调可视化+听辨+例字</div>
      <div class="meta"><span class="badge green">零AI</span></div>
      <div class="link-pair">
        <a href="tone-app.html" class="app-link">📱 App端</a>
        <a href="tone-admin.html" class="admin-link">⚙️ Admin端</a>
      </div>
    </div>
    <div class="index-card">
      <div class="title">#3 拼读组合表</div>
      <div class="desc">声母×韵母交叉矩阵+点击发音+拼读规则</div>
      <div class="meta"><span class="badge green">零AI</span></div>
      <div class="link-pair">
        <a href="combination-app.html" class="app-link">📱 App端</a>
        <a href="combination-admin.html" class="admin-link">⚙️ Admin端</a>
      </div>
    </div>
  </div>
</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
<script>proto.bootstrap();</script>
</body>
</html>
