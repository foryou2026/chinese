<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 对话场景 · 全部学习形式</a>
  <h1>#17 角色扮演</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.01-0.03/次</span>
  <span class="subtitle">对话场景 × 角色扮演 × 角色扮演</span>

  <a href="../../app/course/dialogue/roleplay.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>对话场景 × 角色扮演</strong> — 用户扮演对话中某角色，AI实时语音识别+评分。<strong>付费功能: STT + 发音评分。</strong><br><span class="field-map">应用端: <strong>对话气泡</strong> + <strong>麦克风录音</strong> + <strong>AI多维评分</strong> + <strong>示范音频对比</strong></span></div>
<div class="shared-tpl">独有模板: 录音控制 + AI评分反馈 + 多维度雷达图</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 角色扮演 · 配置表单</div>
    <div class="card-body">
      <div class="callout cost"><span class="icon">💰</span><div>付费功能: STT语音转录 + AI发音评分，<strong>~$0.01-0.03/次</strong>。仅高级用户可用。</div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="对话场景" disabled></div><div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="角色扮演" disabled></div><div class="proto-field"><label class="proto-label"><span class="req">*</span>基础对话</label><select class="proto-select"><option selected>在餐厅点餐</option></select></div></div>
      <hr class="divider">
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>用户扮演角色</label><select class="proto-select"><option>服务员(NPC)</option><option selected>顾客(用户)</option></select></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>AI评分Prompt模板</label><textarea class="proto-textarea" style="min-height:80px">请评估用户的口语表达。对比用户录音与标准文本，评分维度：发音准确度(声母韵母声调)、流利度(停顿节奏)、语调(自然度)。</textarea></div>
      <div class="proto-field"><label class="proto-label">评分维度 + 权重</label>
        <div class="list-builder">
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="发音准确度"><input class="proto-input" type="number" value="40" style="width:60px"><span class="text-sm">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="流利度"><input class="proto-input" type="number" value="30" style="width:60px"><span class="text-sm">%</span></div></div></div>
          <div class="list-builder-item"><div class="content"><div class="form-row"><input class="proto-input" value="语调自然度"><input class="proto-input" type="number" value="30" style="width:60px"><span class="text-sm">%</span></div></div></div>
        </div>
      </div>
      <div class="form-row"><div class="proto-field"><label class="proto-label">合格阈值</label><input class="proto-input" type="number" value="70" style="width:80px"><span class="text-sm"> 分</span></div><div class="proto-field"><label class="proto-label">示范音频</label><div class="upload-area sm">📁 上传示范录音</div></div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span></div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
