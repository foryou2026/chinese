<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对话场景 · 对话 · 对话学习 · 管理端</title>
<link rel="stylesheet" href="../../../../docs/B02-experience-design/admin/prototype-style/app.css">
<style>
.page-header{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:var(--space-3);position:sticky;top:0;z-index:var(--z-sticky);flex-wrap:wrap;box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow)}
.page-header h1{font-size:var(--text-lg);font-weight:var(--weight-semibold)}
.page-header .subtitle{color:var(--text-muted);font-size:var(--text-sm)}
.back-link{color:var(--color-brand-default);text-decoration:none;font-size:var(--text-sm);transition:color var(--motion-fast)}
.back-link:hover{text-decoration:underline;color:var(--color-brand-hover)}
.badge{display:inline-block;font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-pill);font-weight:var(--weight-regular)}
.badge.blue{background:var(--color-info-50);color:var(--color-info-500);border:1px solid var(--color-info-200)}
.badge.green{background:var(--color-success-50);color:var(--color-success-500);border:1px solid var(--color-success-200)}
.badge.solid-green{background:var(--color-success-500);color:#fff}
.content{max-width:1440px;margin:0 auto;padding:var(--space-6);position:relative;z-index:1}
.type-desc{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur-sm);backdrop-filter:var(--glass-blur-sm);border:1px solid var(--glass-border);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-5);font-size:var(--text-sm);line-height:var(--leading-loose)}
.type-desc strong{color:var(--color-brand-default)}
.shared-tpl{background:var(--color-success-50);border:1px solid var(--color-success-200);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--color-success-700);margin:8px 0;display:inline-flex;align-items:center;gap:4px}
.shared-tpl::before{content:'\267b'}
.field-map{font-size:11px;color:var(--text-muted);margin-top:4px}
.field-map strong{color:var(--color-brand-default);font-weight:var(--weight-medium)}
.card{background:var(--glass-bg-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:inset 0 1px 0 0 var(--glass-inset),0 4px 24px -1px var(--glass-shadow);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--glass-border);font-weight:var(--weight-semibold);font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-body{padding:20px}
.callout{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin:var(--space-3) 0;font-size:var(--text-sm);display:flex;gap:8px;line-height:var(--leading-normal)}
.callout.info{background:var(--color-info-50);border:1px solid var(--color-info-200)}
.callout .icon{font-size:16px;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.form-row.t3{grid-template-columns:1fr 1fr 1fr}
.divider{border:none;border-top:1px solid var(--color-neutral-200);margin:var(--space-4) 0}
.list-builder{border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm)}
.list-builder-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-bottom:1px solid var(--color-neutral-100)}
.list-builder-item:last-child{border-bottom:none}
.list-builder-item .drag{color:var(--color-neutral-400);cursor:grab;padding-top:4px}
.list-builder-item .content{flex:1}
.list-builder-add{padding:8px;text-align:center;color:var(--color-brand-default);cursor:pointer;border-top:1px dashed var(--color-neutral-200);font-size:var(--text-sm)}
.btn-group{display:flex;gap:8px;margin-top:var(--space-4);flex-wrap:wrap}
.proto-label .req{color:var(--color-danger-500);margin-right:4px}
.proto-label .hint{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-xs);margin-left:6px}
.proto-field{margin-bottom:18px}
.tag-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--color-neutral-200);border-radius:var(--radius-sm);min-height:36px}
.tag-item{background:var(--color-brand-50);color:var(--color-brand-default);border:1px solid var(--color-brand-200);padding:2px 8px;border-radius:var(--radius-pill);font-size:var(--text-xs);display:inline-flex;align-items:center;gap:4px}
.tag-item .close{cursor:pointer;opacity:.6}
.tag-item .close:hover{opacity:1}
</style>
</head>
<body>
<div class="mesh-gradient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div class="page-header">
  <a href="index.html" class="back-link">← 对话场景 · 全部学习形式</a>
  <h1>#16 对话学习</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">对话场景 × 对话 × 对话学习</span>
  <a href="learn-app.html" class="back-link" style="margin-left:auto;color:var(--color-success-500)">App端 →</a>
</div>

<div class="content">
  <div class="type-desc"><strong>对话场景 × 对话学习</strong> — 聊天气泡式展示，模拟真实场景对话，支持逐句听读。<br><span class="field-map">应用端: <strong>角色标注</strong> + <strong>气泡对话</strong> + <strong>拼音+翻译</strong> + <strong>逐行音频</strong> + <strong>词汇表</strong></span></div>
  <div class="shared-tpl">共用模板: 气泡对话 + 逐行音频 + 词汇表入口 + 元数据区</div>

  <div class="card animate-slide-up">
    <div class="card-header"><span class="badge green">管理端</span> 对话学习 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>对话学习</strong>。核心：场景+角色+对话脚本(逐行配音频)。</div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="对话场景" disabled></div><div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="对话学习" disabled></div><div class="proto-field"><label class="proto-label"><span class="req">*</span>场景标题</label><input class="proto-input" value="在餐厅点餐"></div></div>
      <hr class="divider">
      <div class="form-row"><div class="proto-field"><label class="proto-label">标题(EN)</label><input class="proto-input" value="Ordering at a Restaurant"></div><div class="proto-field"><label class="proto-label">场景描述</label><textarea class="proto-textarea">模拟在中国餐厅点餐的日常对话</textarea></div></div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>角色定义</label>
        <div class="form-row"><div style="display:flex;gap:8px;align-items:center"><select class="proto-select" style="width:80px"><option>NPC</option></select><input class="proto-input" value="服务员"><input class="proto-input" value="Waiter"></div><div style="display:flex;gap:8px;align-items:center"><select class="proto-select" style="width:80px"><option>用户</option></select><input class="proto-input" value="顾客"><input class="proto-input" value="Customer"></div></div>
      </div>
      <div class="proto-field"><label class="proto-label"><span class="req">*</span>对话脚本 <span class="hint">拖拽排序，每行配音频</span></label>
        <div class="list-builder">
          <div class="list-builder-item" style="background:var(--color-neutral-50)"><span class="drag">⠿</span><div class="content"><div style="display:flex;gap:8px;margin-bottom:4px"><select class="proto-select" style="width:80px"><option selected>服务员</option></select><span class="proto-btn-sm">📁 音频</span></div><input class="proto-input" value="欢迎光临！请问几位？" style="margin-bottom:4px"><div class="form-row"><input class="proto-input" value="Huānyíng guānglín!" placeholder="拼音"><input class="proto-input" value="Welcome! How many?" placeholder="EN"></div></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-item"><span class="drag">⠿</span><div class="content"><div style="display:flex;gap:8px;margin-bottom:4px"><select class="proto-select" style="width:80px"><option selected>顾客</option></select><span class="proto-btn-sm">📁 音频</span><span style="font-size:11px;color:var(--color-brand-default)">🎤 用户跟读</span></div><input class="proto-input" value="两位，谢谢。" style="margin-bottom:4px"><div class="form-row"><input class="proto-input" value="Liǎng wèi, xièxie." placeholder="拼音"><input class="proto-input" value="Two, thanks." placeholder="EN"></div></div><div class="actions"><span class="proto-btn-sm">🗑</span></div></div>
          <div class="list-builder-add">+ 添加对话行</div>
        </div>
      </div>
      <div class="proto-field"><label class="proto-label">相关词汇</label><div class="tag-input"><span class="tag-item">欢迎光临 <span class="close">×</span></span><span class="tag-item">菜单 <span class="close">×</span></span></div></div>
      <div class="form-row t3"><div class="proto-field"><label class="proto-label">HSK</label><select class="proto-select"><option>HSK 1</option><option selected>HSK 2</option></select></div><div class="proto-field"><label class="proto-label">主题</label><select class="proto-select"><option selected>餐饮</option><option>购物</option><option>交通</option></select></div><div class="proto-field"><label class="proto-label">排序</label><input class="proto-input" type="number" value="1"></div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span></div>
    </div>
  </div>
</div>

<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
<script>proto.bootstrap();</script>
</body>
</html>
