<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔画笔顺 · 笔画 · 笔画认知</title><link rel="stylesheet" href="../../styles-admin.css">
<style>
.shared-tpl { background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; padding:6px 10px; font-size:11px; color:#389e0d; margin:8px 0; display:inline-flex; align-items:center; gap:4px; }
.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 笔画笔顺 · 全部学习形式</a>
  <h1>#6 笔画认知</h1>
  <span class="badge solid-green">零AI</span>
  <span class="subtitle">笔画笔顺 × 笔画 × 笔画认知</span>

  <a href="../../app/course/stroke/basic.html" class="back-link" style="margin-left:auto;color:#52c41a">App端 →</a></div>
<div class="content">
<div class="type-desc"><strong>笔画笔顺 × 笔画认知</strong> — 横/竖/撇/捺/点/提/折/钩等~30种基本笔画，是书写汉字的基础单元。<br><span class="field-map">应用端: <strong>笔画名称(中英+拼音)</strong> + <strong>书写方向动画</strong> + <strong>包含此笔画的例字</strong></span></div>
<div class="shared-tpl">共用模板: 笔画展示卡 + 书写方向 + 例字区</div>
<div class="card">
    <div class="card-header"><span class="badge green">管理端</span> 笔画认知 · 配置表单</div>
    <div class="card-body">
      <div class="callout info"><span class="icon">📌</span><div>学习形式=<strong>笔画认知</strong>。配置笔画类型、名称、书写方向、例字。</div></div>
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label">L1</label><input class="proto-input" value="笔画笔顺" disabled></div>
        <div class="proto-field"><label class="proto-label">L2</label><input class="proto-input" value="笔画认知" disabled></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>笔画字符</label><input class="proto-input lg" value="一" style="text-align:center;font-size:28px"></div>
      </div>
      <hr class="divider">
      <div class="form-row t3">
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>笔画名称(中)</label><input class="proto-input" value="横"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>拼音</label><input class="proto-input" value="héng"></div>
        <div class="proto-field"><label class="proto-label"><span class="req">*</span>English</label><input class="proto-input" value="Horizontal stroke"></div>
      </div>
      <div class="proto-field"><label class="proto-label">书写方向</label><select class="proto-select"><option selected>从左到右 →</option><option>从上到下 ↓</option><option>从右上到左下 ↘</option><option>从左上到右下 ↘</option><option>先降后弯 ↓→</option></select></div>
      <div class="proto-field"><label class="proto-label">示范SVG路径</label><input class="proto-input" value="M30,50 L170,50" placeholder="SVG Path data"></div>
      <div class="proto-field"><label class="proto-label">书写动画</label><div class="upload-area sm">🎬 上传SVG/GIF动画</div></div>
      <div class="proto-field"><label class="proto-label">包含例字</label><div class="tag-input"><span class="tag-item">一 <span class="close">×</span></span><span class="tag-item">十 <span class="close">×</span></span><span class="tag-item">大 <span class="close">×</span></span><span class="tag-item">王 <span class="close">×</span></span></div></div>
      <div class="form-row"><div class="proto-field"><label class="proto-label">排序</label><input class="proto-input" type="number" value="1"></div></div>
      <div class="btn-group"><span class="proto-btn-primary">💾 保存</span><span class="proto-btn-secondary">👁 预览</span><span class="proto-btn-secondary">📥 批量导入笔画表</span></div>
    </div>
  </div>

</div>
<script src="../../../../docs/B02-experience-design/admin/prototype-style/app.js"></script>
</body>
</html>
