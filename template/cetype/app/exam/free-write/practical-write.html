.shared-tpl::before { content:'\267b'; }
.field-map { font-size:11px; color:rgba(0,0,0,.45); margin-top:4px; }
.field-map strong { color:var(--primary); font-weight:500; }
</style></head>
<body>
<div class="page-header">
  <a href="index.html" class="back-link">← 写作题 · 全部变体</a>
  <h1>#3 应用文写作</h1>
  <span class="badge solid-red">需AI</span><span class="badge orange">~$0.002-0.008/次</span>
  <span class="subtitle">写作题 × 应用 × 应用文写作</span>

  <a href="../../../exam/free-write/practical-write.html" class="back-link" style="margin-left:auto;color:#d46b08">Admin端 →</a></div>
<div class="content">
<div class="type-desc"><strong>写作题 × 应用文写作</strong> — 开放式写作+AI批改反馈。<br><span class="field-map">应用端: <strong>题目/图片展示</strong> + <strong>文本输入区</strong> + <strong>字数统计</strong> + <strong>AI批改反馈</strong></span></div>
<div class="shared-tpl">共用模板: 文本输入区 + 字数统计 + AI批改反馈 + 元数据区</div>
<div class="card">
    <div class="card-header"><span class="badge blue">应用端</span> 应用文写作</div>
    <div class="card-body">
      <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="phone-screen">
          <div class="app-header pro"><span class="back">←</span><h3>写作题</h3><span class="progress">Q3/10</span></div>
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="app-content">
            <div class="q-instruction">根据场景写一封留言 Write a note/message</div>
            <div class="highlight-box blue" style="padding:16px;margin:12px 0">
              <div style="font-size:14px;font-weight:500">📋 场景: 给房东写留言</div>
              <div class="text-sm mt-8">你的冰箱坏了，需要请房东修理。写一张留言条。</div>
              <div class="text-sm mt-8" style="color:var(--primary)">格式: 称呼 + 正文 + 署名</div>
            </div>
            <div style="border:1px solid var(--border);border-radius:8px;padding:16px;margin:12px 0;background:#fffef5">
              <div style="color:rgba(0,0,0,.25);font-size:13px;margin-bottom:8px">— 留言条 —</div>
              <textarea class="proto-textarea" placeholder="王房东：&#10;&#10;&#10;&#10;小明&#10;5月19日" style="font-size:16px;min-height:180px;line-height:2;background:transparent;border:none;resize:none"></textarea>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">提交 ✓</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../../../../../docs/B02-experience-design/app/prototype-style/app.js"></script>
