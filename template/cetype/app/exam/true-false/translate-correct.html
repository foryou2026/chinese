<div class="card">

      <div class="phone-frame">

            <div class="highlight-box gray" style="padding:16px;margin:16px 0">
              <div style="font-size:16px;margin-bottom:8px"><strong>中文:</strong> 他昨天没有来上课。</div>
              <div style="font-size:15px;color:rgba(0,0,0,.65)"><strong>English:</strong> He didn't come to class yesterday.</div>

              <div style="width:100px;height:60px;border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer">✗ 错</div>
            </div>
            <div style="padding:16px 0"><span class="proto-btn-primary proto-btn-block">确认 ✓</span></div>
          </div>
        </div>
      </div>
