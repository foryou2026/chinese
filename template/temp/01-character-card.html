<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="green" data-density="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APP - 汉字字卡学习</title>
<link rel="stylesheet" href="../../docs/B02-experience-design/app/prototype-style/app.css">
<style>
/* ===== 手机壳 ===== */
.phone-shell {
  width: 375px; height: 812px;
  border-radius: 44px;
  border: 8px solid #1a1a2e;
  overflow: hidden;
  position: relative;
  margin: 40px auto;
  background: var(--page-bg);
  box-shadow: 0 20px 60px rgba(0,0,0,0.18), inset 0 0 0 2px rgba(255,255,255,0.1);
}
.phone-shell::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 150px; height: 28px;
  background: #1a1a2e;
  border-radius: 0 0 18px 18px;
  z-index: 100;
}
.phone-inner {
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ===== 状态栏 ===== */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}

/* ===== 顶部导航 ===== */
.app-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  position: sticky;
  top: 36px;
  z-index: 40;
  flex-shrink: 0;
}
.app-nav .back-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur-sm);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  font-size: 16px;
  transition: transform 100ms var(--easing-spring);
  color: var(--text-primary);
}
.app-nav .back-btn:active { transform: scale(0.9); }
.app-nav .nav-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}
.app-nav .lives {
  display: flex; align-items: center; gap: 3px;
  font-size: 15px; font-weight: 700;
  color: #EF4444;
}

/* ===== 进度条 ===== */
.progress-track {
  margin: 0 20px 12px;
  height: 10px;
  border-radius: var(--radius-pill);
  background: var(--color-neutral-200);
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
}
.progress-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  background: linear-gradient(90deg, var(--color-brand-default), var(--color-brand-300));
  transition: width 600ms var(--easing-spring);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  top: 2px; right: 4px;
  width: 16px; height: 3px;
  background: rgba(255,255,255,0.45);
  border-radius: var(--radius-pill);
}

/* ===== 吉祥物 ===== */
.mascot-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
}
.mascot {
  width: 48px; height: 48px;
  border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--color-brand-50), var(--color-brand-100));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 3px 0 0 var(--color-brand-200);
  animation: mascotBounce 2.5s ease-in-out infinite;
}
@keyframes mascotBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.mascot-speech {
  background: var(--glass-bg-elevated);
  backdrop-filter: var(--glass-blur-sm);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 6px;
  position: relative;
}
.mascot-speech::before {
  content: '';
  position: absolute;
  top: -5px; left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 10px; height: 10px;
  background: var(--glass-bg-elevated);
  border-left: 1px solid var(--glass-border);
  border-top: 1px solid var(--glass-border);
}

/* ===== 学习卡 ===== */
.card-area {
  padding: 12px 20px 0;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.learn-card {
  width: 100%;
  border-radius: var(--radius-xl);
  padding: 24px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  background: var(--glass-bg-card);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  box-shadow: inset 0 1px 0 0 var(--glass-inset);
  transition: transform 400ms var(--easing-spring);
}
.learn-card.flip-out {
  transform: translateX(-120%) rotate(-8deg);
  opacity: 0;
}
.learn-card.flip-in {
  animation: cardSlideIn 500ms var(--easing-spring) forwards;
}
@keyframes cardSlideIn {
  from { transform: translateX(120%) rotate(8deg); opacity: 0; }
  to { transform: translateX(0) rotate(0); opacity: 1; }
}

/* 汉字展示 */
.hanzi-display {
  font-family: var(--font-hanzi);
  font-size: 88px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.1;
  margin: 4px 0;
  transition: transform 200ms var(--easing-spring);
  cursor: pointer;
}
.hanzi-display:active { transform: scale(1.06); }
.hanzi-display.pulse {
  animation: hanziPulse 300ms var(--easing-spring);
}
@keyframes hanziPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.pinyin-display {
  font-size: 20px;
  font-weight: 600;
  color: var(--color-brand-default);
  margin-bottom: 2px;
  letter-spacing: 0.3px;
}
.meaning-display {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* 操作按钮行 */
.action-pills {
  display: flex;
  justify-content: center;
  gap: 8px;
}
.audio-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  background: var(--color-brand-50);
  color: var(--color-brand-default);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--color-brand-200);
  transition: transform 100ms var(--easing-spring);
  position: relative;
  overflow: hidden;
}
.audio-pill:active { transform: scale(0.95); }
.audio-pill.playing {
  animation: audioPulse 600ms ease infinite;
}
@keyframes audioPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--color-brand-ring); }
  50% { box-shadow: 0 0 0 6px transparent; }
}

/* ===== 属性标签 ===== */
.attr-row {
  display: flex;
  gap: 6px;
  margin: 10px 20px;
}
.attr-chip {
  flex: 1;
  border-radius: var(--radius-lg);
  padding: 10px 6px;
  text-align: center;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur-sm);
  border: 1px solid var(--glass-border);
}
.attr-chip .chip-icon { font-size: 18px; margin-bottom: 1px; }
.attr-chip .chip-label {
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.attr-chip .chip-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

/* ===== 组词列表 ===== */
.vocab-section {
  padding: 0 20px;
  margin-top: 4px;
}
.vocab-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.vocab-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur-sm);
  border: 1px solid var(--glass-border);
  margin-bottom: 6px;
  cursor: pointer;
  transition: transform 150ms var(--easing-spring);
  position: relative;
  overflow: hidden;
}
.vocab-item:active { transform: scale(0.98); }
.vocab-item .v-char {
  font-family: var(--font-hanzi);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  min-width: 44px;
}
.vocab-item .v-pinyin {
  font-size: 12px;
  color: var(--color-brand-default);
  font-weight: 500;
}
.vocab-item .v-meaning {
  font-size: 12px;
  color: var(--text-muted);
}
.vocab-item .v-speaker {
  margin-left: auto;
  font-size: 16px;
  opacity: 0.4;
}

/* ===== 例句区 ===== */
.example-section {
  padding: 0 20px;
  margin: 8px 0;
}
.example-card {
  padding: 12px 14px;
  border-radius: var(--radius-lg);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur-sm);
  border: 1px solid var(--glass-border);
}
.example-cn {
  font-size: 17px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  line-height: 1.7;
}
.example-cn ruby rt {
  font-size: 9px;
  color: var(--color-brand-default);
}
.example-en {
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== 底部操作栏 ===== */
.bottom-action {
  padding: 12px 20px 28px;
  margin-top: auto;
  position: sticky;
  bottom: 0;
  background: linear-gradient(transparent, var(--page-bg) 30%);
  flex-shrink: 0;
}
.btn-continue {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 52px;
  border-radius: var(--radius-pill);
  font-size: 17px;
  font-weight: 700;
  background: var(--color-brand-default);
  color: var(--color-brand-on);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 0 0 var(--color-brand-700);
  transition: transform 100ms var(--easing-spring), box-shadow 100ms var(--easing-spring);
  letter-spacing: 0.2px;
  position: relative;
  overflow: hidden;
}
.btn-continue:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 0 0 var(--color-brand-700);
}
.btn-continue:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 0 var(--color-brand-800);
  transition-duration: 50ms;
}

/* ===== 主题切换浮动条 ===== */
.theme-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  background: var(--glass-bg-elevated);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-pill);
  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  z-index: 1000;
}
.theme-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 150ms var(--easing-spring), border-color 150ms ease;
}
.theme-dot:hover { transform: scale(1.25); }
.theme-dot.active { border-color: var(--text-primary); box-shadow: 0 0 0 2px var(--page-bg); }
.theme-dot[data-c="red"] { background: #EA4335; }
.theme-dot[data-c="yellow"] { background: #FBBC04; }
.theme-dot[data-c="blue"] { background: #4285F4; }
.theme-dot[data-c="green"] { background: #34A853; }
.mode-toggle {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: transform 200ms var(--easing-spring);
}
.mode-toggle:active { transform: scale(0.88); }

/* ===== 背景mesh ===== */
.mesh-gradient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }

/* ===== Combo 显示 ===== */
.combo-indicator {
  position: absolute;
  top: 8px; right: 12px;
  opacity: 0;
  transition: opacity 200ms ease;
}
.combo-indicator.visible { opacity: 1; }
</style>
</head>
<body>

<!-- 极光背景 -->
<div class="mesh-gradient-bg">
  <div style="width:60vw;height:60vw;background:radial-gradient(circle,var(--mesh-color-1),transparent 70%);opacity:var(--mesh-opacity-1);position:absolute;top:-15%;left:-10%;filter:blur(100px);border-radius:50%;animation:mesh-drift-1 22s ease-in-out infinite"></div>
  <div style="width:55vw;height:55vw;background:radial-gradient(circle,var(--mesh-color-2),transparent 70%);opacity:var(--mesh-opacity-2);position:absolute;top:30%;right:-15%;filter:blur(100px);border-radius:50%;animation:mesh-drift-2 25s ease-in-out infinite"></div>
  <div style="width:50vw;height:50vw;background:radial-gradient(circle,var(--mesh-color-3),transparent 70%);opacity:var(--mesh-opacity-3);position:absolute;bottom:-10%;left:20%;filter:blur(100px);border-radius:50%;animation:mesh-drift-3 20s ease-in-out infinite"></div>
</div>

<!-- 手机壳 -->
<div class="phone-shell" id="phoneShell">
  <div class="phone-inner">

    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span style="display:flex;gap:4px;align-items:center;font-size:10px">

        <svg width="14" height="10" viewBox="0 0 16 12"><rect x="0" y="5" width="3" height="7" rx="1" fill="currentColor" opacity=".3"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="currentColor" opacity=".5"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor" opacity=".7"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>

      </span>
    </div>

    <!-- 顶部导航 -->
    <div class="app-nav">
      <div class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <span class="nav-title">Learn Characters</span>
      <div class="lives">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#EF4444"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>

<!-- 主题切换条 -->
<div class="theme-bar">
  <div class="theme-dot active" data-c="green" onclick="switchAccent('green',this)"></div>
  <div class="theme-dot" data-c="red" onclick="switchAccent('red',this)"></div>
  <div class="theme-dot" data-c="blue" onclick="switchAccent('blue',this)"></div>
  <div class="theme-dot" data-c="yellow" onclick="switchAccent('yellow',this)"></div>
  <div style="width:1px;height:18px;background:var(--glass-border)"></div>
  <div class="mode-toggle" onclick="toggleMode()">🌙</div>
</div>

<script src="../../docs/B02-experience-design/app/prototype-style/app.js"></script>
<script>
proto.bootstrap();

var cards = [
  { hanzi:'水', pinyin:'shuǐ', meaning:'water; liquid', radical:'水', strokes:4, hsk:1, mascot:'🐼', speech:'Tap the character to hear it!' },
  { hanzi:'火', pinyin:'huǒ', meaning:'fire; flame', radical:'火', strokes:4, hsk:1, mascot:'🐉', speech:'This one looks like a flame!' },
  { hanzi:'山', pinyin:'shān', meaning:'mountain; hill', radical:'山', strokes:3, hsk:1, mascot:'🐼', speech:'Can you see the peaks?' },
  { hanzi:'月', pinyin:'yuè', meaning:'moon; month', radical:'月', strokes:4, hsk:1, mascot:'🐇', speech:'A beautiful crescent moon!' },
];
var ci = 0;
var progress = 35;
var combo = 0;

function playHanzi() {
  var el = document.getElementById('hanzi');
  el.classList.add('pulse');
  setTimeout(function(){ el.classList.remove('pulse'); }, 300);
  proto.sfx('tap');
  proto.showXP('+5 XP', el);
  combo++;
  updateCombo();
}

function playAudio() {
  var btn = document.getElementById('audioBtn');
  btn.classList.add('playing');
  proto.sfx('tap');
  setTimeout(function(){ btn.classList.remove('playing'); }, 800);
}

function showStroke() {
  var mascot = document.getElementById('mascot');
  mascot.style.transform = 'scale(1.15) rotate(-8deg)';
  proto.sfx('card-flip');
  setTimeout(function(){ mascot.style.transform = ''; }, 300);
  document.getElementById('mascotSpeech').textContent = 'Watch the stroke order!';
}

function nextCard() {
  ci = (ci + 1) % cards.length;
  var card = cards[ci];
  var el = document.getElementById('learnCard');
  el.classList.add('flip-out');

  progress = Math.min(100, progress + 15);
  document.getElementById('progressFill').style.width = progress + '%';

  proto.sfx('correct');
  proto.showXP('+10 XP', document.getElementById('continueBtn'));
  proto.starBurst(document.getElementById('continueBtn'));

  if (progress >= 100) {
    setTimeout(function(){ proto.levelComplete(); }, 400);
  }

  setTimeout(function(){
    document.getElementById('hanzi').textContent = card.hanzi;
    document.getElementById('pinyin').textContent = card.pinyin;
    document.getElementById('meaning').textContent = card.meaning;
    document.getElementById('mascot').textContent = card.mascot;
    document.getElementById('mascotSpeech').textContent = card.speech;
    document.getElementById('radical').textContent = card.radical;
    document.getElementById('strokes').textContent = card.strokes;
    document.getElementById('hsk').textContent = card.hsk;

    el.classList.remove('flip-out');
    el.classList.add('flip-in');
    setTimeout(function(){ el.classList.remove('flip-in'); }, 500);
  }, 350);
}

function bounceItem(el, idx) {
  el.style.transform = 'scale(0.97)';
  proto.sfx('tap');
  setTimeout(function(){ el.style.transform = ''; }, 150);
}

function updateCombo() {
  var indicator = document.getElementById('comboIndicator');
  var countEl = document.getElementById('comboCount');
  if (combo >= 3) {
    countEl.textContent = combo;
    indicator.classList.add('visible');
    proto.sfx('streak');
  } else {
    indicator.classList.remove('visible');
  }
}

function switchAccent(c, el) {
  proto.switchAccent(c);
  document.querySelectorAll('.theme-dot').forEach(function(d){ d.classList.remove('active'); });
  el.classList.add('active');
}

function toggleMode() {
  var cur = document.documentElement.getAttribute('data-mode');
  var next = cur === 'dark' ? 'light' : 'dark';
  proto.switchTheme(next);
  document.querySelector('.mode-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
</script>
</body>
</html>
