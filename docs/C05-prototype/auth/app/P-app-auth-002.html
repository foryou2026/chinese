<!doctype html>
<!-- TARGET-PATH: docs/C05-prototype/auth/app/P-app-auth-002.html -->
<!-- page-id: P-app-auth-002 · state: default · feature: auth -->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="proto:page-id" content="P-app-auth-002">
<meta name="proto:state" content="default">
<title>P-app-auth-002 · default · auth</title>
<link rel="stylesheet" href="../../../B03-design/prototype-style/tokens.css">
<link rel="stylesheet" href="../../../B03-design/prototype-style/themes.css">
<link rel="stylesheet" href="../../../B03-design/prototype-style/app.css">
<script defer src="../../../B03-design/prototype-style/app.js"></script>
</head>
<body>
<header class="topnav glass-nav" data-block="Topnav">
  <span class="brand">知语</span>
  <span class="spacer"></span>
  <nav class="nav-actions">
    <button class="btn btn-ghost" data-action="toggle-theme" aria-label="切换主题">◐</button>
    <a class="btn btn-ghost" href="../index.html">原型首页</a>
  </nav>
</header>
<main class="page page-centered">
  <section class="glass-card auth-card" data-block="RegisterCard">
    <h1>创建账号</h1>
    <p class="subtitle">免费注册,开始你的中文学习旅程</p>
    <button class="btn btn-secondary btn-block" data-op="OP-google">使用 Google 注册</button>
    <div class="divider">或</div>
    <form data-mock-op="OP-register" autocomplete="on">
      <div class="form-row">
        <label class="label" for="displayName">昵称</label>
        <input class="input" id="displayName" name="displayName" type="text" autocomplete="nickname" required>
      </div>
      <div class="form-row">
        <label class="label" for="email">邮箱</label>
        <input class="input" id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="form-row">
        <label class="label" for="password">密码</label>
        <input class="input" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
        <span class="help">至少 8 位,包含字母与数字</span>
      </div>
      <button class="btn btn-primary btn-block" type="submit">注册</button>
    </form>
    <p class="help" style="text-align:center;margin-top:16px">
      已有账号？<a class="btn-link" href="P-app-auth-001.html">返回登录</a>
    </p>
  </section>
</main>
<script>proto.bootstrap();</script>
</body>
</html>
