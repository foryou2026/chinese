<style>
  body { background: var(--bg-app-tint); color: var(--text-primary); font-family: var(--font-sans); margin: 0; min-height: 100vh; }
  .page { max-width: 1180px; margin: 0 auto; padding: var(--space-5) var(--space-page-x-desktop) var(--space-7); }
  .crumb { font-size: var(--text-caption); color: var(--text-tertiary); margin-bottom: var(--space-3); display: flex; gap: var(--space-2); align-items: center; }
  .crumb a { color: var(--text-secondary); text-decoration: none; }
  .crumb a:hover { color: var(--brand); }
  .crumb span.sep { color: var(--text-disabled); }
  .hero { margin: var(--space-3) 0 var(--space-6); display: flex; flex-direction: column; gap: var(--space-2); }
  .hero h1 { font-size: var(--text-display); font-weight: 800; letter-spacing: -.02em; line-height: 1.1; margin: 0; color: var(--text-primary); }
  .hero p { color: var(--text-secondary); font-size: var(--text-body-lg); margin: 0; max-width: 720px; }
  .hero .meta { display: flex; gap: var(--space-2); margin-top: var(--space-3); flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius-pill); font-size: var(--text-caption); font-weight: 600; background: var(--brand-soft); color: var(--brand); }
  .chip.muted { background: var(--bg-hover); color: var(--text-secondary); }
  .grid { display: grid; gap: var(--space-4); grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); margin-top: var(--space-5); }
  .card { display: block; padding: var(--space-5); border-radius: var(--radius-lg); background: var(--glass-bg-strong); backdrop-filter: var(--glass-blur-md); -webkit-backdrop-filter: var(--glass-blur-md); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm), var(--glass-edge); color: var(--text-primary); text-decoration: none; transition: transform var(--motion-base), box-shadow var(--motion-base), border-color var(--motion-base); }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md), var(--glass-edge); border-color: var(--brand); }
  .card .eyebrow { font-size: var(--text-caption); color: var(--brand); font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: var(--space-2); }
  .card h3 { font-size: var(--text-h3); font-weight: 700; margin: 0 0 var(--space-1); color: var(--text-primary); }
  .card p { font-size: var(--text-body); color: var(--text-secondary); margin: 0; }
  .feature-block { margin-top: var(--space-6); }
  .feature-block h2 { font-size: var(--text-h2); font-weight: 700; margin: 0 0 var(--space-3); color: var(--text-primary); }
  .feature-block .sub { font-size: var(--text-body); color: var(--text-secondary); margin: 0 0 var(--space-3); }
  .table-card { margin-top: var(--space-5); border-radius: var(--radius-lg); overflow: hidden; background: var(--glass-bg-strong); backdrop-filter: var(--glass-blur-md); -webkit-backdrop-filter: var(--glass-blur-md); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm), var(--glass-edge); }
  table { width: 100%; border-collapse: collapse; font-size: var(--text-table); }
  th, td { padding: var(--space-3) var(--space-4); text-align: left; vertical-align: middle; }
  thead th { background: var(--bg-hover); font-weight: 700; font-size: var(--text-caption); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; }
  tbody tr { border-top: 1px solid var(--border-subtle); transition: background var(--motion-fast); }
  tbody tr:hover { background: var(--bg-hover); }
  td code { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); background: var(--bg-hover); padding: 2px 8px; border-radius: var(--radius-sm); }
  td .name { font-weight: 600; color: var(--text-primary); }
  .open-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: var(--radius-pill); background: var(--brand-soft); color: var(--brand); font-size: var(--text-caption); font-weight: 700; text-decoration: none; transition: background var(--motion-fast), transform var(--motion-fast); }
  .open-btn:hover { background: var(--brand-soft-strong); transform: translateX(2px); }
  footer { margin-top: var(--space-7); padding: var(--space-4) 0; border-top: 1px solid var(--border-subtle); font-size: var(--text-caption); color: var(--text-tertiary); text-align: center; }
  .topnav .btn { padding: 6px 12px; border-radius: var(--radius-pill); border: 1px solid var(--border-subtle); background: var(--glass-bg); color: var(--text-secondary); cursor: pointer; font-size: var(--text-caption); transition: all var(--motion-fast); }
  .topnav .btn:hover { color: var(--brand); border-color: var(--brand); }
  .topnav .back-link { color: var(--text-secondary); text-decoration: none; font-size: var(--text-caption); display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; border-radius: var(--radius-pill); transition: all var(--motion-fast); }
  .topnav .back-link:hover { color: var(--brand); background: var(--brand-soft); }
</style>

  </div>
  <footer>© 知语 · C03 原型审阅版 · 统一明暗主题</footer>
