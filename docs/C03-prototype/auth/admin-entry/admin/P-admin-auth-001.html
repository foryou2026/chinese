<!doctype html>

<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="proto:page-id" content="P-admin-auth-001">
<meta name="proto:state" content="default">
<title>P-admin-auth-001 · default · auth</title>
<link rel="stylesheet" href="../../../../B02-experience-design/prototype-style/tokens.css">
<link rel="stylesheet" href="../../../../B02-experience-design/prototype-style/themes.css">
<link rel="stylesheet" href="../../../../B02-experience-design/prototype-style/app.css">
<script defer src="../../../../B02-experience-design/prototype-style/app.js"></script>
</head>
<body>
  <!-- 共享导航加载 -->
  <div id="global-nav"></div>
  <script>
  (function(){
    var depth = 2; // module/surface
    var prefix = '../'.repeat(depth);
    fetch(prefix + '_shared/nav.html')
      .then(function(r){return r.text();})
      .then(function(html){
        document.getElementById('global-nav').innerHTML = html;
        document.querySelectorAll('#global-nav a[data-href]').forEach(function(a){
          a.href = prefix + a.dataset.href;
        });
        var pid = (document.querySelector('meta[name="proto:page-id"]')||{content:''}).content;
        var cur = document.querySelector('#global-nav [data-page="'+pid+'"]');
        if(cur) cur.classList.add('nav-active');
      }).catch(function(){});
  })();
  </script>
<header class="topnav glass-nav" data-block="Topnav">
  <span class="brand">知语</span>
  <span class="spacer"></span>
  <nav class="nav-actions">
    <button class="btn btn-ghost" data-action="toggle-theme" aria-label="切换主题">◐</button>
    <a class="btn btn-ghost" href="../../index.html">原型首页</a>
  </nav>
</header>
<main class="page page-centered">
  <section class="glass-card auth-card" data-block="AdminLogin">
    <h1>知语 · 管理后台</h1>
    <p class="subtitle">仅限运维与管理员账号登录。</p>
    <form data-mock-op="OP-admin-login" autocomplete="on">
      <div class="form-row"><label class="label" for="email">管理员邮箱</label>
        <input class="input" id="email" name="email" type="email" autocomplete="email" required autofocus></div>
      <div class="form-row">
        <div class="label-row">
          <label class="label" for="password">密码</label>
          <a class="btn-link" href="./P-admin-auth-002.html">忘记密码？</a>
        </div>
        <input class="input" id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">登录管理后台</button>
    </form>
    <p class="help" style="text-align:center;margin-top:16px;color:var(--text-tertiary)">
      非管理员请前往 <a class="btn-link" href="./P-admin-auth-001.html">用户登录</a>
    </p>
  </section>
</main>
<script>proto.bootstrap();</script>
</body>
</html>
