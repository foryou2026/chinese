<body>
  <!-- 共享导航加载 -->
  <div id="global-nav"></div>
  <script>
  (function(){
    var depth = 2; // module/surface
    var prefix = '../'.repeat(depth);
    fetch(prefix + '_shared/nav.html')
      .then(function(r){return r.text();})
      .then(function(html){
        document.getElementById('global-nav').innerHTML = html;
        document.querySelectorAll('#global-nav a[data-href]').forEach(function(a){
          a.href = prefix + a.dataset.href;
        });
        var pid = (document.querySelector('meta[name="proto:page-id"]')||{content:''}).content;
        var cur = document.querySelector('#global-nav [data-page="'+pid+'"]');
        if(cur) cur.classList.add('nav-active');
      }).catch(function(){});
  })();
  </script>
<header class="topnav glass-nav" data-block="Topnav">
  <span class="brand">知语</span>
  <span class="spacer"></span>
  <nav class="nav-actions">
    <button class="btn btn-ghost" data-action="toggle-theme" aria-label="切换主题">◐</button>
    <a class="btn btn-ghost" href="../../index.html">原型首页</a>
  </nav>
</header>
<main class="page page-centered">
  <section class="glass-card auth-card" data-block="AdminReset">
    <h1>设置新密码</h1>
    <p class="subtitle">完成后将自动登录管理后台。</p>
    <form data-mock-op="OP-admin-reset" autocomplete="on">
      <div class="form-row"><label class="label" for="password">新密码</label>
        <input class="input" id="password" name="password" type="password" autocomplete="new-password" minlength="12" required autofocus>
        <span class="help">管理员密码:至少 12 位,含大小写 + 数字</span></div>
      <div class="form-row"><label class="label" for="confirm">确认密码</label>
        <input class="input" id="confirm" name="confirm" type="password" autocomplete="new-password" required></div>
      <button class="btn btn-primary btn-block" type="submit">提交</button>
    </form>
  </section>
</main>
<script>proto.bootstrap();</script>
</body>
</html>
