<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="ink" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-admin-auth-001">
  <meta name="system-id" content="admin">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-001,R-auth-002,R-auth-008,R-auth-010">
  <title>登录 · admin 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .auth-container { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .auth-card { width:100%; max-width:420px; padding:var(--space-8); }
    .auth-logo { text-align:center; margin-bottom:var(--space-6); }
    .auth-logo-icon { width:48px; height:48px; background:linear-gradient(135deg, var(--color-brand-default), var(--color-brand-400)); border-radius:var(--radius-lg); display:inline-flex; align-items:center; justify-content:center; color:var(--color-brand-on); font-size:var(--text-xl); font-weight:var(--weight-bold); }
    .auth-logo h1 { font-size:var(--text-xl); margin-top:var(--space-3); }
    .auth-logo p { font-size:var(--text-sm); color:var(--text-muted); margin-top:var(--space-1); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .password-toggle:hover { color:var(--text-secondary); }
    .form-alert { display:none; padding:var(--space-3) var(--space-4); border-radius:var(--radius-md); margin-bottom:var(--space-4); font-size:var(--text-sm); border-left:4px solid; }
    .form-alert.is-error { display:flex; background:var(--color-danger-50); border-left-color:var(--color-danger-500); color:var(--color-danger-500); }
    .auth-footer { text-align:center; margin-top:var(--space-6); }
    .auth-footer a { font-size:var(--text-sm); color:var(--color-brand-default); text-decoration:none; }
    .auth-footer a:hover { color:var(--color-brand-hover); }
    .lang-switcher { position:fixed; bottom:var(--space-4); right:var(--space-4); z-index:10; display:flex; gap:var(--space-1); }
    .lang-btn { padding:var(--space-1) var(--space-2); border-radius:var(--radius-sm); border:1px solid var(--glass-border); background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur-sm); backdrop-filter:var(--glass-blur-sm); color:var(--text-muted); font-size:var(--text-xs); font-weight:var(--weight-medium); cursor:pointer; transition:var(--motion-fast); }
    .lang-btn:hover, .lang-btn.active { color:var(--color-brand-default); border-color:var(--color-brand-default); }
    .scenario-dropdown { position:fixed; z-index:var(--z-dropdown); background:var(--glass-bg-elevated); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); padding:var(--space-1) 0; min-width:200px; display:none; }
    .scenario-dropdown.is-open { display:block; }
    .scenario-item { padding:var(--space-2) var(--space-4); font-size:var(--text-sm); cursor:pointer; transition:background var(--motion-fast); color:var(--text-primary); }
    .scenario-item:hover { background:var(--glass-bg); }
    .scenario-item small { display:block; font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="proto-nav-bar"></div>

  <div class="auth-container">
    <div class="auth-card glass-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">A</div>
        <h1>管理后台</h1>
        <p>请使用管理员账号登录</p>
      </div>

      <div class="form-alert" id="login-alert" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="proto-field">
          <label for="email" class="proto-label proto-label-required">邮箱</label>
          <input type="email" id="email" class="proto-input" placeholder="请输入邮箱地址" autocomplete="email" required>
          <span class="proto-error-msg" id="email-error" style="display:none"></span>
        </div>

        <div class="proto-field">
          <label for="password" class="proto-label proto-label-required">密码</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="proto-input" placeholder="请输入密码" autocomplete="current-password" required style="padding-right:var(--space-10)">
            <button type="button" class="password-toggle" id="toggle-pwd" aria-label="切换密码可见">
              <span id="eye-icon">👁</span>
            </button>
          </div>
          <span class="proto-error-msg" id="password-error" style="display:none"></span>
        </div>

        <button type="submit" id="login-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
          <span class="proto-btn-label">登录</span>
          <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
        </button>
      </form>

      <div class="auth-footer">
        <a href="P-admin-auth-002.html">忘记密码？</a>
      </div>
    </div>
  </div>

  <!-- 场景选择下拉 -->
  <div class="scenario-dropdown" id="scenario-dd">
    <div class="scenario-item" data-scenario="success">
      ✅ 登录成功
      <small>跳转至 Dashboard</small>
    </div>
    <div class="scenario-item" data-scenario="wrong-pwd">
      ❌ 密码错误
      <small>显示错误提示，累计失败次数</small>
    </div>
    <div class="scenario-item" data-scenario="no-permission">
      🚫 无权限
      <small>非 admin 角色，拒绝访问</small>
    </div>
    <div class="scenario-item" data-scenario="locked">
      🔒 账号锁定
      <small>连续 5 次失败，锁定 30 分钟</small>
    </div>
  </div>

  <!-- 多语言切换 -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="zh">ZH</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="vi">VI</button>
    <button class="lang-btn" data-lang="th">TH</button>
    <button class="lang-btn" data-lang="id">ID</button>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html')
      .then(function(r){return r.text()})
      .then(function(html){
        document.getElementById('proto-nav-bar').innerHTML = html;
        var pid = document.querySelector('meta[name="page-id"]').content;
        var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
        if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-brand-50);color:var(--color-brand-default);text-decoration:none;font-weight:var(--weight-medium)';
        var themeBtn = document.querySelector('[data-action="toggle-theme"]');
        if(themeBtn) themeBtn.addEventListener('click', function(){
          var m = document.documentElement.getAttribute('data-mode');
          proto.switchTheme(m === 'dark' ? 'light' : 'dark');
        });
      });

    if(typeof proto !== 'undefined') proto.bootstrap();

    var emailInput = document.getElementById('email');
    var passwordInput = document.getElementById('password');
    var loginBtn = document.getElementById('login-btn');
    var loginForm = document.getElementById('login-form');
    var loginAlert = document.getElementById('login-alert');
    var togglePwd = document.getElementById('toggle-pwd');
    var eyeIcon = document.getElementById('eye-icon');
    var emailError = document.getElementById('email-error');
    var passwordError = document.getElementById('password-error');
    var scenarioDD = document.getElementById('scenario-dd');

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }
    function hideError(el) { el.style.display = 'none'; }
    function showAlert(msg) { loginAlert.textContent = msg; loginAlert.className = 'form-alert is-error'; }
    function hideAlert() { loginAlert.className = 'form-alert'; }

    emailInput.addEventListener('blur', function() {
      var v = emailInput.value.trim();
      if(!v) { showError(emailError, '请输入邮箱'); emailInput.setAttribute('aria-invalid','true'); }
      else if(!validateEmail(v)) { showError(emailError, '请输入有效的邮箱地址'); emailInput.setAttribute('aria-invalid','true'); }
      else { hideError(emailError); emailInput.removeAttribute('aria-invalid'); }
    });

    emailInput.addEventListener('input', function() { hideError(emailError); emailInput.removeAttribute('aria-invalid'); hideAlert(); });
    passwordInput.addEventListener('input', function() { hideError(passwordError); passwordInput.removeAttribute('aria-invalid'); hideAlert(); });

    togglePwd.addEventListener('click', function() {
      var isPwd = passwordInput.type === 'password';
      passwordInput.type = isPwd ? 'text' : 'password';
      eyeIcon.textContent = isPwd ? '🔒' : '👁';
    });

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      hideAlert();

      var email = emailInput.value.trim();
      var pwd = passwordInput.value;
      var valid = true;

      if(!email) { showError(emailError, '请输入邮箱'); emailInput.setAttribute('aria-invalid','true'); valid = false; }
      else if(!validateEmail(email)) { showError(emailError, '请输入有效的邮箱地址'); emailInput.setAttribute('aria-invalid','true'); valid = false; }
      if(!pwd) { showError(passwordError, '请输入密码'); passwordInput.setAttribute('aria-invalid','true'); valid = false; }
      if(!valid) return;

      var rect = loginBtn.getBoundingClientRect();
      scenarioDD.style.top = (rect.bottom + 8) + 'px';
      scenarioDD.style.left = rect.left + 'px';
      scenarioDD.style.width = rect.width + 'px';
      scenarioDD.classList.add('is-open');
    });

    document.querySelectorAll('.scenario-item').forEach(function(item) {
      item.addEventListener('click', function() {
        scenarioDD.classList.remove('is-open');
        var scenario = item.getAttribute('data-scenario');
        executeScenario(scenario);
      });
    });

    document.addEventListener('click', function(e) {
      if(!scenarioDD.contains(e.target) && e.target !== loginBtn) {
        scenarioDD.classList.remove('is-open');
      }
    });

    function executeScenario(scenario) {
      loginBtn.setAttribute('aria-busy','true');
      loginBtn.querySelector('.proto-btn-label').style.visibility = 'hidden';
      loginBtn.querySelector('.proto-spinner').style.display = 'inline-block';
      emailInput.disabled = true;
      passwordInput.disabled = true;

      setTimeout(function() {
        loginBtn.removeAttribute('aria-busy');
        loginBtn.querySelector('.proto-btn-label').style.visibility = 'visible';
        loginBtn.querySelector('.proto-spinner').style.display = 'none';
        emailInput.disabled = false;
        passwordInput.disabled = false;

        switch(scenario) {
          case 'success':
            sessionStorage.setItem('admin-logged-in', 'true');
            sessionStorage.setItem('admin-email', emailInput.value.trim());
            proto.toast({ type:'success', message:'登录成功，正在跳转...' });
            setTimeout(function(){ window.location.href = 'P-admin-auth-004.html'; }, 600);
            break;
          case 'wrong-pwd':
            var failCount = parseInt(sessionStorage.getItem('admin-login-fails') || '0') + 1;
            sessionStorage.setItem('admin-login-fails', failCount.toString());
            showAlert('邮箱或密码错误（已失败 ' + failCount + '/5 次）');
            break;
          case 'no-permission':
            showAlert('您没有管理后台访问权限');
            break;
          case 'locked':
            showAlert('登录失败次数过多，账号已锁定 30 分钟');
            break;
        }
      }, 800);
    }

    /* 多语言切换 */
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        proto.toast({ type:'info', message:'语言已切换为 ' + btn.getAttribute('data-lang').toUpperCase() + '（原型演示）' });
      });
    });
  </script>
</body>
</html>
