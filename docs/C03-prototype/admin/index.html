<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="indigo" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>admin 系统 · 模块导航</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { min-height:100dvh; display:flex; flex-direction:column; }
    .page-wrapper { position:relative; z-index:1; flex:1; padding:var(--space-6); max-width:960px; margin:0 auto; width:100%; }
    .back-link { display:inline-flex; align-items:center; gap:var(--space-1); font-size:var(--text-sm); color:var(--text-muted); text-decoration:none; margin-bottom:var(--space-6); }
    .back-link:hover { color:var(--color-brand-default); }
    .page-title { margin-bottom:var(--space-8); }
    .page-title h1 { font-size:var(--text-2xl); margin-bottom:var(--space-2); }
    .page-title p { font-size:var(--text-base); color:var(--text-secondary); }
    .module-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:var(--space-5); }
    .module-card {
      display:block; padding:var(--space-6); text-decoration:none; color:inherit;
      transition: var(--transition-all);
    }
    .module-card:hover { color:inherit; }
    .module-card .module-icon {
      width:44px; height:44px; border-radius:var(--radius-md);
      display:flex; align-items:center; justify-content:center;
      font-size:var(--text-lg); color:var(--color-brand-default);
      background:var(--color-brand-50); margin-bottom:var(--space-4);
    }
    .module-card h3 { font-size:var(--text-lg); margin-bottom:var(--space-2); }
    .module-card p { font-size:var(--text-sm); color:var(--text-secondary); line-height:var(--leading-normal); }
    .toolbar { margin-top:var(--space-8); display:flex; gap:var(--space-3); }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrapper">
    <a href="../index.html" class="back-link">← 项目总览</a>

    <div class="page-title">
      <h1>admin 管理系统</h1>
      <p>选择模块查看功能清单</p>
    </div>

    <div class="module-grid">
      <a href="auth/index.html" class="glass-card module-card">
        <div class="module-icon">🔐</div>
        <h3>auth 账号认证</h3>
        <p>登录认证、密码管理、会话管理等账号安全相关功能</p>
      </a>
    </div>

    <div class="toolbar">
      <div class="proto-mode-switcher">
        <button class="proto-mode-option" data-mode-val="light" aria-label="浅色" onclick="proto.switchTheme('light');updateModeUI()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="proto-mode-option" data-mode-val="dark" aria-label="深色" onclick="proto.switchTheme('dark');updateModeUI()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    if(typeof proto !== 'undefined') proto.bootstrap();
    function updateModeUI(){
      var mode = document.documentElement.getAttribute('data-mode');
      document.querySelectorAll('.proto-mode-option').forEach(function(b){
        b.setAttribute('aria-checked', b.getAttribute('data-mode-val') === mode ? 'true' : 'false');
      });
    }
    updateModeUI();
  </script>
</body>
</html>
