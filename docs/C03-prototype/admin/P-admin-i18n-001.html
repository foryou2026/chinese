<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-admin-i18n-001">
  <meta name="system-id" content="admin">
  <meta name="module-id" content="i18n">
  <meta name="feature-id" content="translation-hub">
  <meta name="related-r-ids" content="R-i18n-040">
  <title>翻译总览 · admin 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/admin/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .admin-topbar { display:flex; align-items:center; height:var(--topbar-height); padding:0 var(--space-4); position:sticky; top:0; z-index:var(--z-sticky); background:var(--glass-bg); backdrop-filter:var(--glass-blur); border-bottom:1px solid var(--glass-border); }
    .admin-topbar-logo { font-weight:var(--weight-semibold); font-size:var(--text-md); color:var(--text-primary); margin-right:auto; }
    .admin-layout { display:flex; flex:1; position:relative; z-index:1; }
    .admin-sidebar { width:var(--sidebar-width); background:var(--glass-bg-card); backdrop-filter:var(--glass-blur); border-right:1px solid var(--glass-border); padding:var(--space-4) 0; flex-shrink:0; overflow-y:auto; }
    .sidebar-section { padding:var(--space-2) var(--space-4); font-size:var(--text-xs); font-weight:var(--weight-semibold); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
    .sidebar-item { display:flex; align-items:center; gap:var(--space-2); height:36px; padding:0 var(--space-4); font-size:var(--text-sm); color:var(--text-secondary); cursor:pointer; transition:background var(--motion-fast); text-decoration:none; }
    .sidebar-item:hover { background:var(--glass-bg); color:var(--text-primary); }
    .sidebar-item.active { background:var(--color-brand-50); color:var(--color-brand-default); font-weight:var(--weight-medium); }
    .admin-content { flex:1; padding:var(--space-6); overflow-y:auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-6); }
    .page-header h1 { font-size:var(--text-xl); }
    .lang-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:var(--space-4); margin-bottom:var(--space-6); }
    .lang-card { padding:var(--space-5); cursor:pointer; transition:var(--transition-all); }
    .lang-card:hover { transform:translateY(-2px); }
    .lang-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-4); }
    .lang-card-name { font-weight:var(--weight-semibold); font-size:var(--text-md); }
    .lang-card-badge { font-size:var(--text-xs); padding:2px 8px; border-radius:var(--radius-pill); background:var(--color-warning-50); color:var(--color-warning-500); font-weight:var(--weight-medium); }
    .progress-row { display:flex; align-items:center; gap:var(--space-3); margin-bottom:var(--space-2); }
    .progress-label { font-size:var(--text-xs); color:var(--text-muted); min-width:60px; }
    .progress-bar { flex:1; height:6px; border-radius:var(--radius-pill); background:var(--color-neutral-200); overflow:hidden; }
    .progress-fill { height:100%; border-radius:var(--radius-pill); transition:width 0.6s ease; }
    .progress-fill.high { background:var(--color-success-700); }
    .progress-fill.mid { background:var(--color-warning-500); }
    .progress-fill.low { background:var(--color-danger-500); }
    .progress-pct { font-size:var(--text-xs); color:var(--text-secondary); min-width:36px; text-align:right; }
    .stats-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:var(--space-4); margin-bottom:var(--space-6); }
    .stat-card { padding:var(--space-4); text-align:center; }
    .stat-num { font-size:var(--text-2xl); font-weight:var(--weight-semibold); }
    .stat-num.danger { color:var(--color-danger-500); }
    .stat-num.warning { color:var(--color-warning-500); }
    .stat-num.success { color:var(--color-success-700); }
    .stat-num.info { color:var(--color-info-500); }
    .stat-label { font-size:var(--text-xs); color:var(--text-muted); margin-top:var(--space-1); }
    .actions-bar { display:flex; gap:var(--space-3); flex-wrap:wrap; }
    @media (max-width: 768px) { .admin-sidebar { display:none; } .stats-grid { grid-template-columns:repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="admin-page-bg" aria-hidden="true"></div>
  <header class="admin-topbar">
    <span class="admin-topbar-logo">管理后台</span>
    <div style="display:flex;align-items:center;gap:var(--space-2)">
      <button data-action="toggle-theme" class="proto-btn proto-btn-ghost proto-btn-sm" onclick="proto.switchTheme(document.documentElement.getAttribute('data-mode')==='dark'?'light':'dark')">明/暗</button>
      <a href="i18n/translation-hub/index.html" class="proto-btn proto-btn-ghost proto-btn-sm" style="text-decoration:none;font-size:var(--text-xs)">原型导航</a>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-section">翻译</div>
      <a href="P-admin-i18n-001.html" class="sidebar-item active">翻译总览</a>
      <a href="P-admin-i18n-003.html" class="sidebar-item">文案翻译</a>
      <a href="P-admin-i18n-004.html" class="sidebar-item">内容翻译</a>
      <a href="P-admin-i18n-007.html" class="sidebar-item">翻译任务</a>
      <a href="P-admin-i18n-009.html" class="sidebar-item">翻译接口</a>
      <div class="sidebar-section" style="margin-top:var(--space-2)">配音</div>
      <a href="P-admin-i18n-013.html" class="sidebar-item">配音总览</a>
      <a href="P-admin-i18n-008.html" class="sidebar-item">配音管理</a>
      <a href="P-admin-i18n-016.html" class="sidebar-item">音色管理</a>
      <a href="P-admin-i18n-010.html" class="sidebar-item">配音任务</a>
      <a href="P-admin-i18n-011.html" class="sidebar-item">配音接口</a>
      <div class="sidebar-section" style="margin-top:var(--space-2)">全局</div>
      <a href="P-admin-i18n-002.html" class="sidebar-item">语言管理</a>
    </aside>

    <main class="admin-content">
      <div class="page-header">
        <div class="actions-bar">
          <button class="proto-btn proto-btn-secondary proto-btn-sm" onclick="proto.toast({type:'info',message:'正在同步 UI 文案...'})">同步文案</button>
          <button class="proto-btn proto-btn-primary proto-btn-sm" id="btn-global-translate">全局翻译</button>
        </div>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(2, 1fr)">
        <div class="admin-card stat-card">
          <div class="stat-num danger">28</div>
          <div class="stat-label">待翻译</div>
        </div>
        <div class="admin-card stat-card">
          <div class="stat-num success">295</div>
          <div class="stat-label">已翻译</div>
        </div>
      </div>

      <div style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--space-4)">各语言覆盖率</div>
      <div class="lang-cards">
        <div class="admin-card lang-card" onclick="window.location.href='P-admin-i18n-003.html'">
          <div class="lang-card-header">
            <span class="lang-card-name">英语 English</span>
            <span class="lang-card-badge">12 待翻译</span>
          </div>
          <div class="progress-row">
            <span class="progress-label">UI 文案</span>
            <div class="progress-bar"><div class="progress-fill high" style="width:87%"></div></div>
            <span class="progress-pct">87%</span>
          </div>
          <div class="progress-row">
            <span class="progress-label">DB 内容</span>
            <div class="progress-bar"><div class="progress-fill mid" style="width:72%"></div></div>
            <span class="progress-pct">72%</span>
          </div>
        </div>

        <div class="admin-card lang-card" onclick="window.location.href='P-admin-i18n-003.html'">
          <div class="lang-card-header">
            <span class="lang-card-name">越南语 Tiếng Việt</span>
            <span class="lang-card-badge">8 待翻译</span>
          </div>
          <div class="progress-row">
            <span class="progress-label">UI 文案</span>
            <div class="progress-bar"><div class="progress-fill mid" style="width:62%"></div></div>
            <span class="progress-pct">62%</span>
          </div>
          <div class="progress-row">
            <span class="progress-label">DB 内容</span>
            <div class="progress-bar"><div class="progress-fill low" style="width:35%"></div></div>
            <span class="progress-pct">35%</span>
          </div>
        </div>

        <div class="admin-card lang-card" style="opacity:0.6;border:2px dashed var(--border-color)">
          <div class="lang-card-header">
            <span class="lang-card-name" style="color:var(--text-muted)">+ 启用更多语言</span>
          </div>
          <p style="font-size:var(--text-xs);color:var(--text-muted)">前往语言管理页面启用新语言</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../../B02-experience-design/admin/prototype-style/app.js"></script>
  <script>
    if(typeof proto !== 'undefined') proto.bootstrap();
    document.getElementById('btn-global-translate').addEventListener('click', function(){
      proto.modal({
        size:'sm', title:'全局翻译',
        body:'<div class="proto-field" style="margin-bottom:var(--space-3)"><label class="proto-label">翻译模型</label><select class="proto-input" style="margin-top:var(--space-1);width:100%"><option value="">选择翻译模型…</option><option value="claude-sonnet">Claude Sonnet</option><option value="gpt-4o">GPT-4o</option><option value="deepl">DeepL</option></select></div><p style="font-size:var(--text-sm);color:var(--text-secondary)">将翻译所有语言的所有待翻译条目（UI 文案 + 数据库内容），共计 <strong>28</strong> 条。</p>',
        confirmLabel:'开始翻译', cancelLabel:'取消',
        onConfirm:function(){ proto.toast({type:'success',message:'翻译任务已创建，可在"翻译任务"页查看进度'}); }
      });
    });
  </script>
</body>
</html>
