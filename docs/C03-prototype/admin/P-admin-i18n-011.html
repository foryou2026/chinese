<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-admin-i18n-011">
  <meta name="system-id" content="admin">
  <meta name="module-id" content="i18n">
  <meta name="feature-id" content="translation-hub">
  <title>配音接口 · admin 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/admin/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .admin-topbar { display:flex; align-items:center; height:var(--topbar-height); padding:0 var(--space-4); position:sticky; top:0; z-index:var(--z-sticky); background:var(--glass-bg); backdrop-filter:var(--glass-blur); border-bottom:1px solid var(--glass-border); }
    .admin-topbar-logo { font-weight:var(--weight-semibold); font-size:var(--text-md); color:var(--text-primary); margin-right:auto; }
    .admin-layout { display:flex; flex:1; position:relative; z-index:1; }
    .admin-sidebar { width:var(--sidebar-width); background:var(--glass-bg-card); backdrop-filter:var(--glass-blur); border-right:1px solid var(--glass-border); padding:var(--space-4) 0; flex-shrink:0; }
    .sidebar-section { padding:var(--space-2) var(--space-4); font-size:var(--text-xs); font-weight:var(--weight-semibold); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
    .sidebar-item { display:flex; align-items:center; gap:var(--space-2); height:36px; padding:0 var(--space-4); font-size:var(--text-sm); color:var(--text-secondary); cursor:pointer; transition:background var(--motion-fast); text-decoration:none; }
    .sidebar-item:hover { background:var(--glass-bg); color:var(--text-primary); }
    .sidebar-item.active { background:var(--color-brand-50); color:var(--color-brand-default); font-weight:var(--weight-medium); }
    .admin-content { flex:1; padding:var(--space-6); overflow-y:auto; }
    .section-title { font-size:var(--text-md); font-weight:var(--weight-semibold); margin-bottom:var(--space-4); padding-bottom:var(--space-2); border-bottom:1px solid var(--border-color); }
    .config-form { max-width:600px; }
    .form-group { margin-bottom:var(--space-4); }
    .form-label { display:block; font-size:var(--text-sm); font-weight:var(--weight-medium); color:var(--text-primary); margin-bottom:var(--space-1); }
    .form-hint { font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
    .form-input { width:100%; padding:var(--space-2) var(--space-3); border:1px solid var(--border-color); border-radius:var(--radius-md); font-size:var(--text-sm); background:var(--surface-page); color:var(--text-primary); }
    .form-input:focus { outline:none; border-color:var(--color-brand-default); box-shadow:0 0 0 2px var(--color-brand-50); }
    .form-select { width:100%; padding:var(--space-2) var(--space-3); border:1px solid var(--border-color); border-radius:var(--radius-md); font-size:var(--text-sm); background:var(--surface-page); color:var(--text-primary); }
    .password-wrapper { position:relative; }
    .password-wrapper input { padding-right:40px; }
    .password-toggle { position:absolute; right:var(--space-2); top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:var(--text-sm); color:var(--text-muted); padding:var(--space-1); }
    .password-toggle:hover { color:var(--text-primary); }
    .code-textarea { width:100%; padding:var(--space-3); border:1px solid var(--border-color); border-radius:var(--radius-md); font-family:var(--font-mono); font-size:var(--text-xs); line-height:1.6; background:var(--color-neutral-900); color:var(--color-neutral-100); resize:vertical; }
    .code-textarea:focus { outline:none; border-color:var(--color-brand-default); box-shadow:0 0 0 2px var(--color-brand-50); }
    .voice-table { width:100%; border-collapse:collapse; }
    .voice-table th { text-align:left; font-size:var(--text-xs); font-weight:var(--weight-semibold); color:var(--text-muted); padding:var(--space-2) var(--space-3); border-bottom:2px solid var(--border-color); }
    .voice-table td { padding:var(--space-3); font-size:var(--text-sm); border-bottom:1px solid var(--glass-border); vertical-align:middle; }
    .voice-table tr:hover { background:var(--glass-bg); }
    .voice-table input[type="text"] { width:100%; min-width:100px; padding:var(--space-1) var(--space-2); border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:var(--text-xs); background:var(--surface-page); color:var(--text-primary); }
    .voice-table .voice-params { font-family:var(--font-mono); font-size:10px; min-width:140px; }
    .voice-table select { padding:var(--space-1) var(--space-2); border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:var(--text-xs); background:var(--surface-page); color:var(--text-primary); min-width:80px; }
    .test-area { margin-top:var(--space-4); padding:var(--space-4); border:1px dashed var(--border-color); border-radius:var(--radius-md); }
    .test-area-title { font-size:var(--text-sm); font-weight:var(--weight-medium); margin-bottom:var(--space-3); }
    .audio-preview { margin-top:var(--space-3); padding:var(--space-3); background:var(--glass-bg); border-radius:var(--radius-md); display:none; }
    .audio-preview.show { display:flex; align-items:center; gap:var(--space-3); }
    .audio-play-btn { width:36px; height:36px; border-radius:50%; background:var(--color-brand-default); color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:var(--text-md); flex-shrink:0; transition:background var(--motion-fast); }
    .audio-play-btn:hover { background:var(--color-brand-600); }
    .audio-info { font-size:var(--text-xs); color:var(--text-muted); }
    .audio-info strong { color:var(--text-secondary); font-weight:var(--weight-medium); }
    .status-indicator { display:inline-flex; align-items:center; gap:var(--space-1); font-size:var(--text-xs); font-weight:var(--weight-medium); }
    .status-dot { width:8px; height:8px; border-radius:50%; }
    .status-dot.online { background:var(--color-success-700); }
    .status-dot.offline { background:var(--color-neutral-300); }
    .form-actions { display:flex; gap:var(--space-2); margin-top:var(--space-5); padding-top:var(--space-4); border-top:1px solid var(--glass-border); }
    @media (max-width: 768px) { .admin-sidebar { display:none; } }
  </style>
</head>
<body>
  <div class="admin-page-bg" aria-hidden="true"></div>
  <header class="admin-topbar">
    <span class="admin-topbar-logo">管理后台</span>
    <div style="display:flex;align-items:center;gap:var(--space-2)">
      <button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="proto.switchTheme(document.documentElement.getAttribute('data-mode')==='dark'?'light':'dark')">明/暗</button>
      <a href="i18n/translation-hub/index.html" class="proto-btn proto-btn-ghost proto-btn-sm" style="text-decoration:none;font-size:var(--text-xs)">原型导航</a>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-section">翻译</div>
      <a href="P-admin-i18n-001.html" class="sidebar-item">翻译总览</a>
      <a href="P-admin-i18n-002.html" class="sidebar-item">语言管理</a>
      <a href="P-admin-i18n-003.html" class="sidebar-item">文案翻译</a>
      <a href="P-admin-i18n-004.html" class="sidebar-item">内容翻译</a>
      <a href="P-admin-i18n-007.html" class="sidebar-item">翻译任务</a>
      <a href="P-admin-i18n-009.html" class="sidebar-item">翻译接口</a>
      <div class="sidebar-section" style="margin-top:var(--space-2)">配音</div>
      <a href="P-admin-i18n-008.html" class="sidebar-item">配音管理</a>
      <a href="P-admin-i18n-010.html" class="sidebar-item">配音任务</a>
      <a href="P-admin-i18n-011.html" class="sidebar-item active">配音接口</a>
    </aside>

    <main class="admin-content">
      <!-- TTS 服务商配置 -->
      <h2 class="section-title">TTS 服务商配置</h2>
      <div class="admin-card" style="padding:var(--space-5)">
        <div class="config-form">
          <div class="form-group">
            <label class="form-label">服务商名称</label>
            <input type="text" class="form-input" id="provider-name" placeholder="e.g. My TTS Provider">
            <div class="form-hint">自定义标识名称，便于管理区分</div>
          </div>

          <div class="form-group">
            <label class="form-label">API Endpoint</label>
            <input type="url" class="form-input" id="api-endpoint" placeholder="https://api.example.com/v1/tts">
            <div class="form-hint">TTS 服务的 API 地址</div>
          </div>

          <div class="form-group">
            <label class="form-label">API Key</label>
            <div class="password-wrapper">
              <input type="password" class="form-input" id="api-key" placeholder="输入 API 密钥">
              <button class="password-toggle" onclick="togglePassword('api-key', this)">显示</button>
            </div>
            <div class="form-hint">密钥安全存储，加密后保存</div>
          </div>

          <div class="form-group">
            <label class="form-label">请求参数（JSON）</label>
            <textarea class="code-textarea" id="request-params" rows="6" placeholder='{
  "sample_rate": 24000,
  "encoding": "mp3",
  "speed": 1.0,
  "pitch": 0
}'></textarea>
            <div class="form-hint">自定义传递给 TTS API 的额外参数，如采样率、编码格式等</div>
          </div>

          <div class="form-group">
            <label class="form-label">服务商状态</label>
            <div class="status-indicator">
              <span class="status-dot online"></span>
              <span style="color:var(--color-success-700)">已连接</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 按语言音色配置 -->
      <div style="margin-top:var(--space-8)">
        <h2 class="section-title">按语言音色配置</h2>
        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">每个启用语言可独立配置默认音色参数</p>
        <div class="admin-card" style="overflow-x:auto">
          <table class="voice-table">
            <thead>
              <tr>
                <th style="width:100px">语言</th>
                <th style="width:160px">音色标识</th>
                <th>音色参数（JSON）</th>
                <th style="width:100px">输出格式</th>
                <th style="width:120px">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><strong>中文</strong> <span style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted)">zh</span></td>
                <td><input type="text" placeholder="e.g. female-standard-01"></td>
                <td><input type="text" class="voice-params" placeholder='{"speed":1.0,"pitch":0}'></td>
                <td>
                  <select>
                    <option selected>mp3</option>
                    <option>wav</option>
                    <option>ogg</option>
                  </select>
                </td>
                <td>
                  <div style="display:flex;gap:var(--space-1)">
                    <button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="testVoice('zh')">测试</button>
                    <button class="proto-btn proto-btn-primary proto-btn-sm" onclick="proto.toast({type:'success',message:'中文音色配置已保存'})">保存</button>
                  </div>
                </td>
              </tr>
              <tr>
                <td><strong>英语</strong> <span style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted)">en</span></td>
                <td><input type="text" placeholder="e.g. male-neural-02"></td>
                <td><input type="text" class="voice-params" placeholder='{"speed":1.1,"pitch":1}'></td>
                <td>
                  <select>
                    <option selected>mp3</option>
                    <option>wav</option>
                    <option>ogg</option>
                  </select>
                </td>
                <td>
                  <div style="display:flex;gap:var(--space-1)">
                    <button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="testVoice('en')">测试</button>
                    <button class="proto-btn proto-btn-primary proto-btn-sm" onclick="proto.toast({type:'success',message:'英语音色配置已保存'})">保存</button>
                  </div>
                </td>
              </tr>
              <tr>
                <td><strong>越南语</strong> <span style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted)">vi</span></td>
                <td><input type="text" placeholder="e.g. female-wavenet-01"></td>
                <td><input type="text" class="voice-params" placeholder='{"speed":0.9,"pitch":-1}'></td>
                <td>
                  <select>
                    <option>mp3</option>
                    <option selected>wav</option>
                    <option>ogg</option>
                  </select>
                </td>
                <td>
                  <div style="display:flex;gap:var(--space-1)">
                    <button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="testVoice('vi')">测试</button>
                    <button class="proto-btn proto-btn-primary proto-btn-sm" onclick="proto.toast({type:'success',message:'越南语音色配置已保存'})">保存</button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 测试生成 -->
      <div style="margin-top:var(--space-8)">
        <h2 class="section-title">测试生成</h2>
        <div class="admin-card" style="padding:var(--space-5)">
          <div class="test-area">
            <div class="test-area-title">输入文本并试听生成效果</div>
            <div style="display:flex;gap:var(--space-2);align-items:flex-end">
              <div style="flex:1">
                <label class="form-label" style="font-size:var(--text-xs)">测试文本</label>
                <textarea class="form-input" id="test-text" rows="2" style="resize:vertical" placeholder="输入需要转换为语音的文本内容">这是一门中文入门课程，适合零基础学习者。</textarea>
              </div>
              <div style="width:100px">
                <label class="form-label" style="font-size:var(--text-xs)">语言</label>
                <select class="form-select" id="test-lang" style="font-size:var(--text-xs)">
                  <option value="zh">zh</option>
                  <option value="en">en</option>
                  <option value="vi">vi</option>
                </select>
              </div>
              <button class="proto-btn proto-btn-secondary proto-btn-sm" onclick="runTtsTest()">测试生成</button>
            </div>
            <div class="audio-preview" id="audio-preview">
              <button class="audio-play-btn" onclick="proto.toast({type:'info',message:'播放音频预览…'})">&#9654;</button>
              <div class="audio-info">
                <div><strong>tts-preview-zh.mp3</strong></div>
                <div>时长 3.2s &middot; 48 KB &middot; mp3 &middot; 24000 Hz</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 保存/重置 -->
      <div class="form-actions">
        <button class="proto-btn proto-btn-primary proto-btn-sm" onclick="proto.toast({type:'success',message:'配音接口配置已保存'})">保存全部配置</button>
        <button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="proto.modal({size:'sm',title:'重置配置',body:'<p style=font-size:var(--text-sm)>确认重置所有配音接口配置为默认值？此操作不可撤销。</p>',confirmLabel:'确认重置',cancelLabel:'取消',onConfirm:function(){proto.toast({type:'info',message:'已恢复默认配置'})}})">重置</button>
      </div>
    </main>
  </div>

  <script src="../../B02-experience-design/admin/prototype-style/app.js"></script>
  <script>
    if(typeof proto !== 'undefined') proto.bootstrap();

    function togglePassword(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '隐藏';
      } else {
        input.type = 'password';
        btn.textContent = '显示';
      }
    }

    function testVoice(lang) {
      var names = { zh:'中文', en:'英语', vi:'越南语' };
      proto.toast({type:'info', message:'正在测试' + names[lang] + '音色…'});
      setTimeout(function(){
        proto.toast({type:'success', message: names[lang] + '音色测试成功'});
      }, 1500);
    }

    function runTtsTest() {
      var preview = document.getElementById('audio-preview');
      preview.className = 'audio-preview';
      proto.toast({type:'info', message:'正在生成配音…'});
      setTimeout(function(){
        var lang = document.getElementById('test-lang').value;
        var ext = 'mp3';
        preview.querySelector('.audio-info').innerHTML =
          '<div><strong>tts-preview-' + lang + '.' + ext + '</strong></div>' +
          '<div>时长 3.2s &middot; 48 KB &middot; ' + ext + ' &middot; 24000 Hz</div>';
        preview.classList.add('show');
        proto.toast({type:'success', message:'配音生成成功'});
      }, 2000);
    }
  </script>
</body>
</html>
