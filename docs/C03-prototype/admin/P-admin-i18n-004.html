<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-admin-i18n-004">
  <meta name="system-id" content="admin">
  <meta name="module-id" content="i18n">
  <meta name="feature-id" content="translation-hub">
  <meta name="related-r-ids" content="R-i18n-020,R-i18n-021">
  <title>数据表列表 · admin 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/admin/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .admin-topbar { display:flex; align-items:center; height:var(--topbar-height); padding:0 var(--space-4); position:sticky; top:0; z-index:var(--z-sticky); background:var(--glass-bg); backdrop-filter:var(--glass-blur); border-bottom:1px solid var(--glass-border); }
    .admin-topbar-logo { font-weight:var(--weight-semibold); font-size:var(--text-md); color:var(--text-primary); margin-right:auto; }
    .admin-layout { display:flex; flex:1; position:relative; z-index:1; }
    .admin-sidebar { width:var(--sidebar-width); background:var(--glass-bg-card); backdrop-filter:var(--glass-blur); border-right:1px solid var(--glass-border); padding:var(--space-4) 0; flex-shrink:0; }
    .sidebar-section { padding:var(--space-2) var(--space-4); font-size:var(--text-xs); font-weight:var(--weight-semibold); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
    .sidebar-item { display:flex; align-items:center; gap:var(--space-2); height:36px; padding:0 var(--space-4); font-size:var(--text-sm); color:var(--text-secondary); cursor:pointer; transition:background var(--motion-fast); text-decoration:none; }
    .sidebar-item:hover { background:var(--glass-bg); color:var(--text-primary); }
    .sidebar-item.active { background:var(--color-brand-50); color:var(--color-brand-default); font-weight:var(--weight-medium); }
    .admin-content { flex:1; padding:var(--space-6); overflow-y:auto; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-5); }
    .page-header h1 { font-size:var(--text-xl); }
    .data-table { width:100%; border-collapse:collapse; }
    .data-table th { text-align:left; font-size:var(--text-xs); font-weight:var(--weight-semibold); color:var(--text-muted); padding:var(--space-2) var(--space-3); border-bottom:2px solid var(--border-color); }
    .data-table td { padding:var(--space-3); font-size:var(--text-sm); border-bottom:1px solid var(--glass-border); vertical-align:middle; }
    .data-table tr:hover { background:var(--glass-bg); }
    .data-table tr.configured { }
    .table-name { font-weight:var(--weight-medium); font-family:var(--font-mono); font-size:var(--text-sm); }
    .config-badge { font-size:10px; padding:2px 8px; border-radius:var(--radius-pill); font-weight:var(--weight-medium); }
    .config-badge.yes { background:var(--color-success-50); color:var(--color-success-700); }
    .config-badge.no { background:var(--color-neutral-100); color:var(--text-muted); }
    .coverage-bar { display:inline-block; width:80px; height:6px; border-radius:var(--radius-pill); background:var(--color-neutral-200); overflow:hidden; vertical-align:middle; }
    .coverage-fill { height:100%; border-radius:var(--radius-pill); }
    @media (max-width: 768px) { .admin-sidebar { display:none; } }
  </style>
</head>
<body>
  <div class="admin-page-bg" aria-hidden="true"></div>
  <header class="admin-topbar">
    <span class="admin-topbar-logo">管理后台</span>
    <div style="display:flex;align-items:center;gap:var(--space-2)">
      <button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="proto.switchTheme(document.documentElement.getAttribute('data-mode')==='dark'?'light':'dark')">明/暗</button>
      <a href="i18n/translation-hub/index.html" class="proto-btn proto-btn-ghost proto-btn-sm" style="text-decoration:none;font-size:var(--text-xs)">原型导航</a>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-section">国际化管理</div>
      <a href="P-admin-i18n-001.html" class="sidebar-item">翻译总览</a>
      <a href="P-admin-i18n-002.html" class="sidebar-item">语言管理</a>
      <a href="P-admin-i18n-003.html" class="sidebar-item">UI 文案翻译</a>
      <a href="P-admin-i18n-004.html" class="sidebar-item active">数据库内容翻译</a>
      <a href="P-admin-i18n-007.html" class="sidebar-item">翻译任务</a>
      <a href="P-admin-i18n-008.html" class="sidebar-item">配音管理</a>
      <a href="P-admin-i18n-009.html" class="sidebar-item">接口配置</a>
    </aside>

    <main class="admin-content">
      <div class="page-header">
        <h1>数据库内容翻译</h1>
        <button class="proto-btn proto-btn-primary proto-btn-sm" onclick="proto.toast({type:'success',message:'全局内容翻译任务已创建'})">翻译全部待翻译</button>
      </div>

      <div class="admin-card" style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>表名</th>
              <th>中文说明</th>
              <th style="width:80px">翻译状态</th>
              <th style="width:100px">可翻译字段</th>
              <th style="width:180px">翻译覆盖率 (en)</th>
              <th style="width:100px">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr class="configured" style="cursor:pointer" onclick="window.location.href='P-admin-i18n-005.html'">
              <td class="table-name">courses</td>
              <td>课程表</td>
              <td><span class="config-badge yes">已配置</span></td>
              <td>3 个字段</td>
              <td>
                <span style="font-size:var(--text-xs);margin-right:var(--space-2)">78%</span>
                <span class="coverage-bar"><span class="coverage-fill" style="width:78%;background:var(--color-warning-500)"></span></span>
              </td>
              <td><a href="P-admin-i18n-005.html" style="font-size:var(--text-sm);color:var(--color-brand-default);text-decoration:none">进入字段 →</a></td>
            </tr>
            <tr class="configured" style="cursor:pointer" onclick="window.location.href='P-admin-i18n-005.html'">
              <td class="table-name">lessons</td>
              <td>课时表</td>
              <td><span class="config-badge yes">已配置</span></td>
              <td>2 个字段</td>
              <td>
                <span style="font-size:var(--text-xs);margin-right:var(--space-2)">65%</span>
                <span class="coverage-bar"><span class="coverage-fill" style="width:65%;background:var(--color-warning-500)"></span></span>
              </td>
              <td><a href="P-admin-i18n-005.html" style="font-size:var(--text-sm);color:var(--color-brand-default);text-decoration:none">进入字段 →</a></td>
            </tr>
            <tr class="configured" style="cursor:pointer">
              <td class="table-name">vocabulary</td>
              <td>词汇表</td>
              <td><span class="config-badge yes">已配置</span></td>
              <td>1 个字段</td>
              <td>
                <span style="font-size:var(--text-xs);margin-right:var(--space-2)">92%</span>
                <span class="coverage-bar"><span class="coverage-fill" style="width:92%;background:var(--color-success-700)"></span></span>
              </td>
              <td><a href="P-admin-i18n-005.html" style="font-size:var(--text-sm);color:var(--color-brand-default);text-decoration:none">进入字段 →</a></td>
            </tr>
            <tr style="cursor:pointer">
              <td class="table-name">exercises</td>
              <td>练习题表</td>
              <td><span class="config-badge no">未配置</span></td>
              <td>—</td>
              <td>—</td>
              <td><button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="event.stopPropagation();proto.modal({size:'sm',title:'配置 exercises 表',body:'<div class=proto-field><label class=proto-label>启用翻译</label><div style=margin-top:var(--space-2)><label style=font-size:var(--text-sm)><input type=checkbox checked> 启用翻译</label></div></div><div class=proto-field style=margin-top:var(--space-3)><label class=proto-label>默认源语言</label><select class=proto-input style=margin-top:var(--space-1)><option>中文 zh</option><option>英语 en</option></select></div>',confirmLabel:'保存',cancelLabel:'取消',onConfirm:function(){proto.toast({type:\'success\',message:\'配置已保存\'})}})">配置</button></td>
            </tr>
            <tr>
              <td class="table-name">user_profiles</td>
              <td>用户资料表</td>
              <td><span class="config-badge no">未配置</span></td>
              <td>—</td>
              <td>—</td>
              <td><button class="proto-btn proto-btn-ghost proto-btn-sm" onclick="event.stopPropagation()">配置</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../../B02-experience-design/admin/prototype-style/app.js"></script>
  <script>if(typeof proto !== 'undefined') proto.bootstrap();</script>
</body>
</html>
