<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="ink" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-admin-auth-004">
  <meta name="system-id" content="admin">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-005,R-auth-006,R-auth-007,R-auth-009">
  <title>后台壳 · admin 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .admin-topbar { display:flex; align-items:center; height:56px; padding:0 var(--space-4); position:sticky; top:0; z-index:var(--z-sticky); background:var(--glass-bg-card); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border-bottom:1px solid var(--glass-border); }
    .admin-topbar-logo { font-weight:var(--weight-semibold); font-size:var(--text-lg); color:var(--color-brand-default); margin-right:auto; }
    .admin-layout { display:flex; flex:1; position:relative; z-index:1; }
    .admin-sidebar { width:220px; background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border-right:1px solid var(--glass-border); padding:var(--space-4) 0; flex-shrink:0; }
    .sidebar-item { display:flex; align-items:center; gap:var(--space-2); height:40px; padding:0 var(--space-4); font-size:var(--text-sm); color:var(--text-secondary); cursor:pointer; transition:background var(--motion-fast); }
    .sidebar-item:hover { background:var(--glass-bg); }
    .sidebar-item.active { background:var(--color-brand-50); color:var(--color-brand-default); font-weight:var(--weight-medium); }
    .admin-content { flex:1; padding:var(--space-6); }
    .dashboard-placeholder { padding:var(--space-8); text-align:center; }
    .dashboard-placeholder h2 { font-size:var(--text-xl); margin-bottom:var(--space-2); }
    .dashboard-placeholder p { font-size:var(--text-sm); color:var(--text-secondary); }
    .avatar-area { position:relative; }
    .avatar-btn { display:flex; align-items:center; gap:var(--space-2); background:none; border:none; cursor:pointer; padding:var(--space-1) var(--space-2); border-radius:var(--radius-md); transition:background var(--motion-fast); }
    .avatar-btn:hover { background:var(--glass-bg); }
    .avatar-circle { width:32px; height:32px; border-radius:var(--radius-pill); background:var(--color-brand-50); color:var(--color-brand-default); display:flex; align-items:center; justify-content:center; font-size:var(--text-sm); font-weight:var(--weight-semibold); }
    .avatar-name { font-size:var(--text-sm); color:var(--text-primary); }
    .avatar-chevron { font-size:var(--text-xs); color:var(--text-muted); transition:transform var(--motion-fast); }
    .avatar-menu { position:absolute; right:0; top:calc(100% + var(--space-1)); min-width:180px; background:var(--glass-bg-elevated); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:var(--space-1) 0; display:none; z-index:var(--z-dropdown); }
    .avatar-menu.is-open { display:block; }
    .avatar-menu-item { display:flex; align-items:center; gap:var(--space-2); height:40px; padding:0 var(--space-3); font-size:var(--text-sm); color:var(--text-primary); cursor:pointer; transition:background var(--motion-fast); border:none; background:none; width:100%; text-align:left; }
    .avatar-menu-item:hover { background:var(--glass-bg); }
    .avatar-menu-sep { height:1px; background:var(--glass-border); margin:var(--space-1) 0; }
    .avatar-menu-item.destructive { color:var(--color-danger-500); }
    .avatar-menu-item.destructive:hover { background:var(--color-danger-50); }
    .change-pwd-form .proto-field + .proto-field { margin-top:var(--space-4); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .strength-bar { height:4px; border-radius:var(--radius-pill); background:var(--color-neutral-200); margin-top:var(--space-1); overflow:hidden; }
    .strength-fill { height:100%; border-radius:var(--radius-pill); transition:width var(--motion-base), background var(--motion-base); width:0; }
    .strength-text { font-size:var(--text-xs); margin-top:2px; color:var(--text-muted); }
    @media (max-width: 768px) { .admin-sidebar { display:none; } .admin-content { padding:var(--space-4); } }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="admin-topbar">
    <span class="admin-topbar-logo">管理后台</span>
    <div style="display:flex;align-items:center;gap:var(--space-2);margin-right:var(--space-4)">
      <button data-action="toggle-theme" class="proto-btn proto-btn-ghost proto-btn-sm" id="theme-toggle">明/暗</button>
      <a href="index.html" class="proto-btn proto-btn-ghost proto-btn-sm" style="text-decoration:none;font-size:var(--text-xs)">原型导航</a>
    </div>
    <div class="avatar-area" id="avatar-area">
      <button class="avatar-btn" id="avatar-btn" aria-expanded="false" aria-haspopup="true">
        <div class="avatar-circle">A</div>
        <span class="avatar-name">管理员</span>
        <span class="avatar-chevron" id="avatar-chevron">▼</span>
      </button>
      <div class="avatar-menu" id="avatar-menu" role="menu">
        <div style="padding:var(--space-2) var(--space-3);font-size:var(--text-xs);color:var(--text-muted)" id="menu-email">admin@example.com</div>
        <div class="avatar-menu-sep"></div>
        <button class="avatar-menu-item" role="menuitem" id="menu-change-pwd">修改密码</button>
        <div class="avatar-menu-sep"></div>
        <button class="avatar-menu-item destructive" role="menuitem" id="menu-logout">退出登录</button>
      </div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-item active">Dashboard</div>
      <div class="sidebar-item" style="color:var(--text-muted)">用户管理（占位）</div>
      <div class="sidebar-item" style="color:var(--text-muted)">内容管理（占位）</div>
      <div class="sidebar-item" style="color:var(--text-muted)">系统设置（占位）</div>
    </aside>

    <main class="admin-content">
      <div class="dashboard-placeholder glass-card">
        <h2>Dashboard</h2>
        <p>此为后台壳页面，用于演示登录态下的修改密码、退出登录、会话过期功能</p>
        <div style="margin-top:var(--space-6);display:flex;gap:var(--space-3);justify-content:center;flex-wrap:wrap">
          <button class="proto-btn proto-btn-secondary proto-btn-md" id="demo-change-pwd">演示：修改密码</button>
          <button class="proto-btn proto-btn-secondary proto-btn-md" id="demo-logout">演示：退出登录</button>
          <button class="proto-btn proto-btn-secondary proto-btn-md" id="demo-session-expired">演示：会话过期</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    if(typeof proto !== 'undefined') proto.bootstrap();

    document.getElementById('theme-toggle').addEventListener('click', function(){
      var m = document.documentElement.getAttribute('data-mode');
      proto.switchTheme(m === 'dark' ? 'light' : 'dark');
    });

    var avatarBtn = document.getElementById('avatar-btn');
    var avatarMenu = document.getElementById('avatar-menu');
    var avatarChevron = document.getElementById('avatar-chevron');

    avatarBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = avatarMenu.classList.toggle('is-open');
      avatarBtn.setAttribute('aria-expanded', open);
      avatarChevron.style.transform = open ? 'rotate(180deg)' : '';
    });

    document.addEventListener('click', function(e) {
      if(!document.getElementById('avatar-area').contains(e.target)) {
        avatarMenu.classList.remove('is-open');
        avatarBtn.setAttribute('aria-expanded', 'false');
        avatarChevron.style.transform = '';
      }
    });

    function openChangePwd() {
      avatarMenu.classList.remove('is-open');
      proto.modal({
        size: 'md',
        title: '修改密码',
        body:
          '<div class="change-pwd-form">' +
            '<div id="cpwd-alert" style="display:none;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);margin-bottom:var(--space-4);font-size:var(--text-sm);border-left:4px solid var(--color-danger-500);background:var(--color-danger-50);color:var(--color-danger-500)"></div>' +
            '<div class="proto-field"><label class="proto-label proto-label-required" for="cpwd-old">旧密码</label><div class="password-wrapper"><input type="password" id="cpwd-old" class="proto-input" placeholder="请输入当前密码" style="padding-right:var(--space-10)"><button type="button" class="password-toggle" onclick="var i=document.getElementById(\'cpwd-old\');i.type=i.type===\'password\'?\'text\':\'password\';this.textContent=i.type===\'password\'?\'👁\':\'🔒\'" aria-label="切换可见">👁</button></div><span class="proto-error-msg" id="cpwd-old-error" style="display:none"></span></div>' +
            '<div class="proto-field"><label class="proto-label proto-label-required" for="cpwd-new">新密码</label><div class="password-wrapper"><input type="password" id="cpwd-new" class="proto-input" placeholder="至少 8 位，包含字母和数字" style="padding-right:var(--space-10)"><button type="button" class="password-toggle" onclick="var i=document.getElementById(\'cpwd-new\');i.type=i.type===\'password\'?\'text\':\'password\';this.textContent=i.type===\'password\'?\'👁\':\'🔒\'" aria-label="切换可见">👁</button></div><div class="strength-bar"><div class="strength-fill" id="cpwd-strength-fill"></div></div><span class="strength-text" id="cpwd-strength-text"></span><span class="proto-error-msg" id="cpwd-new-error" style="display:none"></span></div>' +
            '<div class="proto-field"><label class="proto-label proto-label-required" for="cpwd-confirm">确认新密码</label><input type="password" id="cpwd-confirm" class="proto-input" placeholder="再次输入新密码"><span class="proto-error-msg" id="cpwd-confirm-error" style="display:none"></span></div>' +
            '<p style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-3)">修改密码后其他已登录设备将自动下线</p>' +
          '</div>',
        confirmLabel: '确认修改',
        cancelLabel: '取消',
        onConfirm: function() {
          var old = document.getElementById('cpwd-old');
          var newP = document.getElementById('cpwd-new');
          var confirm = document.getElementById('cpwd-confirm');
          if(!old || !newP || !confirm) return;
          if(!old.value) { proto.toast({type:'error',message:'请输入旧密码'}); return; }
          if(!newP.value || newP.value.length < 8) { proto.toast({type:'error',message:'新密码至少 8 位'}); return; }
          if(newP.value !== confirm.value) { proto.toast({type:'error',message:'两次密码不一致'}); return; }
          proto.toast({ type:'success', message:'密码修改成功，其他设备已下线' });
        }
      });

      setTimeout(function() {
        var newInput = document.getElementById('cpwd-new');
        if(newInput) {
          newInput.addEventListener('input', function() {
            var v = newInput.value; var score = 0;
            if(v.length >= 8) score++; if(/[a-zA-Z]/.test(v)) score++; if(/[0-9]/.test(v)) score++; if(/[^a-zA-Z0-9]/.test(v)) score++; if(v.length >= 12) score++;
            var map = [{w:'0%',bg:'var(--color-neutral-200)',t:''},{w:'25%',bg:'var(--color-danger-500)',t:'弱'},{w:'50%',bg:'var(--color-warning-500)',t:'一般'},{w:'75%',bg:'var(--color-info-500)',t:'较强'},{w:'100%',bg:'var(--color-success-700)',t:'强'},{w:'100%',bg:'var(--color-success-700)',t:'非常强'}];
            var s = map[score];
            var fill = document.getElementById('cpwd-strength-fill');
            var text = document.getElementById('cpwd-strength-text');
            if(fill) { fill.style.width = s.w; fill.style.background = s.bg; }
            if(text) { text.textContent = s.t; text.style.color = s.bg; }
          });
        }
      }, 100);
    }

    document.getElementById('menu-change-pwd').addEventListener('click', openChangePwd);
    document.getElementById('demo-change-pwd').addEventListener('click', openChangePwd);

    function doLogout() {
      avatarMenu.classList.remove('is-open');
      proto.modal({
        size: 'sm', title: '退出登录',
        body: '<p style="font-size:var(--text-sm);color:var(--text-secondary)">确定要退出登录吗？</p>',
        confirmLabel: '确认退出', cancelLabel: '取消',
        onConfirm: function() {
          sessionStorage.removeItem('admin-logged-in');
          proto.toast({ type:'success', message:'已退出登录' });
          setTimeout(function(){ window.location.href = 'P-admin-auth-001.html'; }, 600);
        }
      });
    }

    document.getElementById('menu-logout').addEventListener('click', doLogout);
    document.getElementById('demo-logout').addEventListener('click', doLogout);

    document.getElementById('demo-session-expired').addEventListener('click', function() {
      proto.modal({
        size: 'sm', title: '登录已过期',
        body: '<p style="font-size:var(--text-sm);color:var(--text-secondary)">您的登录状态已过期，请重新登录以继续操作。</p>',
        confirmLabel: '重新登录', cancelLabel: '',
        onConfirm: function() { window.location.href = 'P-admin-auth-001.html'; }
      });
      setTimeout(function() { document.querySelectorAll('.proto-modal-cancel').forEach(function(b){ b.style.display = 'none'; }); }, 50);
    });

    var savedEmail = sessionStorage.getItem('admin-email');
    if(savedEmail) { var el = document.getElementById('menu-email'); if(el) el.textContent = savedEmail; }
  </script>
</body>
</html>
