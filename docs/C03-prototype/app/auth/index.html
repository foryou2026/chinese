<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="red" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auth 模块 · 功能导航 · app</title>
  <link rel="stylesheet" href="../../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { min-height:100dvh; display:flex; flex-direction:column; }
    .page-wrapper { position:relative; z-index:1; flex:1; padding:var(--space-6); max-width:960px; margin:0 auto; width:100%; }
    .back-link { display:inline-flex; align-items:center; gap:var(--space-1); font-size:var(--text-sm); color:var(--text-muted); text-decoration:none; margin-bottom:var(--space-6); }
    .back-link:hover { color:var(--color-brand-default); }
    .page-title { margin-bottom:var(--space-8); }
    .page-title h1 { font-size:var(--text-2xl); margin-bottom:var(--space-2); }
    .page-title p { font-size:var(--text-base); color:var(--text-secondary); }
    .feature-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:var(--space-5); }
    .feature-card { display:block; padding:var(--space-6); text-decoration:none; color:inherit; transition:var(--transition-all); }
    .feature-card:hover { color:inherit; }
    .feature-card h3 { font-size:var(--text-lg); margin-bottom:var(--space-2); }
    .feature-card p { font-size:var(--text-sm); color:var(--text-secondary); line-height:var(--leading-normal); margin-bottom:var(--space-4); }
    .feature-card .enter-link { font-size:var(--text-sm); color:var(--color-brand-default); font-weight:var(--weight-medium); }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrapper">
    <a href="../index.html" class="back-link">← app 系统</a>
    <div class="page-title">
      <h1>auth 账号认证</h1>
      <p>选择功能查看原型页面</p>
    </div>

    <div class="feature-grid">
      <a href="account-entry/index.html" class="glass-card feature-card">
        <h3>account-entry 账号入口</h3>
        <p>注册（含邮箱验证码）、登录（邮箱+Google）、忘记密码、验证码校验、重置密码、修改/设置密码、设置页、退出登录</p>
        <span class="enter-link">查看原型页面 →</span>
      </a>
    </div>
  </div>

  <script src="../../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>if(typeof proto !== 'undefined') proto.bootstrap();</script>
</body>
</html>
