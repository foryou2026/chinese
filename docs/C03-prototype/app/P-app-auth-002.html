<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="ink" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-app-auth-002">
  <meta name="system-id" content="app">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-001,R-auth-003,R-auth-010,R-auth-011,R-auth-012,R-auth-013">
  <title>注册 · app 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .auth-container { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .auth-card { width:100%; max-width:420px; padding:var(--space-8); }
    .auth-brand { text-align:center; margin-bottom:var(--space-6); }
    .auth-brand-icon { width:56px; height:56px; background:linear-gradient(135deg, var(--color-brand-default), var(--color-brand-400)); border-radius:var(--radius-lg); display:inline-flex; align-items:center; justify-content:center; color:var(--color-brand-on); font-size:var(--text-2xl); font-family:var(--font-display); font-weight:var(--weight-semibold); }
    .auth-brand h1 { font-size:var(--text-xl); margin-top:var(--space-3); }
    .auth-brand p { font-size:var(--text-sm); color:var(--text-muted); margin-top:var(--space-1); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .form-alert { display:none; padding:var(--space-3) var(--space-4); border-radius:var(--radius-md); margin-bottom:var(--space-4); font-size:var(--text-sm); border-left:4px solid; }
    .form-alert.is-error { display:flex; gap:var(--space-2); align-items:center; background:var(--color-danger-50); border-left-color:var(--color-danger-500); color:var(--color-danger-500); }
    .form-alert a { color:var(--color-brand-default); font-weight:var(--weight-medium); text-decoration:none; }
    .form-alert a:hover { text-decoration:underline; }
    .strength-bar { height:4px; border-radius:var(--radius-pill); background:var(--color-neutral-200); margin-top:var(--space-1); overflow:hidden; }
    .strength-fill { height:100%; border-radius:var(--radius-pill); transition:width var(--motion-base), background var(--motion-base); width:0; }
    .strength-text { font-size:var(--text-xs); margin-top:2px; color:var(--text-muted); }
    .divider { display:flex; align-items:center; gap:var(--space-3); margin:var(--space-5) 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--glass-border); }
    .divider span { font-size:var(--text-xs); color:var(--text-muted); }
    .google-btn { display:flex; align-items:center; justify-content:center; gap:var(--space-2); width:100%; height:48px; background:var(--glass-bg); -webkit-backdrop-filter:var(--glass-blur-sm); backdrop-filter:var(--glass-blur-sm); border:1px solid var(--glass-border); border-radius:var(--radius-lg); font-size:var(--text-sm); font-weight:var(--weight-medium); color:var(--text-primary); cursor:pointer; transition:var(--transition-all); }
    .google-btn:hover { background:var(--glass-bg-card); box-shadow:var(--shadow-sm); }
    .google-btn:active { transform:scale(0.98); }
    .google-btn svg { width:20px; height:20px; }
    .auth-switch { text-align:center; margin-top:var(--space-5); font-size:var(--text-sm); color:var(--text-secondary); }
    .auth-switch a { color:var(--color-brand-default); text-decoration:none; font-weight:var(--weight-medium); }
    .auth-switch a:hover { text-decoration:underline; }
    .step-indicator { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-6); }
    .step { width:28px; height:28px; border-radius:var(--radius-pill); display:flex; align-items:center; justify-content:center; font-size:var(--text-xs); font-weight:var(--weight-semibold); }
    .step.active { background:var(--color-brand-default); color:var(--color-brand-on); }
    .step.done { background:var(--color-success-100); color:var(--color-success-700); }
    .step.pending { background:var(--glass-bg); color:var(--text-muted); border:1px solid var(--glass-border); }
    .step-line { flex:1; height:2px; background:var(--glass-border); }
    .step-line.done { background:var(--color-success-700); }
    .code-input-group { display:flex; gap:var(--space-2); }
    .code-digit { width:48px; height:56px; text-align:center; font-size:var(--text-xl); font-weight:var(--weight-semibold); font-family:var(--font-mono); letter-spacing:2px; }
    .countdown-btn { min-width:160px; }
    .scenario-dropdown { position:fixed; z-index:var(--z-dropdown); background:var(--glass-bg-elevated); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); padding:var(--space-1) 0; min-width:220px; display:none; }
    .scenario-dropdown.is-open { display:block; }
    .scenario-item { padding:var(--space-2) var(--space-4); font-size:var(--text-sm); cursor:pointer; transition:background var(--motion-fast); color:var(--text-primary); }
    .scenario-item:hover { background:var(--glass-bg); }
    .scenario-item small { display:block; font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
    .success-view { display:none; text-align:center; }
    .success-icon { width:64px; height:64px; border-radius:var(--radius-pill); background:var(--color-success-50); display:inline-flex; align-items:center; justify-content:center; font-size:var(--text-2xl); margin-bottom:var(--space-4); }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="proto-nav-bar"></div>

  <div class="auth-container">
    <div class="auth-card glass-card">

      <!-- 步骤 1：填写邮箱和密码 -->
      <div id="step-info">
        <div class="step-indicator">
          <div class="step active">1</div>
          <div class="step-line"></div>
          <div class="step pending">2</div>
        </div>
        <div class="auth-brand">
          <div class="auth-brand-icon">中</div>
          <h1>创建你的账号</h1>
          <p>开始你的中文学习之旅</p>
        </div>

        <div class="form-alert" id="reg-alert" role="alert"></div>

        <form id="reg-form" novalidate>
          <div class="proto-field">
            <label for="email" class="proto-label proto-label-required">邮箱</label>
            <input type="email" id="email" class="proto-input" placeholder="请输入邮箱" autocomplete="email" required>
            <span class="proto-error-msg" id="email-error" style="display:none"></span>
          </div>

          <div class="proto-field">
            <label for="password" class="proto-label proto-label-required">密码</label>
            <div class="password-wrapper">
              <input type="password" id="password" class="proto-input" placeholder="至少 8 位，包含字母和数字" required style="padding-right:var(--space-10)">
              <button type="button" class="password-toggle" id="toggle-pwd" aria-label="切换密码可见">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <span class="strength-text" id="strength-text"></span>
            <span class="proto-error-msg" id="pwd-error" style="display:none"></span>
          </div>

          <div class="proto-field">
            <label for="confirm" class="proto-label proto-label-required">确认密码</label>
            <input type="password" id="confirm" class="proto-input" placeholder="再次输入密码" required>
            <span class="proto-error-msg" id="confirm-error" style="display:none"></span>
          </div>

          <button type="submit" id="reg-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
            <span class="proto-btn-label">下一步</span>
            <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
          </button>
        </form>

        <div class="divider"><span>或</span></div>

        <button class="google-btn" id="google-btn">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          使用 Google 账号注册
        </button>

        <div class="auth-switch">
          已有账号？<a href="P-app-auth-001.html">登录</a>
        </div>
      </div>

      <!-- 步骤 2：邮箱验证码 -->
      <div id="step-code" style="display:none">
        <div class="step-indicator">
          <div class="step done">✓</div>
          <div class="step-line done"></div>
          <div class="step active">2</div>
        </div>
        <div style="margin-bottom:var(--space-6)">
          <h1 style="font-size:var(--text-xl);margin-bottom:var(--space-2)">验证邮箱</h1>
          <p style="font-size:var(--text-sm);color:var(--text-secondary)">验证码已发送至 <strong id="sent-email"></strong></p>
        </div>
        <div class="form-alert" id="code-alert" role="alert"></div>
        <div class="proto-field">
          <label class="proto-label proto-label-required">6 位验证码</label>
          <div class="code-input-group">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="0" inputmode="numeric" autocomplete="one-time-code">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="1" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="2" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="3" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="4" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="5" inputmode="numeric">
          </div>
          <span class="proto-error-msg" id="code-error" style="display:none"></span>
        </div>
        <button id="verify-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
          <span class="proto-btn-label">验证并注册</span>
          <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
        </button>
        <div style="text-align:center;margin-top:var(--space-4)">
          <button id="resend-btn" class="proto-btn proto-btn-ghost proto-btn-sm countdown-btn" disabled>
            重新发送 (<span id="countdown">60</span>s)
          </button>
        </div>
        <div style="text-align:center;margin-top:var(--space-3)">
          <button id="back-step1" class="proto-btn proto-btn-ghost proto-btn-sm">← 返回修改信息</button>
        </div>
      </div>

      <!-- 注册成功 -->
      <div class="success-view" id="success-view">
        <div class="success-icon">✓</div>
        <h2 style="font-size:var(--text-lg);margin-bottom:var(--space-2)">注册成功</h2>
        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">欢迎加入！<span id="redirect-cd">3</span> 秒后自动跳转</p>
        <a href="P-app-auth-006.html" class="proto-btn proto-btn-primary proto-btn-md" style="text-decoration:none">立即进入</a>
      </div>
    </div>
  </div>

  <!-- 验证码场景选择 -->
  <div class="scenario-dropdown" id="code-scenario-dd">
    <div class="scenario-item" data-scenario="code-ok">
      ✅ 验证码正确
      <small>注册成功，跳转首页</small>
    </div>
    <div class="scenario-item" data-scenario="code-wrong">
      ❌ 验证码错误
      <small>显示错误提示</small>
    </div>
    <div class="scenario-item" data-scenario="code-expired">
      ⏰ 验证码过期
      <small>提示验证码已过期，需重新发送</small>
    </div>
  </div>

  <!-- 邮箱已注册场景选择 -->
  <div class="scenario-dropdown" id="email-scenario-dd">
    <div class="scenario-item" data-scenario="email-ok">
      ✅ 邮箱可用
      <small>发送验证码，进入验证步骤</small>
    </div>
    <div class="scenario-item" data-scenario="email-taken">
      ❌ 邮箱已注册
      <small>提示该邮箱已被注册</small>
    </div>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html')
      .then(function(r){return r.text()})
      .then(function(html){
        document.getElementById('proto-nav-bar').innerHTML = html;
        var pid = document.querySelector('meta[name="page-id"]').content;
        var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
        if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-brand-50);color:var(--color-brand-default);text-decoration:none;font-weight:var(--weight-medium)';
        var themeBtn = document.querySelector('[data-action="toggle-theme"]');
        if(themeBtn) themeBtn.addEventListener('click', function(){ var m = document.documentElement.getAttribute('data-mode'); proto.switchTheme(m==='dark'?'light':'dark'); });
      });
    if(typeof proto !== 'undefined') proto.bootstrap();

    var emailInput = document.getElementById('email');
    var pwdInput = document.getElementById('password');
    var confirmInput = document.getElementById('confirm');
    var emailError = document.getElementById('email-error');
    var pwdError = document.getElementById('pwd-error');
    var confirmError = document.getElementById('confirm-error');
    var strengthFill = document.getElementById('strength-fill');
    var strengthText = document.getElementById('strength-text');
    var regForm = document.getElementById('reg-form');
    var regBtn = document.getElementById('reg-btn');
    var regAlert = document.getElementById('reg-alert');
    var togglePwd = document.getElementById('toggle-pwd');
    var googleBtn = document.getElementById('google-btn');

    var stepInfo = document.getElementById('step-info');
    var stepCode = document.getElementById('step-code');
    var sentEmail = document.getElementById('sent-email');
    var resendBtn = document.getElementById('resend-btn');
    var countdownEl = document.getElementById('countdown');
    var verifyBtn = document.getElementById('verify-btn');
    var codeAlert = document.getElementById('code-alert');
    var codeDigits = document.querySelectorAll('.code-digit');
    var codeScenarioDD = document.getElementById('code-scenario-dd');
    var emailScenarioDD = document.getElementById('email-scenario-dd');

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function checkStrength(v) {
      var score = 0;
      if(v.length >= 8) score++;
      if(/[a-zA-Z]/.test(v)) score++;
      if(/[0-9]/.test(v)) score++;
      if(/[^a-zA-Z0-9]/.test(v)) score++;
      if(v.length >= 12) score++;
      var map = [
        {w:'0%',bg:'var(--color-neutral-200)',t:''},
        {w:'25%',bg:'var(--color-danger-500)',t:'弱'},
        {w:'50%',bg:'var(--color-warning-500)',t:'一般'},
        {w:'75%',bg:'var(--color-info-500)',t:'较强'},
        {w:'100%',bg:'var(--color-success-700)',t:'强'},
        {w:'100%',bg:'var(--color-success-700)',t:'非常强'}
      ];
      var s = map[score];
      strengthFill.style.width = s.w; strengthFill.style.background = s.bg;
      strengthText.textContent = s.t; strengthText.style.color = s.bg;
    }

    emailInput.addEventListener('blur', function() {
      var v = emailInput.value.trim();
      if(!v) { emailError.textContent='请输入邮箱'; emailError.style.display='block'; }
      else if(!validateEmail(v)) { emailError.textContent='请输入有效的邮箱地址'; emailError.style.display='block'; }
      else { emailError.style.display='none'; }
    });
    emailInput.addEventListener('input', function(){ emailError.style.display='none'; regAlert.className='form-alert'; });

    pwdInput.addEventListener('input', function() {
      checkStrength(pwdInput.value);
      pwdError.style.display='none';
      if(confirmInput.value && confirmInput.value !== pwdInput.value) { confirmError.textContent='两次输入的密码不一致'; confirmError.style.display='block'; }
      else { confirmError.style.display='none'; }
    });
    pwdInput.addEventListener('blur', function() {
      var v = pwdInput.value;
      if(!v) { pwdError.textContent='请输入密码'; pwdError.style.display='block'; }
      else if(v.length<8 || !/[a-zA-Z]/.test(v) || !/[0-9]/.test(v)) { pwdError.textContent='密码至少 8 位，包含字母和数字'; pwdError.style.display='block'; }
    });

    confirmInput.addEventListener('blur', function() {
      if(confirmInput.value !== pwdInput.value) { confirmError.textContent='两次输入的密码不一致'; confirmError.style.display='block'; }
      else { confirmError.style.display='none'; }
    });
    confirmInput.addEventListener('input', function(){ confirmError.style.display='none'; });

    togglePwd.addEventListener('click', function() {
      var isPwd = pwdInput.type === 'password';
      pwdInput.type = isPwd ? 'text' : 'password';
      togglePwd.textContent = isPwd ? '🔒' : '👁';
    });

    /* 步骤 1 提交 → 场景选择 */
    regForm.addEventListener('submit', function(e) {
      e.preventDefault();
      regAlert.className = 'form-alert';
      var email = emailInput.value.trim(), pwd = pwdInput.value, conf = confirmInput.value;
      var valid = true;
      if(!email || !validateEmail(email)) { emailError.textContent=!email?'请输入邮箱':'请输入有效的邮箱地址'; emailError.style.display='block'; valid=false; }
      if(!pwd || pwd.length<8 || !/[a-zA-Z]/.test(pwd) || !/[0-9]/.test(pwd)) { pwdError.textContent='密码至少 8 位，包含字母和数字'; pwdError.style.display='block'; valid=false; }
      if(conf !== pwd) { confirmError.textContent='两次输入的密码不一致'; confirmError.style.display='block'; valid=false; }
      if(!valid) return;

      var rect = regBtn.getBoundingClientRect();
      emailScenarioDD.style.top = (rect.bottom + 8) + 'px';
      emailScenarioDD.style.left = rect.left + 'px';
      emailScenarioDD.style.width = rect.width + 'px';
      emailScenarioDD.classList.add('is-open');
    });

    document.querySelectorAll('#email-scenario-dd .scenario-item').forEach(function(item) {
      item.addEventListener('click', function() {
        emailScenarioDD.classList.remove('is-open');
        var scenario = item.getAttribute('data-scenario');

        regBtn.setAttribute('aria-busy','true');
        regBtn.querySelector('.proto-btn-label').style.visibility='hidden';
        regBtn.querySelector('.proto-spinner').style.display='inline-block';

        setTimeout(function() {
          regBtn.removeAttribute('aria-busy');
          regBtn.querySelector('.proto-btn-label').style.visibility='visible';
          regBtn.querySelector('.proto-spinner').style.display='none';

          if(scenario === 'email-ok') {
            sentEmail.textContent = emailInput.value.trim();
            stepInfo.style.display = 'none';
            stepCode.style.display = 'block';
            startCountdown();
            codeDigits[0].focus();
          } else {
            regAlert.innerHTML = '该邮箱已注册，<a href="P-app-auth-001.html">去登录</a>';
            regAlert.className = 'form-alert is-error';
          }
        }, 800);
      });
    });

    /* 返回步骤 1 */
    document.getElementById('back-step1').addEventListener('click', function() {
      stepCode.style.display = 'none';
      stepInfo.style.display = 'block';
    });

    /* 倒计时 */
    function startCountdown() {
      var sec = 60;
      resendBtn.disabled = true;
      resendBtn.innerHTML = '重新发送 (<span id="countdown">' + sec + '</span>s)';
      countdownEl = document.getElementById('countdown');
      var timer = setInterval(function() {
        sec--;
        countdownEl.textContent = sec;
        if(sec <= 0) { clearInterval(timer); resendBtn.disabled = false; resendBtn.textContent = '重新发送'; }
      }, 1000);
    }

    /* 验证码输入自动跳格 */
    codeDigits.forEach(function(input, idx) {
      input.addEventListener('input', function() {
        input.value = input.value.replace(/[^0-9]/g, '');
        if(input.value && idx < 5) codeDigits[idx + 1].focus();
      });
      input.addEventListener('keydown', function(e) {
        if(e.key === 'Backspace' && !input.value && idx > 0) codeDigits[idx - 1].focus();
      });
    });

    /* 验证按钮 → 场景选择 */
    verifyBtn.addEventListener('click', function() {
      var code = '';
      codeDigits.forEach(function(d){ code += d.value; });
      if(code.length < 6) {
        document.getElementById('code-error').textContent = '请输入完整的 6 位验证码';
        document.getElementById('code-error').style.display = 'block';
        return;
      }
      document.getElementById('code-error').style.display = 'none';

      var rect = verifyBtn.getBoundingClientRect();
      codeScenarioDD.style.top = (rect.bottom + 8) + 'px';
      codeScenarioDD.style.left = rect.left + 'px';
      codeScenarioDD.style.width = rect.width + 'px';
      codeScenarioDD.classList.add('is-open');
    });

    document.querySelectorAll('#code-scenario-dd .scenario-item').forEach(function(item) {
      item.addEventListener('click', function() {
        codeScenarioDD.classList.remove('is-open');
        var scenario = item.getAttribute('data-scenario');

        verifyBtn.setAttribute('aria-busy','true');
        verifyBtn.querySelector('.proto-btn-label').style.visibility = 'hidden';
        verifyBtn.querySelector('.proto-spinner').style.display = 'inline-block';

        setTimeout(function() {
          verifyBtn.removeAttribute('aria-busy');
          verifyBtn.querySelector('.proto-btn-label').style.visibility = 'visible';
          verifyBtn.querySelector('.proto-spinner').style.display = 'none';

          if(scenario === 'code-ok') {
            sessionStorage.setItem('app-logged-in','true');
            sessionStorage.setItem('app-email', emailInput.value.trim());
            sessionStorage.setItem('app-auth-type','email');
            stepCode.style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
            var sec = 3; var cdEl = document.getElementById('redirect-cd');
            var timer = setInterval(function() {
              sec--; cdEl.textContent = sec;
              if(sec <= 0) { clearInterval(timer); window.location.href = 'P-app-auth-006.html'; }
            }, 1000);
          } else if(scenario === 'code-wrong') {
            codeAlert.textContent = '验证码错误，请重新输入';
            codeAlert.className = 'form-alert is-error';
            codeDigits.forEach(function(d){ d.value = ''; });
            codeDigits[0].focus();
          } else if(scenario === 'code-expired') {
            codeAlert.textContent = '验证码已过期，请重新发送';
            codeAlert.className = 'form-alert is-error';
            codeDigits.forEach(function(d){ d.value = ''; });
          }
        }, 600);
      });
    });

    /* 关闭下拉 */
    document.addEventListener('click', function(e) {
      if(!codeScenarioDD.contains(e.target) && e.target !== verifyBtn) codeScenarioDD.classList.remove('is-open');
      if(!emailScenarioDD.contains(e.target) && e.target !== regBtn) emailScenarioDD.classList.remove('is-open');
    });

    resendBtn.addEventListener('click', function() {
      if(resendBtn.disabled) return;
      proto.toast({ type:'success', message:'验证码已重新发送' });
      startCountdown();
      codeAlert.className = 'form-alert';
    });

    /* Google 注册 */
    googleBtn.addEventListener('click', function() {
      googleBtn.disabled = true; googleBtn.style.opacity = '0.7';
      proto.toast({type:'info',message:'正在连接 Google...'});
      setTimeout(function() {
        proto.modal({
          size:'sm',
          title:'Google 账号授权（Mock）',
          body:'<div style="text-align:center;padding:var(--space-4)"><p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-4)">模拟 Google OAuth 注册流程</p><div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);border:1px solid var(--glass-border);border-radius:var(--radius-md)"><div style="width:40px;height:40px;border-radius:var(--radius-pill);background:var(--color-brand-50);display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--color-brand-default)">G</div><div style="text-align:left"><div style="font-size:var(--text-sm);font-weight:var(--weight-medium)">Google User</div><div style="font-size:var(--text-xs);color:var(--text-muted)">googleuser@gmail.com</div></div></div></div>',
          confirmLabel:'授权并注册',
          cancelLabel:'取消',
          onConfirm:function(){
            sessionStorage.setItem('app-logged-in','true');
            sessionStorage.setItem('app-email','googleuser@gmail.com');
            sessionStorage.setItem('app-auth-type','google');
            proto.toast({type:'success',message:'Google 注册成功，欢迎加入！'});
            setTimeout(function(){ window.location.href = 'P-app-auth-006.html'; },600);
          },
          onCancel:function(){ googleBtn.disabled=false; googleBtn.style.opacity='1'; }
        });
      }, 500);
    });
  </script>
</body>
</html>
