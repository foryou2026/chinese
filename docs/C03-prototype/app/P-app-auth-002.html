<!DOCTYPE html>
<html lang="zh-CN" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-app-auth-002">
  <meta name="system-id" content="app">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-001,R-auth-003,R-auth-010,R-auth-011,R-auth-012,R-auth-013">
  <title>注册 · app 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; background:var(--color-bg-secondary); }
    .auth-container { flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .auth-card { width:100%; max-width:400px; background:var(--color-bg-primary); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:var(--space-6) var(--space-5); }
    .auth-brand { text-align:center; margin-bottom:var(--space-5); }
    .auth-brand-icon { width:56px; height:56px; background:var(--color-primary-500); border-radius:var(--radius-lg); display:inline-flex; align-items:center; justify-content:center; color:white; font-size:var(--text-2xl); font-weight:var(--font-bold); }
    .auth-brand h1 { font-size:var(--text-xl); margin-top:var(--space-3); }
    .auth-brand p { font-size:var(--text-sm); color:var(--color-text-tertiary); margin-top:var(--space-1); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--color-text-tertiary); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .password-toggle:hover { color:var(--color-text-secondary); }
    .form-alert { display:none; padding:var(--space-3) var(--space-4); border-radius:var(--radius-md); margin-bottom:var(--space-4); font-size:var(--text-sm); border-left:4px solid; }
    .form-alert.is-error { display:flex; gap:var(--space-2); align-items:center; background:var(--color-error-light); border-left-color:var(--color-error); color:var(--color-error); }
    .form-alert a { color:var(--color-primary-500); font-weight:var(--font-medium); text-decoration:none; }
    .form-alert a:hover { text-decoration:underline; }
    .strength-bar { height:4px; border-radius:var(--radius-full); background:var(--color-neutral-200); margin-top:var(--space-1); overflow:hidden; }
    .strength-fill { height:100%; border-radius:var(--radius-full); transition:width var(--motion-normal) var(--ease-default), background var(--motion-normal) var(--ease-default); width:0; }
    .strength-text { font-size:var(--text-xs); margin-top:var(--space-0-5); color:var(--color-text-tertiary); }
    .divider { display:flex; align-items:center; gap:var(--space-3); margin:var(--space-5) 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--color-border); }
    .divider span { font-size:var(--text-xs); color:var(--color-text-tertiary); }
    .google-btn { display:flex; align-items:center; justify-content:center; gap:var(--space-2); width:100%; height:48px; background:var(--color-bg-primary); border:1px solid var(--color-border); border-radius:var(--radius-lg); font-size:var(--text-sm); font-weight:var(--font-medium); color:var(--color-text-primary); cursor:pointer; transition:background var(--motion-fast) var(--ease-default), box-shadow var(--motion-fast) var(--ease-default); }
    .google-btn:hover { background:var(--color-bg-secondary); box-shadow:var(--shadow-sm); }
    .google-btn:active { transform:scale(0.98); }
    .google-btn svg { width:20px; height:20px; }
    .auth-switch { text-align:center; margin-top:var(--space-5); font-size:var(--text-sm); color:var(--color-text-secondary); }
    .auth-switch a { color:var(--color-primary-500); text-decoration:none; font-weight:var(--font-medium); }
    .auth-switch a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div id="proto-nav-bar"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">中</div>
        <h1>创建你的账号</h1>
        <p>开始你的中文学习之旅</p>
      </div>

      <div class="form-alert" id="reg-alert" role="alert"></div>

      <form id="reg-form" novalidate>
        <div class="proto-field">
          <label for="email" class="proto-label proto-label-required">邮箱</label>
          <input type="email" id="email" class="proto-input" placeholder="请输入邮箱" autocomplete="email" required>
          <span class="proto-error-msg" id="email-error" style="display:none"></span>
        </div>

        <div class="proto-field">
          <label for="password" class="proto-label proto-label-required">密码</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="proto-input" placeholder="至少 8 位，包含字母和数字" required style="padding-right:var(--space-10)">
            <button type="button" class="password-toggle" id="toggle-pwd" aria-label="切换密码可见">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-text" id="strength-text"></span>
          <span class="proto-error-msg" id="pwd-error" style="display:none"></span>
        </div>

        <div class="proto-field">
          <label for="confirm" class="proto-label proto-label-required">确认密码</label>
          <input type="password" id="confirm" class="proto-input" placeholder="再次输入密码" required>
          <span class="proto-error-msg" id="confirm-error" style="display:none"></span>
        </div>

        <button type="submit" id="reg-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
          <span class="proto-btn-label">注册</span>
          <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
        </button>
      </form>

      <div class="divider"><span>或</span></div>

      <button class="google-btn" id="google-btn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        使用 Google 账号注册
      </button>

      <div class="auth-switch">
        已有账号？<a href="P-app-auth-001.html">登录</a>
      </div>
    </div>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html')
      .then(function(r){return r.text()})
      .then(function(html){
        document.getElementById('proto-nav-bar').innerHTML = html;
        var pid = document.querySelector('meta[name="page-id"]').content;
        var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
        if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-primary-50);color:var(--color-primary-600);text-decoration:none;font-weight:var(--font-medium);white-space:nowrap';
        var themeBtn = document.querySelector('[data-action="toggle-theme"]');
        if(themeBtn) themeBtn.addEventListener('click', function(){ var m = document.documentElement.getAttribute('data-mode'); proto.switchTheme(m==='dark'?'light':'dark'); });
      });
    if(typeof proto !== 'undefined') proto.bootstrap();

    var emailInput = document.getElementById('email');
    var pwdInput = document.getElementById('password');
    var confirmInput = document.getElementById('confirm');
    var emailError = document.getElementById('email-error');
    var pwdError = document.getElementById('pwd-error');
    var confirmError = document.getElementById('confirm-error');
    var strengthFill = document.getElementById('strength-fill');
    var strengthText = document.getElementById('strength-text');
    var regForm = document.getElementById('reg-form');
    var regBtn = document.getElementById('reg-btn');
    var regAlert = document.getElementById('reg-alert');
    var togglePwd = document.getElementById('toggle-pwd');
    var googleBtn = document.getElementById('google-btn');

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function checkStrength(v) {
      var score = 0;
      if(v.length >= 8) score++;
      if(/[a-zA-Z]/.test(v)) score++;
      if(/[0-9]/.test(v)) score++;
      if(/[^a-zA-Z0-9]/.test(v)) score++;
      if(v.length >= 12) score++;
      var map = [{w:'0%',bg:'var(--color-neutral-200)',t:''},{w:'25%',bg:'var(--color-error)',t:'弱'},{w:'50%',bg:'var(--color-warning)',t:'一般'},{w:'75%',bg:'var(--color-info)',t:'较强'},{w:'100%',bg:'var(--color-success)',t:'强'},{w:'100%',bg:'var(--color-success)',t:'非常强'}];
      var s = map[score];
      strengthFill.style.width = s.w; strengthFill.style.background = s.bg;
      strengthText.textContent = s.t; strengthText.style.color = s.bg;
    }

    emailInput.addEventListener('blur', function() {
      var v = emailInput.value.trim();
      if(!v) { emailError.textContent='请输入邮箱'; emailError.style.display='block'; emailInput.setAttribute('aria-invalid','true'); }
      else if(!validateEmail(v)) { emailError.textContent='请输入有效的邮箱地址'; emailError.style.display='block'; emailInput.setAttribute('aria-invalid','true'); }
      else { emailError.style.display='none'; emailInput.removeAttribute('aria-invalid'); }
    });
    emailInput.addEventListener('input', function(){ emailError.style.display='none'; emailInput.removeAttribute('aria-invalid'); regAlert.className='form-alert'; });

    pwdInput.addEventListener('input', function() {
      checkStrength(pwdInput.value);
      pwdError.style.display='none'; pwdInput.removeAttribute('aria-invalid');
      if(confirmInput.value && confirmInput.value !== pwdInput.value) { confirmError.textContent='两次输入的密码不一致'; confirmError.style.display='block'; confirmInput.setAttribute('aria-invalid','true'); }
      else { confirmError.style.display='none'; confirmInput.removeAttribute('aria-invalid'); }
    });

    pwdInput.addEventListener('blur', function() {
      var v = pwdInput.value;
      if(!v) { pwdError.textContent='请输入密码'; pwdError.style.display='block'; pwdInput.setAttribute('aria-invalid','true'); }
      else if(v.length < 8 || !/[a-zA-Z]/.test(v) || !/[0-9]/.test(v)) { pwdError.textContent='密码至少 8 位，包含字母和数字'; pwdError.style.display='block'; pwdInput.setAttribute('aria-invalid','true'); }
      else { pwdError.style.display='none'; pwdInput.removeAttribute('aria-invalid'); }
    });

    confirmInput.addEventListener('blur', function() {
      if(confirmInput.value !== pwdInput.value) { confirmError.textContent='两次输入的密码不一致'; confirmError.style.display='block'; confirmInput.setAttribute('aria-invalid','true'); }
      else { confirmError.style.display='none'; confirmInput.removeAttribute('aria-invalid'); }
    });
    confirmInput.addEventListener('input', function(){ confirmError.style.display='none'; confirmInput.removeAttribute('aria-invalid'); });

    togglePwd.addEventListener('click', function() {
      var isPwd = pwdInput.type === 'password';
      pwdInput.type = isPwd ? 'text' : 'password';
      togglePwd.textContent = isPwd ? '🔒' : '👁';
    });

    regForm.addEventListener('submit', function(e) {
      e.preventDefault();
      regAlert.className = 'form-alert';
      var email = emailInput.value.trim(), pwd = pwdInput.value, conf = confirmInput.value;
      var valid = true;
      if(!email || !validateEmail(email)) { emailError.textContent=!email?'请输入邮箱':'请输入有效的邮箱地址'; emailError.style.display='block'; emailInput.setAttribute('aria-invalid','true'); valid=false; }
      if(!pwd || pwd.length<8 || !/[a-zA-Z]/.test(pwd) || !/[0-9]/.test(pwd)) { pwdError.textContent='密码至少 8 位，包含字母和数字'; pwdError.style.display='block'; pwdInput.setAttribute('aria-invalid','true'); valid=false; }
      if(conf !== pwd) { confirmError.textContent='两次输入的密码不一致'; confirmError.style.display='block'; confirmInput.setAttribute('aria-invalid','true'); valid=false; }
      if(!valid) return;

      regBtn.setAttribute('aria-busy','true');
      regBtn.querySelector('.proto-btn-label').style.visibility='hidden';
      regBtn.querySelector('.proto-spinner').style.display='inline-block';

      setTimeout(function() {
        regBtn.removeAttribute('aria-busy');
        regBtn.querySelector('.proto-btn-label').style.visibility='visible';
        regBtn.querySelector('.proto-spinner').style.display='none';

        if(email === 'user@example.com') {
          regAlert.innerHTML = '该邮箱已注册，<a href="P-app-auth-001.html">去登录</a>';
          regAlert.className = 'form-alert is-error';
          return;
        }
        sessionStorage.setItem('app-logged-in','true');
        sessionStorage.setItem('app-email', email);
        sessionStorage.setItem('app-auth-type','email');
        proto.toast({type:'success',message:'注册成功，欢迎加入！'});
        setTimeout(function(){ window.location.href = 'P-app-auth-006.html'; },600);
      }, 800);
    });

    googleBtn.addEventListener('click', function() {
      googleBtn.disabled = true; googleBtn.style.opacity = '0.7';
      proto.toast({type:'info',message:'正在连接 Google...'});
      setTimeout(function() {
        proto.modal({
          size:'sm',
          title:'Google 账号授权（Mock）',
          body:'<div style="text-align:center;padding:var(--space-4)"><p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:var(--space-4)">模拟 Google OAuth 注册流程</p><div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md)"><div style="width:40px;height:40px;border-radius:var(--radius-full);background:var(--color-primary-100);display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);font-weight:var(--font-semibold);color:var(--color-primary-600)">G</div><div style="text-align:left"><div style="font-size:var(--text-sm);font-weight:var(--font-medium)">Google User</div><div style="font-size:var(--text-xs);color:var(--color-text-tertiary)">googleuser@gmail.com</div></div></div></div>',
          confirmLabel:'授权并注册',
          cancelLabel:'取消',
          onConfirm:function(){
            sessionStorage.setItem('app-logged-in','true');
            sessionStorage.setItem('app-email','googleuser@gmail.com');
            sessionStorage.setItem('app-auth-type','google');
            proto.toast({type:'success',message:'Google 注册成功，欢迎加入！'});
            setTimeout(function(){ window.location.href = 'P-app-auth-006.html'; },600);
          },
          onCancel:function(){ googleBtn.disabled=false; googleBtn.style.opacity='1'; }
        });
      }, 500);
    });
  </script>
</body>
</html>
