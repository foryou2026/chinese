<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="red" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-app-auth-003">
  <meta name="system-id" content="app">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-005,R-auth-011">
  <title>忘记密码 · app 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .auth-container { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .auth-card { width:100%; max-width:420px; padding:var(--space-8); }
    .back-link { display:inline-flex; align-items:center; gap:var(--space-1); font-size:var(--text-sm); color:var(--text-muted); text-decoration:none; margin-bottom:var(--space-4); }
    .back-link:hover { color:var(--color-brand-default); }
    .auth-header { margin-bottom:var(--space-6); }
    .auth-header h1 { font-size:var(--text-xl); margin-bottom:var(--space-2); }
    .auth-header p { font-size:var(--text-sm); color:var(--text-secondary); }
    .form-alert { display:none; padding:var(--space-3) var(--space-4); border-radius:var(--radius-md); margin-bottom:var(--space-4); font-size:var(--text-sm); border-left:4px solid; }
    .form-alert.is-error { display:block; background:var(--color-danger-50); border-left-color:var(--color-danger-500); color:var(--color-danger-500); }
    .code-input-group { display:flex; gap:var(--space-2); }
    .code-digit { width:48px; height:56px; text-align:center; font-size:var(--text-xl); font-weight:var(--weight-semibold); font-family:var(--font-mono); letter-spacing:2px; }
    .countdown-btn { min-width:160px; }
    .step-indicator { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-6); }
    .step { width:28px; height:28px; border-radius:var(--radius-pill); display:flex; align-items:center; justify-content:center; font-size:var(--text-xs); font-weight:var(--weight-semibold); }
    .step.active { background:var(--color-brand-default); color:var(--color-brand-on); }
    .step.done { background:var(--color-success-100); color:var(--color-success-700); }
    .step.pending { background:var(--glass-bg); color:var(--text-muted); border:1px solid var(--glass-border); }
    .step-line { flex:1; height:2px; background:var(--glass-border); }
    .step-line.done { background:var(--color-success-700); }
    .scenario-dropdown { position:fixed; z-index:var(--z-dropdown); background:var(--glass-bg-elevated); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); padding:var(--space-1) 0; min-width:220px; display:none; }
    .scenario-dropdown.is-open { display:block; }
    .scenario-item { padding:var(--space-2) var(--space-4); font-size:var(--text-sm); cursor:pointer; transition:background var(--motion-fast); color:var(--text-primary); }
    .scenario-item:hover { background:var(--glass-bg); }
    .scenario-item small { display:block; font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="proto-nav-bar"></div>

  <div class="auth-container">
    <div class="auth-card glass-card">
      <a href="P-app-auth-001.html" class="back-link">← 返回登录</a>

      <!-- 步骤 1：输入邮箱发送验证码 -->
      <div id="step-email">
        <div class="step-indicator">
          <div class="step active">1</div>
          <div class="step-line"></div>
          <div class="step pending">2</div>
          <div class="step-line"></div>
          <div class="step pending">3</div>
        </div>
        <div class="auth-header">
          <h1>忘记密码</h1>
          <p>请输入你的注册邮箱，我们将发送验证码</p>
        </div>
        <div class="form-alert" id="email-alert" role="alert"></div>
        <form id="email-form" novalidate>
          <div class="proto-field">
            <label for="email" class="proto-label proto-label-required">邮箱</label>
            <input type="email" id="email" class="proto-input" placeholder="请输入注册邮箱" autocomplete="email" required>
            <span class="proto-error-msg" id="email-error" style="display:none"></span>
          </div>
          <button type="submit" id="send-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
            <span class="proto-btn-label">发送验证码</span>
            <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
          </button>
        </form>
      </div>

      <!-- 步骤 2：输入验证码 -->
      <div id="step-code" style="display:none">
        <div class="step-indicator">
          <div class="step done">✓</div>
          <div class="step-line done"></div>
          <div class="step active">2</div>
          <div class="step-line"></div>
          <div class="step pending">3</div>
        </div>
        <div class="auth-header">
          <h1>输入验证码</h1>
          <p>验证码已发送至 <strong id="sent-email"></strong></p>
        </div>
        <div class="form-alert" id="code-alert" role="alert"></div>
        <div class="proto-field">
          <label class="proto-label proto-label-required">6 位验证码</label>
          <div class="code-input-group">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="0" inputmode="numeric" autocomplete="one-time-code">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="1" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="2" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="3" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="4" inputmode="numeric">
            <input type="text" class="proto-input code-digit" maxlength="1" data-idx="5" inputmode="numeric">
          </div>
          <span class="proto-error-msg" id="code-error" style="display:none"></span>
        </div>
        <button id="verify-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
          <span class="proto-btn-label">验证</span>
          <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
        </button>
        <div style="text-align:center;margin-top:var(--space-4)">
          <button id="resend-btn" class="proto-btn proto-btn-ghost proto-btn-sm countdown-btn" disabled>
            重新发送 (<span id="countdown">60</span>s)
          </button>
        </div>
      </div>

      <!-- 步骤 3 跳到 P-app-auth-004.html 重置密码页 -->
    </div>
  </div>

  <!-- 验证码场景选择 -->
  <div class="scenario-dropdown" id="code-scenario-dd">
    <div class="scenario-item" data-scenario="code-ok">
      ✅ 验证码正确
      <small>进入重置密码页面</small>
    </div>
    <div class="scenario-item" data-scenario="code-wrong">
      ❌ 验证码错误
      <small>显示错误提示</small>
    </div>
    <div class="scenario-item" data-scenario="code-expired">
      ⏰ 验证码过期
      <small>提示验证码已过期，需重新发送</small>
    </div>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html')
      .then(function(r){return r.text()})
      .then(function(html){
        document.getElementById('proto-nav-bar').innerHTML = html;
        var pid = document.querySelector('meta[name="page-id"]').content;
        var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
        if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-brand-50);color:var(--color-brand-default);text-decoration:none;font-weight:var(--weight-medium)';
        var themeBtn = document.querySelector('[data-action="toggle-theme"]');
        if(themeBtn) themeBtn.addEventListener('click', function(){ var m = document.documentElement.getAttribute('data-mode'); proto.switchTheme(m==='dark'?'light':'dark'); });
      });

    if(typeof proto !== 'undefined') proto.bootstrap();

    var emailInput = document.getElementById('email');
    var emailError = document.getElementById('email-error');
    var emailForm = document.getElementById('email-form');
    var sendBtn = document.getElementById('send-btn');
    var stepEmail = document.getElementById('step-email');
    var stepCode = document.getElementById('step-code');
    var sentEmail = document.getElementById('sent-email');
    var resendBtn = document.getElementById('resend-btn');
    var countdownEl = document.getElementById('countdown');
    var verifyBtn = document.getElementById('verify-btn');
    var codeAlert = document.getElementById('code-alert');
    var codeScenarioDD = document.getElementById('code-scenario-dd');
    var codeDigits = document.querySelectorAll('.code-digit');

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    emailInput.addEventListener('blur', function() {
      var v = emailInput.value.trim();
      if(!v) { emailError.textContent = '请输入邮箱'; emailError.style.display = 'block'; }
      else if(!validateEmail(v)) { emailError.textContent = '请输入有效的邮箱地址'; emailError.style.display = 'block'; }
      else { emailError.style.display = 'none'; }
    });
    emailInput.addEventListener('input', function() { emailError.style.display = 'none'; });

    function startCountdown() {
      var sec = 60;
      countdownEl.textContent = sec;
      resendBtn.disabled = true;
      resendBtn.innerHTML = '重新发送 (<span id="countdown">' + sec + '</span>s)';
      countdownEl = document.getElementById('countdown');
      var timer = setInterval(function() {
        sec--;
        countdownEl.textContent = sec;
        if(sec <= 0) { clearInterval(timer); resendBtn.disabled = false; resendBtn.textContent = '重新发送'; }
      }, 1000);
    }

    emailForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var email = emailInput.value.trim();
      if(!email) { emailError.textContent = '请输入邮箱'; emailError.style.display = 'block'; return; }
      if(!validateEmail(email)) { emailError.textContent = '请输入有效的邮箱地址'; emailError.style.display = 'block'; return; }

      sendBtn.setAttribute('aria-busy','true');
      sendBtn.querySelector('.proto-btn-label').style.visibility = 'hidden';
      sendBtn.querySelector('.proto-spinner').style.display = 'inline-block';

      setTimeout(function() {
        sendBtn.removeAttribute('aria-busy');
        sendBtn.querySelector('.proto-btn-label').style.visibility = 'visible';
        sendBtn.querySelector('.proto-spinner').style.display = 'none';

        sentEmail.textContent = email;
        sessionStorage.setItem('app-reset-email', email);
        stepEmail.style.display = 'none';
        stepCode.style.display = 'block';
        startCountdown();
        codeDigits[0].focus();
      }, 800);
    });

    /* 验证码输入自动跳格 */
    codeDigits.forEach(function(input, idx) {
      input.addEventListener('input', function() {
        input.value = input.value.replace(/[^0-9]/g, '');
        if(input.value && idx < 5) codeDigits[idx + 1].focus();
      });
      input.addEventListener('keydown', function(e) {
        if(e.key === 'Backspace' && !input.value && idx > 0) codeDigits[idx - 1].focus();
      });
    });

    /* 验证按钮 → 场景选择 */
    verifyBtn.addEventListener('click', function() {
      var code = '';
      codeDigits.forEach(function(d){ code += d.value; });
      if(code.length < 6) {
        document.getElementById('code-error').textContent = '请输入完整的 6 位验证码';
        document.getElementById('code-error').style.display = 'block';
        return;
      }
      document.getElementById('code-error').style.display = 'none';

      var rect = verifyBtn.getBoundingClientRect();
      codeScenarioDD.style.top = (rect.bottom + 8) + 'px';
      codeScenarioDD.style.left = rect.left + 'px';
      codeScenarioDD.style.width = rect.width + 'px';
      codeScenarioDD.classList.add('is-open');
    });

    document.querySelectorAll('#code-scenario-dd .scenario-item').forEach(function(item) {
      item.addEventListener('click', function() {
        codeScenarioDD.classList.remove('is-open');
        var scenario = item.getAttribute('data-scenario');

        verifyBtn.setAttribute('aria-busy','true');
        verifyBtn.querySelector('.proto-btn-label').style.visibility = 'hidden';
        verifyBtn.querySelector('.proto-spinner').style.display = 'inline-block';

        setTimeout(function() {
          verifyBtn.removeAttribute('aria-busy');
          verifyBtn.querySelector('.proto-btn-label').style.visibility = 'visible';
          verifyBtn.querySelector('.proto-spinner').style.display = 'none';

          if(scenario === 'code-ok') {
            proto.toast({ type:'success', message:'验证码校验通过' });
            setTimeout(function(){ window.location.href = 'P-app-auth-004.html'; }, 600);
          } else if(scenario === 'code-wrong') {
            codeAlert.textContent = '验证码错误，请重新输入';
            codeAlert.className = 'form-alert is-error';
            codeDigits.forEach(function(d){ d.value = ''; });
            codeDigits[0].focus();
          } else if(scenario === 'code-expired') {
            codeAlert.textContent = '验证码已过期，请重新发送';
            codeAlert.className = 'form-alert is-error';
            codeDigits.forEach(function(d){ d.value = ''; });
          }
        }, 600);
      });
    });

    document.addEventListener('click', function(e) {
      if(!codeScenarioDD.contains(e.target) && e.target !== verifyBtn) {
        codeScenarioDD.classList.remove('is-open');
      }
    });

    resendBtn.addEventListener('click', function() {
      if(resendBtn.disabled) return;
      proto.toast({ type:'success', message:'验证码已重新发送' });
      startCountdown();
      codeAlert.className = 'form-alert';
    });
  </script>
</body>
</html>
