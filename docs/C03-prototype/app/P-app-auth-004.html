<!DOCTYPE html>
<html lang="zh-CN" data-mode="light" data-accent="indigo" data-density="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-app-auth-004">
  <meta name="system-id" content="app">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-006,R-auth-009,R-auth-010">
  <title>重置密码 · app 原型</title>
  <link rel="stylesheet" href="../../B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; }
    .auth-container { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .auth-card { width:100%; max-width:420px; padding:var(--space-8); }
    .auth-header { margin-bottom:var(--space-6); }
    .auth-header h1 { font-size:var(--text-xl); margin-bottom:var(--space-2); }
    .auth-header p { font-size:var(--text-sm); color:var(--text-secondary); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .strength-bar { height:4px; border-radius:var(--radius-pill); background:var(--color-neutral-200); margin-top:var(--space-1); overflow:hidden; }
    .strength-fill { height:100%; border-radius:var(--radius-pill); transition:width var(--motion-base), background var(--motion-base); width:0; }
    .strength-text { font-size:var(--text-xs); margin-top:2px; color:var(--text-muted); }
    .success-view { display:none; text-align:center; }
    .success-icon { width:64px; height:64px; border-radius:var(--radius-pill); background:var(--color-success-50); display:inline-flex; align-items:center; justify-content:center; font-size:var(--text-2xl); margin-bottom:var(--space-4); }
    .step-indicator { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-6); }
    .step { width:28px; height:28px; border-radius:var(--radius-pill); display:flex; align-items:center; justify-content:center; font-size:var(--text-xs); font-weight:var(--weight-semibold); }
    .step.done { background:var(--color-success-100); color:var(--color-success-700); }
    .step.active { background:var(--color-brand-default); color:var(--color-brand-on); }
    .step-line { flex:1; height:2px; }
    .step-line.done { background:var(--color-success-700); }
    .info-note { font-size:var(--text-xs); color:var(--text-muted); margin-top:var(--space-4); padding:var(--space-3); border-radius:var(--radius-sm); background:var(--glass-bg); border:1px solid var(--glass-border); }
    .scenario-dropdown { position:fixed; z-index:var(--z-dropdown); background:var(--glass-bg-elevated); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); padding:var(--space-1) 0; min-width:220px; display:none; }
    .scenario-dropdown.is-open { display:block; }
    .scenario-item { padding:var(--space-2) var(--space-4); font-size:var(--text-sm); cursor:pointer; transition:background var(--motion-fast); color:var(--text-primary); }
    .scenario-item:hover { background:var(--glass-bg); }
    .scenario-item small { display:block; font-size:var(--text-xs); color:var(--text-muted); margin-top:2px; }
  </style>
</head>
<body>
  <div class="mesh-gradient-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="proto-nav-bar"></div>

  <div class="auth-container">
    <div class="auth-card glass-card">
      <div id="form-view">
        <div class="step-indicator">
          <div class="step done">✓</div>
          <div class="step-line done"></div>
          <div class="step done">✓</div>
          <div class="step-line done"></div>
          <div class="step active">3</div>
        </div>
        <div class="auth-header">
          <h1>设置新密码</h1>
          <p>请输入新的登录密码</p>
        </div>

        <form id="reset-form" novalidate>
          <div class="proto-field">
            <label for="new-pwd" class="proto-label proto-label-required">新密码</label>
            <div class="password-wrapper">
              <input type="password" id="new-pwd" class="proto-input" placeholder="至少 8 位，包含字母和数字" required style="padding-right:var(--space-10)">
              <button type="button" class="password-toggle" id="toggle-new" aria-label="切换可见">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <span class="strength-text" id="strength-text"></span>
            <span class="proto-error-msg" id="new-pwd-error" style="display:none"></span>
          </div>

          <div class="proto-field">
            <label for="confirm-pwd" class="proto-label proto-label-required">确认密码</label>
            <input type="password" id="confirm-pwd" class="proto-input" placeholder="再次输入新密码" required>
            <span class="proto-error-msg" id="confirm-pwd-error" style="display:none"></span>
          </div>

          <div class="info-note">
            密码更新成功后，当前账号已登录的其他设备将自动下线。每个账号最多同时登录 2 台设备。
          </div>

          <button type="submit" id="reset-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
            <span class="proto-btn-label">确认重置</span>
            <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
          </button>
        </form>
      </div>

      <div class="success-view" id="success-view">
        <div class="success-icon">✓</div>
        <h2 style="font-size:var(--text-lg);margin-bottom:var(--space-2)">密码重置成功</h2>
        <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-2)">其他已登录设备已自动下线</p>
        <p style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--space-4)"><span id="redirect-countdown">3</span> 秒后自动跳转至登录页</p>
        <a href="P-app-auth-001.html" class="proto-btn proto-btn-primary proto-btn-md" style="text-decoration:none">立即登录</a>
      </div>
    </div>
  </div>

  <!-- 场景选择 -->
  <div class="scenario-dropdown" id="reset-scenario-dd">
    <div class="scenario-item" data-scenario="success">
      ✅ 重置成功
      <small>密码已更新，其他设备下线</small>
    </div>
    <div class="scenario-item" data-scenario="fail">
      ❌ 重置失败
      <small>服务器错误，请稍后重试</small>
    </div>
  </div>

  <script src="../../B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html')
      .then(function(r){return r.text()})
      .then(function(html){
        document.getElementById('proto-nav-bar').innerHTML = html;
        var pid = document.querySelector('meta[name="page-id"]').content;
        var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
        if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-brand-50);color:var(--color-brand-default);text-decoration:none;font-weight:var(--weight-medium)';
        var themeBtn = document.querySelector('[data-action="toggle-theme"]');
        if(themeBtn) themeBtn.addEventListener('click', function(){ var m = document.documentElement.getAttribute('data-mode'); proto.switchTheme(m==='dark'?'light':'dark'); });
      });

    if(typeof proto !== 'undefined') proto.bootstrap();

    var newPwd = document.getElementById('new-pwd');
    var confirmPwd = document.getElementById('confirm-pwd');
    var newPwdError = document.getElementById('new-pwd-error');
    var confirmPwdError = document.getElementById('confirm-pwd-error');
    var strengthFill = document.getElementById('strength-fill');
    var strengthText = document.getElementById('strength-text');
    var resetBtn = document.getElementById('reset-btn');
    var resetForm = document.getElementById('reset-form');
    var toggleNew = document.getElementById('toggle-new');
    var resetScenarioDD = document.getElementById('reset-scenario-dd');

    toggleNew.addEventListener('click', function() {
      var isPwd = newPwd.type === 'password';
      newPwd.type = isPwd ? 'text' : 'password';
      toggleNew.textContent = isPwd ? '🔒' : '👁';
    });

    function checkStrength(v) {
      var score = 0;
      if(v.length >= 8) score++;
      if(/[a-zA-Z]/.test(v)) score++;
      if(/[0-9]/.test(v)) score++;
      if(/[^a-zA-Z0-9]/.test(v)) score++;
      if(v.length >= 12) score++;
      var map = [
        {w:'0%',bg:'var(--color-neutral-200)',t:''},
        {w:'25%',bg:'var(--color-danger-500)',t:'弱'},
        {w:'50%',bg:'var(--color-warning-500)',t:'一般'},
        {w:'75%',bg:'var(--color-info-500)',t:'较强'},
        {w:'100%',bg:'var(--color-success-700)',t:'强'},
        {w:'100%',bg:'var(--color-success-700)',t:'非常强'}
      ];
      var s = map[score];
      strengthFill.style.width = s.w; strengthFill.style.background = s.bg;
      strengthText.textContent = s.t; strengthText.style.color = s.bg;
    }

    newPwd.addEventListener('input', function() {
      checkStrength(newPwd.value);
      newPwdError.style.display = 'none'; newPwd.removeAttribute('aria-invalid');
      if(confirmPwd.value) validateConfirm();
    });

    newPwd.addEventListener('blur', function() {
      var v = newPwd.value;
      if(!v) { newPwdError.textContent = '请输入新密码'; newPwdError.style.display = 'block'; newPwd.setAttribute('aria-invalid','true'); }
      else if(v.length < 8 || !/[a-zA-Z]/.test(v) || !/[0-9]/.test(v)) { newPwdError.textContent = '密码至少 8 位，包含字母和数字'; newPwdError.style.display = 'block'; newPwd.setAttribute('aria-invalid','true'); }
    });

    function validateConfirm() {
      if(confirmPwd.value !== newPwd.value) { confirmPwdError.textContent = '两次输入的密码不一致'; confirmPwdError.style.display = 'block'; confirmPwd.setAttribute('aria-invalid','true'); return false; }
      confirmPwdError.style.display = 'none'; confirmPwd.removeAttribute('aria-invalid'); return true;
    }

    confirmPwd.addEventListener('blur', validateConfirm);
    confirmPwd.addEventListener('input', function() { confirmPwdError.style.display = 'none'; confirmPwd.removeAttribute('aria-invalid'); });

    resetForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var v = newPwd.value;
      var valid = true;
      if(!v || v.length < 8 || !/[a-zA-Z]/.test(v) || !/[0-9]/.test(v)) { newPwdError.textContent = '密码至少 8 位，包含字母和数字'; newPwdError.style.display = 'block'; valid = false; }
      if(!validateConfirm()) valid = false;
      if(!valid) return;

      var rect = resetBtn.getBoundingClientRect();
      resetScenarioDD.style.top = (rect.bottom + 8) + 'px';
      resetScenarioDD.style.left = rect.left + 'px';
      resetScenarioDD.style.width = rect.width + 'px';
      resetScenarioDD.classList.add('is-open');
    });

    document.querySelectorAll('#reset-scenario-dd .scenario-item').forEach(function(item) {
      item.addEventListener('click', function() {
        resetScenarioDD.classList.remove('is-open');
        var scenario = item.getAttribute('data-scenario');

        resetBtn.setAttribute('aria-busy','true');
        resetBtn.querySelector('.proto-btn-label').style.visibility = 'hidden';
        resetBtn.querySelector('.proto-spinner').style.display = 'inline-block';
        newPwd.disabled = true; confirmPwd.disabled = true;

        setTimeout(function() {
          resetBtn.removeAttribute('aria-busy');
          resetBtn.querySelector('.proto-btn-label').style.visibility = 'visible';
          resetBtn.querySelector('.proto-spinner').style.display = 'none';

          if(scenario === 'success') {
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
            var sec = 3;
            var cdEl = document.getElementById('redirect-countdown');
            var timer = setInterval(function() {
              sec--;
              cdEl.textContent = sec;
              if(sec <= 0) { clearInterval(timer); window.location.href = 'P-app-auth-001.html'; }
            }, 1000);
          } else {
            newPwd.disabled = false; confirmPwd.disabled = false;
            proto.toast({ type:'error', message:'服务器错误，请稍后重试' });
          }
        }, 800);
      });
    });

    document.addEventListener('click', function(e) {
      if(!resetScenarioDD.contains(e.target) && e.target !== resetBtn) {
        resetScenarioDD.classList.remove('is-open');
      }
    });
  </script>
</body>
</html>
