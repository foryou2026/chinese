  <script defer src="../../../B02-experience-design/prototype-style/app.js"></script>
  <script>
    const NAV_DEPTH=parseInt(document.querySelector('meta[name="nav-depth"]')?.content||'2');
    const PATH_PREFIX='../'.repeat(NAV_DEPTH);
    fetch(PATH_PREFIX+'_shared/proto-nav.html').then(r=>r.text()).then(html=>{
      document.getElementById('proto-nav-bar').innerHTML=html;
      document.querySelectorAll('#proto-nav-bar [data-href]').forEach(a=>{a.href=PATH_PREFIX+a.dataset.href;});
      const pid=document.querySelector('meta[name="page-id"]')?.content;
      const cur=pid&&document.querySelector('#proto-nav-bar [data-page="'+pid+'"]');
      if(cur)cur.classList.add('nav-active');
    }).catch(()=>{});
    const ProtoSurface={
      current:sessionStorage.getItem('proto-surface')||document.documentElement.getAttribute('data-surface')||'app',
      init(){document.documentElement.setAttribute('data-surface',this.current);const el=document.getElementById('surface-label');if(el)el.textContent=this.current==='web'?'Web':'App';},
      toggle(){this.current=this.current==='web'?'app':'web';sessionStorage.setItem('proto-surface',this.current);this.init();}
    };ProtoSurface.init();
    const ProtoModal={
      open(id){const el=document.getElementById(id);if(el){el.classList.add('is-open');document.body.classList.add('has-modal');}},
      close(id){const el=document.getElementById(id);if(el){el.classList.remove('is-open');document.body.classList.remove('has-modal');}}
    };
    document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))e.target.classList.remove('is-open');});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.is-open').forEach(m=>m.classList.remove('is-open'));});
    const ProtoToast={
      show(msg,type='success',dur=2500){
        let stack=document.querySelector('.proto-toast-stack');
        if(!stack){stack=Object.assign(document.createElement('div'),{className:'proto-toast-stack'});
        Object.assign(stack.style,{position:'fixed',top:'60px',right:'16px',zIndex:'9999',display:'flex',flexDirection:'column',gap:'8px',pointerEvents:'none',width:'300px'});
        document.body.appendChild(stack);}
        const t=Object.assign(document.createElement('div'),{textContent:msg});
        Object.assign(t.style,{padding:'10px 16px',borderRadius:'8px',fontSize:'14px',color:'#fff',fontWeight:'500',boxShadow:'0 4px 16px rgba(0,0,0,.2)',pointerEvents:'auto',background:type==='success'?'var(--color-success,#18a058)':'var(--color-danger,#d03050)'});
        stack.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},dur);
      }
    };
    if(typeof proto!=='undefined')proto.bootstrap();
  </script>
