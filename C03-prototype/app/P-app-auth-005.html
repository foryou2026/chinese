<!DOCTYPE html>
<html lang="zh-CN" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-app-auth-005">
  <meta name="system-id" content="app">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-007,R-auth-010,R-auth-014">
  <title>修改密码 · app 原型</title>
  <link rel="stylesheet" href="../../docs/B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; background:var(--color-bg-secondary); }
    .page-header { display:flex; align-items:center; gap:var(--space-3); height:56px; padding:0 var(--space-4); background:var(--color-bg-primary); border-bottom:1px solid var(--color-border); position:sticky; top:0; z-index:var(--z-sticky); }
    .page-header button { background:none; border:none; font-size:var(--text-base); color:var(--color-text-secondary); cursor:pointer; padding:var(--space-1); }
    .page-header h1 { font-size:var(--text-lg); font-weight:var(--font-semibold); flex:1; }
    .form-container { padding:var(--space-5) var(--space-4); max-width:480px; margin:0 auto; width:100%; }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--color-text-tertiary); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .strength-bar { height:4px; border-radius:var(--radius-full); background:var(--color-neutral-200); margin-top:var(--space-1); overflow:hidden; }
    .strength-fill { height:100%; border-radius:var(--radius-full); transition:width var(--motion-normal) var(--ease-default), background var(--motion-normal) var(--ease-default); width:0; }
    .strength-text { font-size:var(--text-xs); margin-top:var(--space-0-5); color:var(--color-text-tertiary); }
    .form-alert { display:none; padding:var(--space-3) var(--space-4); border-radius:var(--radius-md); margin-bottom:var(--space-4); font-size:var(--text-sm); border-left:4px solid; }
    .form-alert.is-error { display:block; background:var(--color-error-light); border-left-color:var(--color-error); color:var(--color-error); }
    .info-card { background:var(--color-info-light); border-radius:var(--radius-md); padding:var(--space-3) var(--space-4); margin-bottom:var(--space-5); font-size:var(--text-sm); color:var(--color-info); border-left:4px solid var(--color-info); }
  </style>
</head>
<body>
  <div id="proto-nav-bar"></div>

  <!-- 页面头部 -->
  <header class="page-header">
    <button onclick="window.location.href='P-app-auth-006.html'" aria-label="返回">←</button>
    <h1 id="page-title">修改密码</h1>
  </header>

  <div class="form-container">
    <div class="info-card" id="google-info" style="display:none">
      你的账号通过 Google 登录，尚未设置密码。设置密码后可使用邮箱+密码方式登录。
    </div>

    <div class="form-alert" id="change-alert" role="alert"></div>

    <form id="change-form" novalidate>
      <!-- 旧密码：仅邮箱用户 -->
      <div class="proto-field" id="old-pwd-field">
        <label for="old-pwd" class="proto-label proto-label-required">旧密码</label>
        <div class="password-wrapper">
          <input type="password" id="old-pwd" class="proto-input" placeholder="请输入当前密码" style="padding-right:var(--space-10)">
          <button type="button" class="password-toggle" onclick="var i=document.getElementById('old-pwd');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🔒'" aria-label="切换可见">👁</button>
        </div>
        <span class="proto-error-msg" id="old-pwd-error" style="display:none"></span>
      </div>

      <div class="proto-field">
        <label for="new-pwd" class="proto-label proto-label-required">新密码</label>
        <div class="password-wrapper">
          <input type="password" id="new-pwd" class="proto-input" placeholder="至少 8 位，包含字母和数字" style="padding-right:var(--space-10)">
          <button type="button" class="password-toggle" onclick="var i=document.getElementById('new-pwd');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🔒'" aria-label="切换可见">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <span class="strength-text" id="strength-text"></span>
        <span class="proto-error-msg" id="new-pwd-error" style="display:none"></span>
      </div>

      <div class="proto-field">
        <label for="confirm-pwd" class="proto-label proto-label-required">确认新密码</label>
        <input type="password" id="confirm-pwd" class="proto-input" placeholder="再次输入新密码">
        <span class="proto-error-msg" id="confirm-pwd-error" style="display:none"></span>
      </div>

      <button type="submit" id="submit-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
        <span class="proto-btn-label">确认修改</span>
        <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
      </button>
    </form>
  </div>

  <script src="../../docs/B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html').then(function(r){return r.text()}).then(function(html){
      document.getElementById('proto-nav-bar').innerHTML = html;
      var pid = document.querySelector('meta[name="page-id"]').content;
      var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
      if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-primary-50);color:var(--color-primary-600);text-decoration:none;font-weight:var(--font-medium);white-space:nowrap';
      var themeBtn = document.querySelector('[data-action="toggle-theme"]');
      if(themeBtn) themeBtn.addEventListener('click', function(){ var m = document.documentElement.getAttribute('data-mode'); proto.switchTheme(m==='dark'?'light':'dark'); });
    });
    if(typeof proto !== 'undefined') proto.bootstrap();

    var isGoogle = sessionStorage.getItem('app-auth-type') === 'google';
    var pageTitle = document.getElementById('page-title');
    var oldPwdField = document.getElementById('old-pwd-field');
    var googleInfo = document.getElementById('google-info');

    if(isGoogle) {
      pageTitle.textContent = '设置密码';
      oldPwdField.style.display = 'none';
      googleInfo.style.display = 'block';
      document.getElementById('submit-btn').querySelector('.proto-btn-label').textContent = '设置密码';
    }

    var oldPwd = document.getElementById('old-pwd');
    var newPwd = document.getElementById('new-pwd');
    var confirmPwd = document.getElementById('confirm-pwd');
    var oldPwdError = document.getElementById('old-pwd-error');
    var newPwdError = document.getElementById('new-pwd-error');
    var confirmPwdError = document.getElementById('confirm-pwd-error');
    var strengthFill = document.getElementById('strength-fill');
    var strengthText = document.getElementById('strength-text');
    var changeForm = document.getElementById('change-form');
    var submitBtn = document.getElementById('submit-btn');
    var changeAlert = document.getElementById('change-alert');

    function checkStrength(v){
      var score=0; if(v.length>=8)score++; if(/[a-zA-Z]/.test(v))score++; if(/[0-9]/.test(v))score++; if(/[^a-zA-Z0-9]/.test(v))score++; if(v.length>=12)score++;
      var map=[{w:'0%',bg:'var(--color-neutral-200)',t:''},{w:'25%',bg:'var(--color-error)',t:'弱'},{w:'50%',bg:'var(--color-warning)',t:'一般'},{w:'75%',bg:'var(--color-info)',t:'较强'},{w:'100%',bg:'var(--color-success)',t:'强'},{w:'100%',bg:'var(--color-success)',t:'非常强'}];
      var s=map[score]; strengthFill.style.width=s.w; strengthFill.style.background=s.bg; strengthText.textContent=s.t; strengthText.style.color=s.bg;
    }

    newPwd.addEventListener('input', function(){ checkStrength(newPwd.value); newPwdError.style.display='none'; newPwd.removeAttribute('aria-invalid'); changeAlert.className='form-alert'; });
    newPwd.addEventListener('blur', function(){
      var v=newPwd.value;
      if(!v){newPwdError.textContent='请输入新密码';newPwdError.style.display='block';newPwd.setAttribute('aria-invalid','true');}
      else if(v.length<8||!/[a-zA-Z]/.test(v)||!/[0-9]/.test(v)){newPwdError.textContent='密码至少 8 位，包含字母和数字';newPwdError.style.display='block';newPwd.setAttribute('aria-invalid','true');}
    });

    confirmPwd.addEventListener('blur', function(){
      if(confirmPwd.value!==newPwd.value){confirmPwdError.textContent='两次输入的密码不一致';confirmPwdError.style.display='block';confirmPwd.setAttribute('aria-invalid','true');}
      else{confirmPwdError.style.display='none';confirmPwd.removeAttribute('aria-invalid');}
    });
    confirmPwd.addEventListener('input', function(){confirmPwdError.style.display='none';confirmPwd.removeAttribute('aria-invalid');});

    changeForm.addEventListener('submit', function(e){
      e.preventDefault();
      changeAlert.className = 'form-alert';
      var valid = true;

      if(!isGoogle) {
        if(!oldPwd.value){ oldPwdError.textContent='请输入旧密码'; oldPwdError.style.display='block'; oldPwd.setAttribute('aria-invalid','true'); valid=false; }
        else { oldPwdError.style.display='none'; oldPwd.removeAttribute('aria-invalid'); }
      }

      var v = newPwd.value;
      if(!v||v.length<8||!/[a-zA-Z]/.test(v)||!/[0-9]/.test(v)){newPwdError.textContent='密码至少 8 位，包含字母和数字';newPwdError.style.display='block';newPwd.setAttribute('aria-invalid','true');valid=false;}

      if(confirmPwd.value!==newPwd.value){confirmPwdError.textContent='两次输入的密码不一致';confirmPwdError.style.display='block';confirmPwd.setAttribute('aria-invalid','true');valid=false;}

      if(!valid) return;

      submitBtn.setAttribute('aria-busy','true');
      submitBtn.querySelector('.proto-btn-label').style.visibility='hidden';
      submitBtn.querySelector('.proto-spinner').style.display='inline-block';

      setTimeout(function(){
        submitBtn.removeAttribute('aria-busy');
        submitBtn.querySelector('.proto-btn-label').style.visibility='visible';
        submitBtn.querySelector('.proto-spinner').style.display='none';

        if(!isGoogle && oldPwd.value !== 'user1234'){
          changeAlert.textContent = '旧密码错误';
          changeAlert.className = 'form-alert is-error';
          return;
        }

        if(!isGoogle && newPwd.value === oldPwd.value){
          changeAlert.textContent = '新密码不能与旧密码相同';
          changeAlert.className = 'form-alert is-error';
          return;
        }

        proto.toast({type:'success', message: isGoogle ? '密码已设置成功' : '密码修改成功'});
        if(isGoogle) sessionStorage.setItem('app-auth-type','email');
        setTimeout(function(){ window.location.href = 'P-app-auth-006.html'; }, 600);
      }, 800);
    });
  </script>
</body>
</html>
