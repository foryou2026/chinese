<!DOCTYPE html>
<html lang="zh-CN" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="page-id" content="P-app-auth-004">
  <meta name="system-id" content="app">
  <meta name="module-id" content="auth">
  <meta name="feature-id" content="account-entry">
  <meta name="related-r-ids" content="R-auth-006,R-auth-010">
  <title>重置密码 · app 原型</title>
  <link rel="stylesheet" href="../../docs/B02-experience-design/app/prototype-style/app.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100dvh; background:var(--color-bg-secondary); }
    .auth-container { flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .auth-card { width:100%; max-width:400px; background:var(--color-bg-primary); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:var(--space-6) var(--space-5); }
    .auth-header { margin-bottom:var(--space-5); }
    .auth-header h1 { font-size:var(--text-xl); margin-bottom:var(--space-2); }
    .auth-header p { font-size:var(--text-sm); color:var(--color-text-secondary); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:var(--space-3); top:50%; transform:translateY(-50%); background:none; border:none; color:var(--color-text-tertiary); cursor:pointer; padding:var(--space-1); font-size:var(--text-sm); }
    .strength-bar { height:4px; border-radius:var(--radius-full); background:var(--color-neutral-200); margin-top:var(--space-1); overflow:hidden; }
    .strength-fill { height:100%; border-radius:var(--radius-full); transition:width var(--motion-normal) var(--ease-default), background var(--motion-normal) var(--ease-default); width:0; }
    .strength-text { font-size:var(--text-xs); margin-top:var(--space-0-5); color:var(--color-text-tertiary); }
    .expired-view, .success-view { display:none; text-align:center; }
    .icon-circle { width:64px; height:64px; border-radius:var(--radius-full); display:inline-flex; align-items:center; justify-content:center; font-size:var(--text-2xl); margin-bottom:var(--space-4); }
    .icon-warning { background:var(--color-warning-light); }
    .icon-success { background:var(--color-success-light); }
    .btn-group { display:flex; gap:var(--space-3); justify-content:center; }
  </style>
</head>
<body>
  <div id="proto-nav-bar"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div id="form-view">
        <div class="auth-header">
          <h1>设置新密码</h1>
          <p>请输入新的登录密码</p>
        </div>
        <form id="reset-form" novalidate>
          <div class="proto-field">
            <label for="new-pwd" class="proto-label proto-label-required">新密码</label>
            <div class="password-wrapper">
              <input type="password" id="new-pwd" class="proto-input" placeholder="至少 8 位，包含字母和数字" required style="padding-right:var(--space-10)">
              <button type="button" class="password-toggle" id="toggle-new" aria-label="切换可见">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <span class="strength-text" id="strength-text"></span>
            <span class="proto-error-msg" id="new-pwd-error" style="display:none"></span>
          </div>
          <div class="proto-field">
            <label for="confirm-pwd" class="proto-label proto-label-required">确认密码</label>
            <input type="password" id="confirm-pwd" class="proto-input" placeholder="再次输入新密码" required>
            <span class="proto-error-msg" id="confirm-pwd-error" style="display:none"></span>
          </div>
          <button type="submit" id="reset-btn" class="proto-btn proto-btn-primary proto-btn-lg" style="width:100%;margin-top:var(--space-5)">
            <span class="proto-btn-label">确认重置</span>
            <span class="proto-spinner proto-spinner-sm proto-spinner-inverse" style="display:none"></span>
          </button>
        </form>
      </div>
      <div class="expired-view" id="expired-view">
        <div class="icon-circle icon-warning">⚠</div>
        <h2 style="font-size:var(--text-lg);margin-bottom:var(--space-2)">链接已失效</h2>
        <p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:var(--space-6)">重置链接已过期或无效</p>
        <div class="btn-group">
          <a href="P-app-auth-001.html" class="proto-btn proto-btn-secondary proto-btn-md" style="text-decoration:none">返回登录</a>
          <a href="P-app-auth-003.html" class="proto-btn proto-btn-primary proto-btn-md" style="text-decoration:none">重新获取</a>
        </div>
      </div>
      <div class="success-view" id="success-view">
        <div class="icon-circle icon-success">✓</div>
        <h2 style="font-size:var(--text-lg);margin-bottom:var(--space-2)">密码重置成功</h2>
        <p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:var(--space-4)"><span id="redirect-cd">3</span> 秒后跳转至登录页</p>
        <a href="P-app-auth-001.html" class="proto-btn proto-btn-primary proto-btn-md" style="text-decoration:none">立即登录</a>
      </div>
    </div>
  </div>
  <script src="../../docs/B02-experience-design/app/prototype-style/app.js"></script>
  <script>
    fetch('_shared/proto-nav.html').then(function(r){return r.text()}).then(function(html){
      document.getElementById('proto-nav-bar').innerHTML = html;
      var pid = document.querySelector('meta[name="page-id"]').content;
      var cur = document.querySelector('#proto-nav-bar [data-page="' + pid + '"]');
      if(cur) cur.style.cssText = 'font-size:var(--text-sm);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-primary-50);color:var(--color-primary-600);text-decoration:none;font-weight:var(--font-medium);white-space:nowrap';
      var themeBtn = document.querySelector('[data-action="toggle-theme"]');
      if(themeBtn) themeBtn.addEventListener('click', function(){ var m = document.documentElement.getAttribute('data-mode'); proto.switchTheme(m==='dark'?'light':'dark'); });
    });
    if(typeof proto !== 'undefined') proto.bootstrap();

    var params = new URLSearchParams(window.location.search);
    if(params.get('expired') === 'true') { document.getElementById('form-view').style.display='none'; document.getElementById('expired-view').style.display='block'; }

    var newPwd = document.getElementById('new-pwd');
    var confirmPwd = document.getElementById('confirm-pwd');
    var newPwdError = document.getElementById('new-pwd-error');
    var confirmPwdError = document.getElementById('confirm-pwd-error');
    var strengthFill = document.getElementById('strength-fill');
    var strengthText = document.getElementById('strength-text');
    var resetForm = document.getElementById('reset-form');
    var resetBtn = document.getElementById('reset-btn');
    var toggleNew = document.getElementById('toggle-new');

    toggleNew.addEventListener('click', function(){ var p = newPwd.type==='password'; newPwd.type=p?'text':'password'; toggleNew.textContent=p?'🔒':'👁'; });

    function checkStrength(v){
      var score=0; if(v.length>=8)score++; if(/[a-zA-Z]/.test(v))score++; if(/[0-9]/.test(v))score++; if(/[^a-zA-Z0-9]/.test(v))score++; if(v.length>=12)score++;
      var map=[{w:'0%',bg:'var(--color-neutral-200)',t:''},{w:'25%',bg:'var(--color-error)',t:'弱'},{w:'50%',bg:'var(--color-warning)',t:'一般'},{w:'75%',bg:'var(--color-info)',t:'较强'},{w:'100%',bg:'var(--color-success)',t:'强'},{w:'100%',bg:'var(--color-success)',t:'非常强'}];
      var s=map[score]; strengthFill.style.width=s.w; strengthFill.style.background=s.bg; strengthText.textContent=s.t; strengthText.style.color=s.bg;
    }

    newPwd.addEventListener('input', function(){ checkStrength(newPwd.value); newPwdError.style.display='none'; newPwd.removeAttribute('aria-invalid'); if(confirmPwd.value) validateConfirm(); });
    newPwd.addEventListener('blur', function(){
      var v=newPwd.value;
      if(!v){newPwdError.textContent='请输入新密码';newPwdError.style.display='block';newPwd.setAttribute('aria-invalid','true');}
      else if(v.length<8||!/[a-zA-Z]/.test(v)||!/[0-9]/.test(v)){newPwdError.textContent='密码至少 8 位，包含字母和数字';newPwdError.style.display='block';newPwd.setAttribute('aria-invalid','true');}
      else{newPwdError.style.display='none';newPwd.removeAttribute('aria-invalid');}
    });

    function validateConfirm(){
      if(confirmPwd.value!==newPwd.value){confirmPwdError.textContent='两次输入的密码不一致';confirmPwdError.style.display='block';confirmPwd.setAttribute('aria-invalid','true');return false;}
      confirmPwdError.style.display='none';confirmPwd.removeAttribute('aria-invalid');return true;
    }
    confirmPwd.addEventListener('blur', validateConfirm);
    confirmPwd.addEventListener('input', function(){confirmPwdError.style.display='none';confirmPwd.removeAttribute('aria-invalid');});

    resetForm.addEventListener('submit', function(e){
      e.preventDefault();
      var v = newPwd.value;
      var valid = true;
      if(!v||v.length<8||!/[a-zA-Z]/.test(v)||!/[0-9]/.test(v)){newPwdError.textContent='密码至少 8 位，包含字母和数字';newPwdError.style.display='block';newPwd.setAttribute('aria-invalid','true');valid=false;}
      if(!validateConfirm()) valid=false;
      if(!valid) return;

      resetBtn.setAttribute('aria-busy','true');
      resetBtn.querySelector('.proto-btn-label').style.visibility='hidden';
      resetBtn.querySelector('.proto-spinner').style.display='inline-block';

      setTimeout(function(){
        document.getElementById('form-view').style.display='none';
        document.getElementById('success-view').style.display='block';
        var sec=3; var cdEl=document.getElementById('redirect-cd');
        var timer=setInterval(function(){sec--;cdEl.textContent=sec;if(sec<=0){clearInterval(timer);window.location.href='P-app-auth-001.html';}},1000);
      },800);
    });
  </script>
</body>
</html>
