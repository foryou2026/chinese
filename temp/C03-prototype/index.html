<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>知语 · C03 可交互原型总览</title>
  <link rel="stylesheet" href="../B02-experience-design/prototype-style/tokens.css">
  <link rel="stylesheet" href="../B02-experience-design/prototype-style/themes.css">
  <link rel="stylesheet" href="../B02-experience-design/prototype-style/app.css">
  <style>
    .page{max-width:900px;margin:0 auto;padding:var(--space-6)}
    .lead{color:var(--text-secondary);font-size:var(--text-body-lg);margin-top:var(--space-2)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--space-4);margin-top:var(--space-5)}
    .card{display:block;padding:var(--space-5);border-radius:var(--radius-lg);background:var(--glass-bg-strong);backdrop-filter:var(--glass-blur-md);-webkit-backdrop-filter:var(--glass-blur-md);border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm),var(--glass-edge);color:var(--text-primary);text-decoration:none;transition:transform var(--motion-base),box-shadow var(--motion-base),border-color var(--motion-base)}
    .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md),var(--glass-edge);border-color:var(--brand)}
    .card h3{font-size:var(--text-h3);font-weight:700;margin-bottom:var(--space-2)}
    .card p{font-size:var(--text-body);color:var(--text-secondary)}
    .card .eyebrow{font-size:var(--text-caption);color:var(--brand);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:var(--space-1)}
  </style>
</head>
<body>
  <header class="topnav glass-nav">
    <span class="brand">知语 · 原型</span>
    <span class="spacer"></span>
    <button data-action="toggle-theme" class="btn btn--ghost btn--sm">明/暗</button>
  </header>

  <main class="page">
    <h1>C03 可交互原型总览</h1>
    <p class="lead">3 个模块，点击模块卡片进入功能目录。通过 <code>python -m http.server</code> 在项目根目录运行即可访问全部页面。</p>

    <div class="grid">
      <a class="card" href="./auth/index.html">
        <div class="eyebrow">模块</div>
        <h3>鉴权 / Auth</h3>
        <p>5 功能 · 13 页面 — 账号入口、账号找回、个人中心、管理登录、管理账号</p>
      </a>
      <a class="card" href="./course/index.html">
        <div class="eyebrow">模块</div>
        <h3>课程 / Course</h3>
        <p>8 功能 · 17 页面 — 学习、SRS 复习、考试、内容管理、举报审核、媒资、考试编辑、搜索统计</p>
      </a>
      <a class="card" href="./discover-china/index.html">
        <div class="eyebrow">模块</div>
        <h3>发现中国 / Discover China</h3>
        <p>4 功能 · 7 页面 — 文章浏览、分类管理、文章管理、搜索运维</p>
      </a>
    </div>
  </main>

  <script defer src="../B02-experience-design/prototype-style/app.js"></script>
  <script>if(typeof proto!=='undefined')proto.bootstrap();</script>
</body>
</html>
